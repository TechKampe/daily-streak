
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Verdadero o Falso? Elige tu respuesta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"Los voltajes inferiores a 50V son siempre seguros y nunca pueden causar daño.",ans:false,exp:"Falso. Aunque 50V se considera el umbral de baja tensión, en condiciones de humedad o con piel mojada, voltajes menores pueden ser peligrosos."},
{text:"Antes de trabajar en una instalación eléctrica, siempre hay que cortar la corriente y verificar ausencia de tensión.",ans:true,exp:"Verdadero. Es la regla de oro de la seguridad eléctrica: cortar, bloquear, verificar, señalizar y trabajar."},
{text:"La madera seca es un buen aislante y protege completamente contra descargas eléctricas.",ans:false,exp:"Falso. La madera seca aísla parcialmente, pero si está húmeda o deteriorada puede conducir electricidad. Nunca confíes solo en ella."},
{text:"Los guantes de trabajo normales son suficientes para manipular cables eléctricos.",ans:false,exp:"Falso. Solo los guantes dieléctricos homologados protegen contra descargas. Los guantes de trabajo común no aíslan."},
{text:"Los cuadros eléctricos deben estar siempre señalizados con advertencia de riesgo eléctrico.",ans:true,exp:"Verdadero. La señalización es obligatoria por normativa para prevenir accidentes y alertar del peligro."},
{text:"Si alguien sufre una descarga eléctrica, lo primero es apartarlo con las manos desnudas.",ans:false,exp:"Falso. Nunca toques directamente a la víctima. Primero corta la corriente o usa un objeto aislante (madera seca, plástico)."},
{text:"Las herramientas eléctricas deben revisarse visualmente antes de cada uso.",ans:true,exp:"Verdadero. Revisar cables, enchufes y carcasas antes de usar previene accidentes por deterioro o daños ocultos."}
];
let idx=0,score=0,answers=[],canAnswer=true;
const scene=document.getElementById('scene'),stmtArea=document.getElementById('statement-area'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=statements.length){showResults();return}
canAnswer=true;
const s=statements[idx];
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
stmtArea.innerHTML=`<p style="font-size:1.1rem;line-height:1.5;text-align:center;padding:0 8px;margin:0">${s.text}</p>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="answer(true)">✓ Verdadero</button><button class="btn-option" id="btn-false" onclick="answer(false)">✗ Falso</button>`;
ensureFits();
}

function answer(userAns){
if(!canAnswer)return;
canAnswer=false;
const s=statements[idx];
const correct=userAns===s.ans;
if(correct)score++;
answers.push({text:s.text,userAns,correctAns:s.ans,correct,exp:s.exp});
const btnT=document.getElementById('btn-true'),btnF=document.getElementById('btn-false');
if(userAns===true){
btnT.classList.add(correct?'correct':'incorrect');
}else{
btnF.classList.add(correct?'correct':'incorrect');
}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text}</div>
<div class="result-answer">Tu respuesta: ${a.userAns?'Verdadero':'Falso'} ${a.correct?'✓':'✗'} | Correcta: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip" style="background:var(--surface);border-radius:12px;padding:16px;margin:16px 0">
<strong>💡 Consejo práctico:</strong> Aplica siempre la regla de oro: cortar la corriente, bloquear el interruptor, verificar ausencia de tensión con un comprobador homologado, señalizar la zona y solo entonces trabajar.
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
