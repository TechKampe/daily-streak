
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Primero lo primero: Ordena y trabaja seguro - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔧 Ordena y trabaja seguro</div>
<div class="subtitle" id="subtitle">Ordena los pasos correctamente</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress-bar" style="width:0%"></i></div>
</div>
<span class="badge" id="badge">Reto 1/3</span>
</div>
</div>
<div class="main" id="main"></div>
<div class="footer">
<div class="helper" id="helper">Usa ↑↓ o arrastra para ordenar</div>
<button class="cta" id="cta">Confirmar orden</button>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">🔧 Evaluación de protocolos</div>
<div class="modal-body">Tu supervisor observa cómo preparas las intervenciones. Ordena cada secuencia correctamente para demostrar que conoces los procedimientos.</div>
<div class="modal-actions">
<button class="cta" id="start-btn">Comenzar</button>
</div>
</div>
</div>

<script>
const challenges = [
{
title: "Bloqueo/Etiquetado (LOTO)",
steps: [
{ id: 1, text: "Cortar suministro eléctrico" },
{ id: 2, text: "Verificar ausencia de tensión" },
{ id: 3, text: "Bloquear y etiquetar el equipo" },
{ id: 4, text: "Realizar el trabajo" },
{ id: 5, text: "Retirar bloqueo y rearmar" }
],
correctOrder: [1, 2, 3, 4, 5],
tip: "Nunca trabajes sin verificar ausencia de tensión con un detector homologado."
},
{
title: "Atención de avería doméstica",
steps: [
{ id: 1, text: "Escuchar al cliente y tomar nota" },
{ id: 2, text: "Inspeccionar visualmente la zona" },
{ id: 3, text: "Diagnosticar el problema" },
{ id: 4, text: "Informar y presupuestar" },
{ id: 5, text: "Ejecutar la reparación" }
],
correctOrder: [1, 2, 3, 4, 5],
tip: "Siempre informa al cliente antes de actuar. Evita sorpresas y genera confianza."
},
{
title: "Preparar zona de trabajo segura",
steps: [
{ id: 1, text: "Delimitar el área de trabajo" },
{ id: 2, text: "Colocar señalización visible" },
{ id: 3, text: "Ponerse los EPI adecuados" },
{ id: 4, text: "Ejecutar la tarea" }
],
correctOrder: [1, 2, 3, 4],
tip: "Los EPI se colocan DESPUÉS de preparar la zona, justo antes de trabajar."
}
];

let currentChallenge = 0;
let userAnswers = [];
let currentOrder = [];
let draggedItem = null;
let draggedIndex = -1;

const scene = document.getElementById('scene');
const main = document.getElementById('main');
const cta = document.getElementById('cta');
const modal = document.getElementById('modal');
const startBtn = document.getElementById('start-btn');
const progressBar = document.getElementById('progress-bar');
const badge = document.getElementById('badge');
const subtitle = document.getElementById('subtitle');
const helper = document.getElementById('helper');

function shuffle(arr) {
const a = [...arr];
for (let i = a.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

function renderChallenge() {
const ch = challenges[currentChallenge];
currentOrder = shuffle([...ch.steps]);
badge.textContent = `Reto ${currentChallenge + 1}/3`;
progressBar.style.width = `${(currentChallenge / 3) * 100}%`;
subtitle.textContent = ch.title;
helper.textContent = "Usa ↑↓ o arrastra para ordenar";
cta.textContent = "Confirmar orden";
cta.onclick = confirmOrder;
cta.disabled = false;
renderCards();
ensureFits();
}

function renderCards() {
main.innerHTML = `<div class="cards" id="cards"></div>`;
const container = document.getElementById('cards');
currentOrder.forEach((step, idx) => {
const card = document.createElement('div');
card.className = 'card';
card.draggable = true;
card.dataset.idx = idx;
card.innerHTML = `
<span class="card-num">${idx + 1}</span>
<span class="card-text">${step.text}</span>
<div class="card-controls">
<button class="btn-ghost" aria-label="Subir" onclick="moveUp(${idx})">↑</button>
<button class="btn-ghost" aria-label="Bajar" onclick="moveDown(${idx})">↓</button>
</div>
`;
card.addEventListener('dragstart', handleDragStart);
card.addEventListener('dragend', handleDragEnd);
card.addEventListener('dragover', handleDragOver);
card.addEventListener('drop', handleDrop);
card.addEventListener('touchstart', handleTouchStart, { passive: false });
card.addEventListener('touchmove', handleTouchMove, { passive: false });
card.addEventListener('touchend', handleTouchEnd);
container.appendChild(card);
});
}

function moveUp(idx) {
if (idx <= 0) return;
[currentOrder[idx], currentOrder[idx - 1]] = [currentOrder[idx - 1], currentOrder[idx]];
animateSwap(idx, idx - 1);
}

function moveDown(idx) {
if (idx >= currentOrder.length - 1) return;
[currentOrder[idx], currentOrder[idx + 1]] = [currentOrder[idx + 1], currentOrder[idx]];
animateSwap(idx, idx + 1);
}

function animateSwap(from, to) {
renderCards();
const cards = document.querySelectorAll('.card');
if (cards[to]) {
cards[to].style.transform = 'scale(1.02)';
setTimeout(() => { cards[to].style.transform = ''; }, 150);
}
}

function handleDragStart(e) {
draggedIndex = parseInt(e.target.closest('.card').dataset.idx);
e.target.closest('.card').classList.add('dragging');
e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
e.target.closest('.card').classList.remove('dragging');
draggedIndex = -1;
}

function handleDragOver(e) {
e.preventDefault();
e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
e.preventDefault();
const dropIdx = parseInt(e.target.closest('.card').dataset.idx);
if (draggedIndex !== -1 && draggedIndex !== dropIdx) {
const item = currentOrder.splice(draggedIndex, 1)[0];
currentOrder.splice(dropIdx, 0, item);
renderCards();
}
}

let touchStartY = 0;
let touchedCard = null;
let touchedIdx = -1;

function handleTouchStart(e) {
const card = e.target.closest('.card');
if (!card) return;
touchedCard = card;
touchedIdx = parseInt(card.dataset.idx);
touchStartY = e.touches[0].clientY;
card.classList.add('dragging');
}

function handleTouchMove(e) {
if (!touchedCard) return;
e.preventDefault();
}

function handleTouchEnd(e) {
if (!touchedCard) return;
const touchEndY = e.changedTouches[0].clientY;
const diff = touchEndY - touchStartY;
touchedCard.classList.remove('dragging');
if (Math.abs(diff) > 30) {
if (diff < 0) moveUp(touchedIdx);
else moveDown(touchedIdx);
}
touchedCard = null;
touchedIdx = -1;
}

function confirmOrder() {
const ch = challenges[currentChallenge];
const userOrder = currentOrder.map(s => s.id);
const isCorrect = JSON.stringify(userOrder) === JSON.stringify(ch.correctOrder);
userAnswers.push({
title: ch.title,
userOrder: currentOrder.map(s => s.text),
correctOrder: ch.correctOrder.map(id => ch.steps.find(s => s.id === id).text),
isCorrect,
tip: ch.tip
});
showFeedback(isCorrect);
}

function showFeedback(isCorrect) {
const ch = challenges[currentChallenge];
const answer = userAnswers[userAnswers.length - 1];
let html = `<div class="feedback-container">`;
if (isCorrect) {
html += `<div class="result-item correct"><div class="result-question">✅ ¡Orden correcto!</div></div>`;
html += `<div class="feedback-list">`;
answer.correctOrder.forEach((step, i) => {
html += `<div class="feedback-step">${i + 1}. ${step}</div>`;
});
html += `</div>`;
} else {
html += `<div class="result-item incorrect"><div class="result-question">❌ Orden incorrecto</div></div>`;
html += `<div class="feedback-section"><strong>Tu orden:</strong></div><div class="feedback-list">`;
answer.userOrder.forEach((step, i) => {
html += `<div class="feedback-step">${i + 1}. ${step}</div>`;
});
html += `</div>`;
html += `<div class="feedback-section"><strong>✅ Orden correcto:</strong></div><div class="feedback-list correct-list">`;
answer.correctOrder.forEach((step, i) => {
html += `<div class="feedback-step">${i + 1}. ${step}</div>`;
});
html += `</div>`;
}
html += `<div class="feedback-tip">💡 ${ch.tip}</div></div>`;
main.innerHTML = html;
helper.textContent = "";
if (currentChallenge < 2) {
cta.textContent = "Siguiente reto";
cta.onclick = nextChallenge;
} else {
cta.textContent = "Ver resultados";
cta.onclick = showResults;
}
ensureFits();
}

function nextChallenge() {
currentChallenge++;
renderChallenge();
}

function showResults() {
setTimeout(() => {
document.documentElement.classList.replace('gameplay', 'results');
scene.classList.replace('gameplay', 'results');
const correctCount = userAnswers.filter(a => a.isCorrect).length;
let html = `<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${correctCount}/3</div>
<div class="results-subtitle">Secuencias correctas</div>
</div>
<div class="results-list">`;
userAnswers.forEach((a, i) => {
html += `<div class="result-item ${a.isCorrect ? 'correct' : 'incorrect'}">
<div class="result-question">Reto ${i + 1}: ${a.title}</div>
<div class="result-answer">${a.isCorrect ? '✓ Correcto' : '✗ Incorrecto'}</div>
<div class="result-explanation">💡 ${a.tip}</div>
</div>`;
});
html += `</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
scene.innerHTML = html;
}, 500);
}

function completeTask() {
if (window.ReactNativeWebView) {
window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'TASK_COMPLETED' }));
}
}

function ensureFits() {
scene.classList.remove('compact', 'compact-xs');
document.documentElement.style.setProperty('--ui-scale', 1);
if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
if (scene.scrollHeight > scene.clientHeight) {
const scale = Math.max(0.88, scene.clientHeight / scene.scrollHeight);
document.documentElement.style.setProperty('--ui-scale', scale);
}
}

modal.classList.add('active');
startBtn.onclick = () => {
modal.classList.remove('active');
renderChallenge();
};

window.addEventListener('load', ensureFits);
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
