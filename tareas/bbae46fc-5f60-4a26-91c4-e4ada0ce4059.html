
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Primero lo primero: ordena como un pro - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene"></div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const sequences=[
{title:"Protocolo LOTO básico",steps:["Cortar suministro eléctrico","Verificar ausencia de tensión","Bloquear el equipo","Realizar el trabajo","Rearmar el sistema"],tip:"Nunca trabajes sin verificar ausencia de tensión con un detector homologado."},
{title:"Preparación de herramientas",steps:["Revisar orden de trabajo","Seleccionar herramientas necesarias","Verificar estado de herramientas","Preparar EPIs adecuados","Trasladarse al punto de trabajo"],tip:"Herramientas en mal estado causan accidentes. Revísalas siempre antes de usarlas."},
{title:"Reportar incidencia",steps:["Asegurar la zona afectada","Documentar la incidencia","Informar al supervisor","Esperar instrucciones","Registrar en el parte diario"],tip:"Un buen reporte incluye: qué pasó, dónde, cuándo y qué medidas tomaste."}
];
let currentSeq=0,userOrders=[],draggedIdx=null,touchStartY=0,originalOrder=[];
const scene=document.getElementById('scene');

function shuffle(arr){
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
if(a.every((v,i)=>v===arr[i]))return shuffle(arr);
return a;
}

function renderIntro(){
scene.innerHTML=`
<div class="modal-backdrop active" id="modal">
<div class="modal">
<div class="modal-title">🔧 Ordena como un pro</div>
<div class="modal-body">Tu supervisor te observa. Ordena los pasos correctamente usando ↑↓ o arrastrando las tarjetas.</div>
<div class="modal-actions"><button class="cta" onclick="startGame()">Comenzar</button></div>
</div>
</div>`;
}

function startGame(){
document.getElementById('modal').classList.remove('active');
renderSequence();
}

function renderSequence(){
const seq=sequences[currentSeq];
originalOrder=shuffle(seq.steps);
const progress=((currentSeq)/sequences.length*100);
scene.innerHTML=`
<div class="hud">
<div class="hud-titles">
<div class="brand">Ordena como un pro 🔧</div>
<div class="subtitle">${seq.title}</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><span class="bar-label">Progreso</span><div class="bar"><i style="width:${progress}%"></i></div></div>
<span class="badge">Reto ${currentSeq+1}/3</span>
</div>
</div>
<div class="main">
<div class="cards-list" id="cardsList">
${originalOrder.map((step,i)=>`
<div class="card" data-idx="${i}" draggable="true">
<span class="card-num">${i+1}</span>
<span class="card-text">${step}</span>
<div class="card-controls">
<button class="btn-ghost" aria-label="Subir" onclick="moveCard(${i},-1)">↑</button>
<button class="btn-ghost" aria-label="Bajar" onclick="moveCard(${i},1)">↓</button>
</div>
</div>`).join('')}
</div>
</div>
<div class="footer">
<div class="helper">Ordena los pasos del procedimiento</div>
<button class="cta" onclick="confirmOrder()">Confirmar orden</button>
</div>`;
setupDragAndDrop();
ensureFits();
}

function moveCard(idx,dir){
const newIdx=idx+dir;
if(newIdx<0||newIdx>=originalOrder.length)return;
[originalOrder[idx],originalOrder[newIdx]]=[originalOrder[newIdx],originalOrder[idx]];
animateSwap(idx,newIdx);
}

function animateSwap(i,j){
const cards=document.querySelectorAll('.card');
cards[i].classList.add('dragging');
cards[j].classList.add('dragging');
setTimeout(()=>{
renderCards();
cards.forEach(c=>c.classList.remove('dragging'));
},150);
}

function renderCards(){
const list=document.getElementById('cardsList');
list.innerHTML=originalOrder.map((step,i)=>`
<div class="card" data-idx="${i}" draggable="true">
<span class="card-num">${i+1}</span>
<span class="card-text">${step}</span>
<div class="card-controls">
<button class="btn-ghost" aria-label="Subir" onclick="moveCard(${i},-1)">↑</button>
<button class="btn-ghost" aria-label="Bajar" onclick="moveCard(${i},1)">↓</button>
</div>
</div>`).join('');
setupDragAndDrop();
}

function setupDragAndDrop(){
const cards=document.querySelectorAll('.card');
cards.forEach((card,idx)=>{
card.addEventListener('dragstart',e=>{
draggedIdx=idx;
card.classList.add('dragging');
e.dataTransfer.effectAllowed='move';
});
card.addEventListener('dragend',()=>{
card.classList.remove('dragging');
draggedIdx=null;
});
card.addEventListener('dragover',e=>{
e.preventDefault();
e.dataTransfer.dropEffect='move';
});
card.addEventListener('drop',e=>{
e.preventDefault();
if(draggedIdx!==null&&draggedIdx!==idx){
const item=originalOrder.splice(draggedIdx,1)[0];
originalOrder.splice(idx,0,item);
renderCards();
}
});
card.addEventListener('touchstart',e=>{
if(e.target.closest('.btn-ghost'))return;
touchStartY=e.touches[0].clientY;
draggedIdx=idx;
card.classList.add('dragging');
},{passive:true});
card.addEventListener('touchmove',e=>{
if(draggedIdx===null)return;
const touchY=e.touches[0].clientY;
const cards=document.querySelectorAll('.card');
let targetIdx=draggedIdx;
cards.forEach((c,i)=>{
const rect=c.getBoundingClientRect();
if(touchY>rect.top&&touchY<rect.bottom)targetIdx=i;
});
if(targetIdx!==draggedIdx){
const item=originalOrder.splice(draggedIdx,1)[0];
originalOrder.splice(targetIdx,0,item);
draggedIdx=targetIdx;
renderCards();
}
},{passive:true});
card.addEventListener('touchend',()=>{
card.classList.remove('dragging');
draggedIdx=null;
},{passive:true});
});
}

function confirmOrder(){
const seq=sequences[currentSeq];
const isCorrect=originalOrder.every((step,i)=>step===seq.steps[i]);
userOrders.push({userOrder:[...originalOrder],correct:seq.steps,isCorrect,title:seq.title,tip:seq.tip});
showFeedback(isCorrect,seq);
}

function showFeedback(isCorrect,seq){
const icon=isCorrect?'✅':'❌';
const title=isCorrect?'¡Orden correcto!':'Orden incorrecto';
scene.innerHTML=`
<div class="hud">
<div class="hud-titles">
<div class="brand">${icon} ${title}</div>
<div class="subtitle">${seq.title}</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i style="width:${((currentSeq+1)/sequences.length*100)}%"></i></div></div>
<span class="badge">Reto ${currentSeq+1}/3</span>
</div>
</div>
<div class="main">
<div class="results-list">
${!isCorrect?`<div class="result-item incorrect">
<div class="result-question">Tu orden:</div>
<div class="result-explanation">${userOrders[currentSeq].userOrder.map((s,i)=>`${i+1}. ${s}`).join('<br>')}</div>
</div>`:''}
<div class="result-item correct">
<div class="result-question">${isCorrect?'Tu orden:':'Orden correcto:'}</div>
<div class="result-explanation">${seq.steps.map((s,i)=>`${i+1}. ${s}`).join('<br>')}</div>
</div>
<div class="result-item">
<div class="result-question">💡 Consejo</div>
<div class="result-explanation">${seq.tip}</div>
</div>
</div>
</div>
<div class="footer">
<button class="cta" onclick="nextSequence()">${currentSeq<2?'Siguiente reto':'Ver resultados'}</button>
</div>`;
ensureFits();
}

function nextSequence(){
currentSeq++;
if(currentSeq>=sequences.length){
showResults();
}else{
renderSequence();
}
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const correctCount=userOrders.filter(o=>o.isCorrect).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Completado!</div>
<div class="results-score">${correctCount}/3</div>
<div class="results-subtitle">Secuencias correctas</div>
</div>
<div class="results-list">
${userOrders.map((o,i)=>`
<div class="result-item ${o.isCorrect?'correct':'incorrect'}">
<div class="result-question">${o.isCorrect?'✓':'✗'} ${o.title}</div>
<div class="result-answer">${o.isCorrect?'Orden correcto':'Orden incorrecto'}</div>
<div class="result-explanation">💡 ${o.tip}</div>
</div>`).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();renderIntro();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
