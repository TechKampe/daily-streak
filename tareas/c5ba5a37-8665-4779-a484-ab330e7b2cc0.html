
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Pon a prueba tu instinto técnico - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Primera semana como aprendiz</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i id="progress"></i></div></div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Verdadero o Falso? Decide rápido</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"Los guantes aislantes solo son necesarios si trabajo con más de 1000V.",ans:false,exp:"Falso. Los guantes aislantes son obligatorios en baja tensión (230-400V), ya que estas tensiones pueden ser mortales."},
{text:"El cable de tierra siempre es verde y amarillo según normativa.",ans:true,exp:"Verdadero. El REBT establece que el conductor de protección debe ser verde-amarillo para identificación universal."},
{text:"La madera seca no conduce la electricidad, así que es seguro usarla como aislante.",ans:false,exp:"Falso. La madera húmeda conduce electricidad. Solo materiales homologados garantizan aislamiento seguro."},
{text:"Antes de trabajar en un circuito, debo verificar ausencia de tensión con un comprobador.",ans:true,exp:"Verdadero. Las 5 reglas de oro exigen comprobar ausencia de tensión antes de cualquier intervención."},
{text:"Si un compañero sufre una descarga, debo apartarlo inmediatamente con las manos.",ans:false,exp:"Falso. Primero corta la corriente o usa material aislante. Tocarlo directamente te electrocutaría también."},
{text:"El orden y limpieza en el puesto de trabajo son obligaciones legales, no solo recomendaciones.",ans:true,exp:"Verdadero. La Ley de PRL exige mantener el área de trabajo ordenada para prevenir accidentes."},
{text:"Una tensión de 50V en corriente alterna no puede causar la muerte.",ans:false,exp:"Falso. En condiciones de humedad o piel mojada, tensiones desde 25V AC pueden ser letales."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),stArea=document.getElementById('statement-area'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=statements.length){showResults();return}
const s=statements[idx];
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
stArea.innerHTML=`<p class="statement-text">${s.text}</p>`;
opts.innerHTML=`<button class="btn-option" onclick="answer(true)">✓ Verdadero</button><button class="btn-option" onclick="answer(false)">✗ Falso</button>`;
ensureFits();
}

function answer(userAns){
const s=statements[idx];
const correct=userAns===s.ans;
const btns=opts.querySelectorAll('.btn-option');
btns.forEach(b=>b.disabled=true);
if(userAns===true)btns[0].classList.add(correct?'correct':'incorrect');
else btns[1].classList.add(correct?'correct':'incorrect');
answers.push({text:s.text,userAns,correctAns:s.ans,correct,exp:s.exp});
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text}</div>
<div class="result-answer">${a.correct?'✓ Acertaste':'✗ Fallaste'} — Correcto: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo:</strong> Antes de tocar cualquier cable, verifica SIEMPRE ausencia de tensión. La rutina de comprobación te salvará la vida.
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',render);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
