
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i id="progress"></i></div></div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Es verdadero o falso?</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">Tu primera semana ⚡</div>
<div class="modal-body">Tu mentor quiere comprobar si distingues los mitos peligrosos de las prácticas seguras. ¿Preparado?</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">Comenzar</button>
</div>
</div>
</div>
<script>
const data=[
{statement:"La corriente de 220V es peligrosa pero 12V es siempre segura",answer:false,exp:"Falso. Aunque 12V es menos peligroso, en condiciones de humedad o con baja resistencia corporal puede causar daños."},
{statement:"Siempre hay que cortar la corriente antes de intervenir en un circuito",answer:true,exp:"Verdadero. Es la primera regla de oro: desconectar y verificar ausencia de tensión antes de trabajar."},
{statement:"La madera seca no conduce electricidad, así que es segura para trabajar",answer:false,exp:"Falso. La madera húmeda sí conduce. Nunca confíes en materiales sin verificar condiciones."},
{statement:"Los guantes de látex comunes protegen contra descargas eléctricas",answer:false,exp:"Falso. Solo los guantes dieléctricos homologados ofrecen protección real contra la electricidad."},
{statement:"Antes de tocar un cable, debo verificar ausencia de tensión con polímetro",answer:true,exp:"Verdadero. El polímetro confirma que no hay tensión aunque el interruptor esté apagado."},
{statement:"Los cuadros eléctricos deben estar siempre señalizados con riesgo eléctrico",answer:true,exp:"Verdadero. La señalización es obligatoria por normativa de PRL para prevenir accidentes."},
{statement:"Si un compañero sufre descarga, debo tocarlo para apartarlo rápidamente",answer:false,exp:"Falso. Primero corta la corriente. Si no es posible, usa material aislante para separarlo."}
];
let idx=0,score=0,answers=[];
const scene=document.getElementById('scene'),stmtArea=document.getElementById('statement-area'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),modal=document.getElementById('modal');

function startGame(){modal.classList.remove('active');render();}

function render(){
if(idx>=data.length){showResults();return}
const d=data[idx];
prog.style.width=((idx)/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
stmtArea.innerHTML=`<div class="statement-text">${d.statement}</div>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="answer(true)">Verdadero</button><button class="btn-option" id="btn-false" onclick="answer(false)">Falso</button>`;
ensureFits();
}

function answer(userAns){
const d=data[idx];
const correct=userAns===d.answer;
if(correct)score++;
answers.push({statement:d.statement,userAns,correctAns:d.answer,correct,exp:d.exp});
const btnT=document.getElementById('btn-true'),btnF=document.getElementById('btn-false');
btnT.disabled=true;btnF.disabled=true;
if(userAns===true){btnT.classList.add(correct?'correct':'incorrect');}
else{btnF.classList.add(correct?'correct':'incorrect');}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Completado!</div>
<div class="results-score">${score}/${data.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.statement}</div>
<div class="result-answer">Tu respuesta: ${a.userAns?'Verdadero':'Falso'} ${a.correct?'✓':'✗'}</div>
<div class="result-answer">Correcta: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo final:</strong> Recuerda siempre la regla de oro: antes de tocar cualquier cable o equipo, verifica SIEMPRE la ausencia de tensión con un polímetro. Nunca confíes solo en el interruptor.
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{modal.classList.add('active');ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
