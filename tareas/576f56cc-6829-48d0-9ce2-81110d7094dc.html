
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔌 Conecta los Conceptos Eléctricos - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease,background 0.2s ease;user-select:none;-webkit-tap-highlight-color:transparent;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:center;gap:16px;font-size:14px;color:#0B214A;margin:8px 0;}
.stats-row span{font-weight:500;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔌 Conecta Conceptos</div>
<div class="subtitle">Empareja términos eléctricos</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para encontrar parejas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairs=[
{id:1,term:"Diferencial",def:"Protege contra contactos",exp:"El diferencial detecta fugas de corriente y corta el suministro para evitar electrocuciones."},
{id:2,term:"Fase",def:"Cable con tensión",exp:"El cable de fase transporta la corriente eléctrica activa, normalmente de color marrón o negro."},
{id:3,term:"Toma de tierra",def:"Deriva corrientes peligrosas",exp:"La toma de tierra conduce las corrientes de fuga al suelo, protegiendo personas y equipos."},
{id:4,term:"ICP",def:"Limita potencia contratada",exp:"El ICP (Interruptor de Control de Potencia) salta cuando se supera la potencia contratada."}
];
let cards=[],firstCard=null,secondCard=null,attempts=0,matched=0,locked=false,gameLog=[];
const maxAttempts=10,totalPairs=4;
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function init(){
cards=[];
pairs.forEach(p=>{
cards.push({pairId:p.id,text:p.term,type:'term'});
cards.push({pairId:p.id,text:p.def,type:'def'});
});
shuffle(cards);
renderBoard();
updateStats();
ensureFits();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>handleClick(i,div);
board.appendChild(div);
});
}

function handleClick(index,el){
if(locked)return;
if(el.classList.contains('matched'))return;
if(el.classList.contains('revealed'))return;
revealCard(el,index);
if(!firstCard){
firstCard={index,el};
}else if(firstCard.index!==index){
secondCard={index,el};
locked=true;
attempts++;
updateStats();
checkMatch();
}
}

function revealCard(el,index){
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[index].text;
}

function coverCard(el,index){
el.classList.remove('revealed','shake');
el.classList.add('covered');
el.textContent='?';
}

function checkMatch(){
const c1=cards[firstCard.index],c2=cards[secondCard.index];
const isMatch=c1.pairId===c2.pairId&&c1.type!==c2.type;
if(isMatch){
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matched++;
gameLog.push({pairId:c1.pairId,found:true,attempt:attempts});
updateStats();
resetSelection();
if(matched===totalPairs)endGame(true);
}else{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
coverCard(firstCard.el,firstCard.index);
coverCard(secondCard.el,secondCard.index);
resetSelection();
if(attempts>=maxAttempts&&matched<totalPairs)endGame(false);
},2000);
}
}

function resetSelection(){firstCard=null;secondCard=null;locked=false;}
function updateStats(){attemptsEl.textContent=`Intento ${attempts}/${maxAttempts}`;pairsEl.textContent=`${matched}/${totalPairs} parejas`;}

function endGame(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const foundIds=gameLog.map(g=>g.pairId);
let html=`<div class="results-scroll"><div class="results-header"><div class="results-title">${won?'¡Felicidades!':'¡Sigue practicando!'}</div><div class="results-score">${matched}/${totalPairs}</div><div class="results-subtitle">Parejas encontradas en ${attempts} intentos</div></div><div class="results-list">`;
pairs.forEach(p=>{
const found=foundIds.includes(p.id);
html+=`<div class="result-item ${found?'correct':'incorrect'}"><div class="result-question">${p.term} ↔ ${p.def}</div><div class="result-answer">${found?'✓ Encontrada':'✗ No encontrada'}</div><div class="result-explanation">${p.exp}</div></div>`;
});
html+=`</div><div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div></div>`;
scene.innerHTML=html;
},500);
}

function completeTask(){if(window.ReactNativeWebView){window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));}}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
