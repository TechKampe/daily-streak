
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Verdadero o Falso? Elige tu respuesta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"La corriente de 12V de una batería de coche no puede causar ningún daño a una persona.",ans:false,exp:"Aunque 12V DC no suele ser mortal, puede causar quemaduras o chispazos peligrosos cerca de materiales inflamables."},
{text:"La madera seca es un aislante perfecto y puedes tocar cables con un palo de madera sin riesgo.",ans:false,exp:"La madera puede contener humedad o suciedad conductora. Nunca uses objetos improvisados para manipular cables."},
{text:"Antes de trabajar en un circuito, debes verificar la ausencia de tensión con un detector apropiado.",ans:true,exp:"Las 5 reglas de oro exigen comprobar ausencia de tensión con equipos homologados antes de cualquier intervención."},
{text:"Los guantes de trabajo normales de cuero protegen igual que los guantes dieléctricos.",ans:false,exp:"Solo los guantes dieléctricos certificados protegen contra descargas eléctricas. El cuero no es aislante."},
{text:"Si alguien sufre una descarga eléctrica, lo primero es cortar la corriente antes de tocarlo.",ans:true,exp:"Tocar a la víctima sin cortar la corriente te convierte en conductor y sufrirás la descarga también."},
{text:"La señalización de riesgo eléctrico es obligatoria en todos los cuadros eléctricos de obra.",ans:true,exp:"El RD 614/2001 exige señalizar todos los puntos con riesgo eléctrico para prevenir accidentes."}
];
let idx=0,score=0,answers=[],blocked=false;
const scene=document.getElementById('scene'),stArea=document.getElementById('statement-area'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=statements.length){showResults();return}
blocked=false;
const s=statements[idx];
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
stArea.innerHTML=`<div class="statement-text">${s.text}</div>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="choose(true)">✓ Verdadero</button><button class="btn-option" id="btn-false" onclick="choose(false)">✗ Falso</button>`;
ensureFits();
}

function choose(val){
if(blocked)return;
blocked=true;
const s=statements[idx];
const correct=val===s.ans;
if(correct)score++;
answers.push({text:s.text,userAns:val,correctAns:s.ans,correct,exp:s.exp});
const btnT=document.getElementById('btn-true'),btnF=document.getElementById('btn-false');
if(val===true){btnT.classList.add(correct?'correct':'incorrect');}
else{btnF.classList.add(correct?'correct':'incorrect');}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${i+1}. ${a.text}</div>
<div class="result-answer">Tu respuesta: ${a.userAns?'Verdadero':'Falso'} ${a.correct?'✓':'✗'} | Correcta: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo práctico:</strong> Siempre usa un detector de tensión homologado (VAT) antes de tocar cualquier cable. Comprueba que el detector funciona en un punto con tensión conocida antes y después de usarlo.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
