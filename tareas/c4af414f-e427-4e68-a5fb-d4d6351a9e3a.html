
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Elige tu arma: herramientas del oficio - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔧 Elige tu arma</div>
<div class="subtitle" id="task">Cargando tarea...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Selecciona la herramienta correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const tasks=[
{task:"Apretar una tuerca en tubería de agua",opts:["Llave inglesa","Alicates","Destornillador"],ans:0,tools:{correct:"Llave inglesa",why:"Ajusta tuercas sin dañarlas. Alicates marcan la superficie; destornillador no aplica torque circular."}},
{task:"Medir tensión en un enchufe",opts:["Multímetro","Flexómetro","Nivel de burbuja"],ans:0,tools:{correct:"Multímetro",why:"Mide voltaje con seguridad. Flexómetro mide longitud; nivel detecta inclinación."}},
{task:"Hacer una regata pequeña en pared",opts:["Cincel","Pelacables","Sierra de arco"],ans:0,tools:{correct:"Cincel",why:"Rompe material de obra. Pelacables es para cables; sierra corta pero no excava."}},
{task:"Pelar un cable de 2,5 mm²",opts:["Pelacables","Alicates","Llave inglesa"],ans:0,tools:{correct:"Pelacables",why:"Retira aislante sin cortar hilos. Alicates pueden dañar el cobre; llave no sirve."}},
{task:"Cortar un tubo de PVC de 32 mm",opts:["Sierra de arco","Cincel","Destornillador"],ans:0,tools:{correct:"Sierra de arco",why:"Corte limpio en plástico. Cincel lo astilla; destornillador no corta."}},
{task:"Comprobar nivel en estantería",opts:["Nivel de burbuja","Multímetro","Flexómetro"],ans:0,tools:{correct:"Nivel de burbuja",why:"Detecta horizontalidad. Multímetro mide electricidad; flexómetro mide distancia."}}
];
let idx=0,score=0,answers=[];
const scene=document.getElementById('scene'),optsEl=document.getElementById('options'),taskEl=document.getElementById('task'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=tasks.length){showResults();return}
const t=tasks[idx];
taskEl.textContent=t.task;
prog.style.width=(idx/tasks.length*100)+'%';
counter.textContent=(idx+1)+'/'+tasks.length;
optsEl.innerHTML=t.opts.map((o,i)=>`<button class="btn-option" onclick="select(${i})">${o}</button>`).join('');
ensureFits();
}

function select(i){
const btns=optsEl.querySelectorAll('.btn-option');
const correct=i===tasks[idx].ans;
btns[i].classList.add(correct?'correct':'incorrect');
if(correct)score++;
answers.push({task:tasks[idx].task,user:tasks[idx].opts[i],correct,tools:tasks[idx].tools});
btns.forEach(b=>b.disabled=true);
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const tips="Consejo: Llave inglesa para tuercas, multímetro para electricidad, cincel para obra, pelacables para cables, sierra de arco para tubos, nivel para alineación.";
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completa!</div>
<div class="results-score">${score}/${tasks.length}</div>
<div class="results-subtitle">Herramientas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.task}</div>
<div class="result-answer">${a.correct?'✓ '+a.user:'✗ Elegiste: '+a.user}</div>
<div class="result-explanation">Correcta: ${a.tools.correct}. ${a.tools.why}</div>
</div>`).join('')}
</div>
<div class="result-item"><div class="result-explanation">${tips}</div></div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
