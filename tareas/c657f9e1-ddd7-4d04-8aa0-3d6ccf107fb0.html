
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🗣️ Tu primera llamada al cliente - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene"></div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const characters={
mentor:{name:"Carlos (Mentor)",avatar:"https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png",color:"#4CAF50"},
client:{name:"Cliente",avatar:"https://techkampe.github.io/daily-streak/assets/Avatar%204_low.png",color:"#FF9800"},
player:{name:"Tú",avatar:"https://techkampe.github.io/daily-streak/assets/Avatar%202_low.png",color:"#000"}
};

const turns=[
{
messages:[
{from:"mentor",text:"Suena el teléfono. Es tu primera llamada como técnico. ¡Tranquilo, yo escucho!"},
{from:"client",text:"¿Hola? ¡Llevo dos días sin agua caliente! ¿Alguien puede ayudarme?"}
],
options:[
{text:"Buenos días, soy técnico de Kämpe. ¿En qué puedo ayudarle?",score:2,reaction:"client",feedback:"Perfecto, presentación profesional y cortés."},
{text:"Hola, cuénteme qué pasa.",score:1,reaction:"client",feedback:"Funciona, pero falta presentarte como profesional."},
{text:"Sí, dígame rápido que tengo más llamadas.",score:0,reaction:"client",feedback:"Mal inicio: genera desconfianza y molestia."}
]
},
{
messages:[
{from:"client",text:"Mi termo eléctrico no calienta. ¡Es urgente, tengo niños en casa!"}
],
options:[
{text:"Entiendo su urgencia. ¿El piloto está encendido?",score:2,reaction:"client",feedback:"Empatía + pregunta técnica clave. Excelente."},
{text:"¿Ha comprobado si hay luz en casa?",score:1,reaction:"client",feedback:"Pregunta válida pero no la más directa para el termo."},
{text:"Seguro que es el termostato, pasa siempre.",score:0,reaction:"client",feedback:"Diagnosticar sin preguntar genera desconfianza."}
]
},
{
messages:[
{from:"client",text:"No sé qué es el piloto... ¡Solo sé que no funciona y estoy harto!"}
],
options:[
{text:"Tranquilo, le ayudo. ¿Ve alguna luz en el termo?",score:2,reaction:"client",feedback:"Calma al cliente y simplifica la pregunta técnica."},
{text:"El piloto es una luz roja o verde en el aparato.",score:1,reaction:"client",feedback:"Informativo pero no calma su frustración primero."},
{text:"Si no sabe eso, mejor espere a que vayamos.",score:0,reaction:"client",feedback:"Respuesta condescendiente que enfada más."}
]
},
{
messages:[
{from:"client",text:"Veo una luz roja parpadeando. ¿Eso es malo?"}
],
options:[
{text:"Indica un fallo. Podemos solucionarlo mañana a primera hora.",score:2,reaction:"client",feedback:"Info clara + propuesta de solución rápida."},
{text:"Puede ser varias cosas, hay que verlo en persona.",score:1,reaction:"client",feedback:"Correcto pero vago; el cliente quiere fechas."},
{text:"Uf, eso no pinta bien. Puede ser caro.",score:0,reaction:"client",feedback:"Genera alarma innecesaria sin ofrecer solución."}
]
},
{
messages:[
{from:"client",text:"Vale, mañana me viene bien. ¿A qué hora vendrían?"}
],
options:[
{text:"Entre 9 y 10h. Le confirmo por SMS. ¿Algo más?",score:2,reaction:"mentor",feedback:"Cierre profesional con confirmación y apertura."},
{text:"Por la mañana, ya le llamamos antes de ir.",score:1,reaction:"mentor",feedback:"Aceptable pero poco concreto para el cliente."},
{text:"Cuando podamos, tenemos muchos avisos.",score:0,reaction:"mentor",feedback:"Transmite desorganización y falta de interés."}
]
}
];

let currentTurn=0,chatHistory=[],answers=[];
const scene=document.getElementById('scene');

function render(){
if(currentTurn>=turns.length){showResults();return}
const turn=turns[currentTurn];
scene.innerHTML=`
<div class="hud">
<div class="hud-titles">
<div class="brand">🗣️ Tu primera llamada</div>
<div class="subtitle">Elige cómo responder al cliente</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i style="width:${(currentTurn/turns.length)*100}%"></i></div></div>
<span class="badge">${currentTurn+1}/${turns.length}</span>
</div>
</div>
<div class="chat-container" id="chatBox"></div>
<div class="options-container" id="optionsBox"></div>
`;
renderChat();
renderOptions();
ensureFits();
}

function renderChat(){
const chatBox=document.getElementById('chatBox');
let html='';
chatHistory.forEach(msg=>{
const isPlayer=msg.from==='player';
html+=`<div class="chat-bubble ${isPlayer?'player':'npc'}">
<div class="bubble-header">
<img src="${characters[msg.from].avatar}" class="bubble-avatar" alt="">
<span class="bubble-name">${characters[msg.from].name}</span>
</div>
<div class="bubble-text" style="${isPlayer?'color:#000':''}">${msg.text}</div>
</div>`;
});
const turn=turns[currentTurn];
turn.messages.forEach(msg=>{
html+=`<div class="chat-bubble npc">
<div class="bubble-header">
<img src="${characters[msg.from].avatar}" class="bubble-avatar" alt="">
<span class="bubble-name">${characters[msg.from].name}</span>
</div>
<div class="bubble-text">${msg.text}</div>
</div>`;
});
chatBox.innerHTML=html;
chatBox.scrollTop=chatBox.scrollHeight;
}

function renderOptions(){
const optionsBox=document.getElementById('optionsBox');
const turn=turns[currentTurn];
optionsBox.innerHTML=turn.options.map((opt,i)=>
`<button class="btn-option chat-option" onclick="selectOption(${i})">${opt.text}</button>`
).join('');
}

function selectOption(i){
const turn=turns[currentTurn];
const opt=turn.options[i];
chatHistory.push(...turn.messages);
chatHistory.push({from:'player',text:opt.text});
answers.push({turn:currentTurn+1,text:opt.text,score:opt.score,feedback:opt.feedback,maxScore:2});
currentTurn++;
render();
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const total=answers.reduce((a,b)=>a+b.score,0);
const max=answers.length*2;
const pct=Math.round((total/max)*100);
let tip="";
if(pct>=80)tip="¡Excelente! Dominas la comunicación con clientes.";
else if(pct>=50)tip="Buen trabajo, pero practica la empatía inicial.";
else tip="Revisa cómo presentarte y calmar al cliente antes de diagnosticar.";

scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">📞 Llamada completada</div>
<div class="results-score">${total}/${max}</div>
<div class="results-subtitle">${pct}% de comunicación óptima</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`
<div class="result-item ${a.score===2?'correct':a.score===1?'partial':'incorrect'}">
<div class="result-question">Turno ${a.turn}</div>
<div class="result-answer">${a.score===2?'✓ Óptima':a.score===1?'◐ Parcial':'✗ Mejorable'}</div>
<div class="result-explanation">${a.feedback}</div>
</div>
`).join('')}
<div class="result-item tip">
<div class="result-question">💡 Consejo práctico</div>
<div class="result-explanation">${tip} En primeras llamadas, usa: "Buenos días, soy [nombre] de [empresa]. Entiendo su situación, vamos a solucionarlo."</div>
</div>
</div>
<div class="footer fixed-footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>
`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));

const style=document.createElement('style');
style.textContent=`
.chat-container{flex:1;overflow-y:auto;padding:8px 16px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.chat-bubble{display:flex;flex-direction:column;padding:10px 12px;border-radius:16px;max-width:85%;animation:fadeIn .3s ease;}
.chat-bubble.npc{background:var(--surface);align-self:flex-start;border-bottom-left-radius:4px;}
.chat-bubble.player{background:var(--accent);align-self:flex-end;border-bottom-right-radius:4px;}
.chat-bubble.player .bubble-text{color:#000 !important;font-weight:600;}
.bubble-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.bubble-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.bubble-name{font-size:11px;font-weight:700;opacity:.8;}
.bubble-text{font-size:14px;line-height:1.4;}
.options-container{padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px;background:var(--bg);border-top:1px solid var(--surface);}
.chat-option{text-align:left;font-size:13px;padding:12px 14px;line-height:1.3;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-item.partial{border-left:4px solid #FF9800;background:rgba(255,152,0,.1);}
.result-item.tip{border-left:4px solid var(--accent);background:rgba(255,224,0,.15);}
.fixed-footer{position:sticky;bottom:0;background:var(--bg);padding:16px;margin-top:auto;}
.results-scroll{display:flex;flex-direction:column;min-height:100%;padding-bottom:0;}
`;
document.head.appendChild(style);
</script>
</body>
</html>
