
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧠 Conecta los Conceptos: EPIs Edition - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s ease;font-family:'Baloo 2',sans-serif;text-align:center;padding:4px;box-sizing:border-box;user-select:none;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:center;gap:16px;font-size:14px;color:#0B214A;font-family:'Baloo 2',sans-serif;margin:8px 0;}
.stats-row span{background:rgba(255,255,255,0.9);padding:4px 12px;border-radius:12px;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🧠 EPIs Edition</div>
<div class="subtitle">Empareja cada EPI con su función</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para encontrar parejas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairsData=[
{id:1,a:"Casco",b:"Protección craneal",exp:"El casco protege la cabeza de impactos y caídas de objetos."},
{id:2,a:"Guantes",b:"Protección de manos",exp:"Los guantes evitan cortes, quemaduras y contacto con sustancias."},
{id:3,a:"Gafas de seguridad",b:"Protección ocular",exp:"Las gafas protegen los ojos de partículas y salpicaduras."},
{id:4,a:"Arnés",b:"Protección anticaídas",exp:"El arnés es obligatorio en trabajos en altura (+2m)."}
];
let cards=[],firstCard=null,secondCard=null,locked=false,attempts=0,matched=0,maxAttempts=10,answers=[];
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function init(){
cards=[];
pairsData.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
ensureFits();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>handleClick(i,div);
board.appendChild(div);
});
}

function handleClick(idx,el){
if(locked)return;
if(el.classList.contains('matched')||el.classList.contains('revealed'))return;
revealCard(el,idx);
if(!firstCard){
firstCard={idx,el};
}else if(firstCard.idx!==idx){
secondCard={idx,el};
locked=true;
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
checkMatch();
}
}

function revealCard(el,idx){
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[idx].text;
}

function coverCard(el,idx){
el.classList.remove('revealed','pop');
el.classList.add('covered');
el.textContent='?';
}

function checkMatch(){
const c1=cards[firstCard.idx],c2=cards[secondCard.idx];
const isMatch=c1.pairId===c2.pairId&&c1.type!==c2.type;
if(isMatch){
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matched++;
pairsEl.textContent=`${matched}/4 parejas`;
const pair=pairsData.find(p=>p.id===c1.pairId);
answers.push({epi:pair.a,funcion:pair.b,exp:pair.exp,found:true});
resetSelection();
if(matched===4)endGame(true);
}else{
setTimeout(()=>{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('shake');
secondCard.el.classList.remove('shake');
coverCard(firstCard.el,firstCard.idx);
coverCard(secondCard.el,secondCard.idx);
resetSelection();
if(attempts>=maxAttempts)endGame(false);
},500);
},1500);
}
}

function resetSelection(){firstCard=null;secondCard=null;locked=false;}

function endGame(won){
const missing=pairsData.filter(p=>!answers.find(a=>a.epi===p.a));
missing.forEach(m=>answers.push({epi:m.a,funcion:m.b,exp:m.exp,found:false}));
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${won?'¡Excelente!':'¡Sigue practicando!'}</div>
<div class="results-score">${matched}/4</div>
<div class="results-subtitle">Parejas encontradas en ${attempts} intentos</div>
</div>
<div class="results-list">
${pairsData.map(p=>{
const wasFound=answers.find(a=>a.epi===p.a&&a.found);
return `<div class="result-item ${wasFound?'correct':'incorrect'}">
<div class="result-question">${p.a} ↔ ${p.b}</div>
<div class="result-answer">${wasFound?'✓ Emparejado':'✗ No encontrado'}</div>
<div class="result-explanation">${p.exp}</div>
</div>`;
}).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
init();
</script>
</body>
</html>
