
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o Realidad? ⚡ EPIs bajo la lupa - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o Realidad? ⚡</div>
<div class="subtitle">EPIs bajo la lupa</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress-bar" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Verdadero o Falso? Decide rápido</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="intro-modal">
<div class="modal">
<div class="modal-title">Primera semana en obra ⚡</div>
<div class="modal-body">El encargado te reta: demuestra cuánto sabes sobre EPIs antes de pisar la obra.</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">¡Acepto el reto!</button>
</div>
</div>
</div>

<script>
const statements = [
{
text: "Los guantes de látex sirven para trabajos eléctricos",
answer: false,
explanation: "Falso. Los guantes de látex NO protegen contra descargas eléctricas. Se deben usar guantes dieléctricos homologados según la tensión de trabajo."
},
{
text: "El casco debe cambiarse tras un golpe fuerte aunque parezca intacto",
answer: true,
explanation: "Verdadero. Un impacto puede dañar la estructura interna del casco sin señales visibles, comprometiendo su capacidad de protección."
},
{
text: "Las gafas de seguridad son opcionales si no hay chispas visibles",
answer: false,
explanation: "Falso. Las gafas protegen contra partículas, polvo y salpicaduras. Son obligatorias en muchas tareas aunque no haya chispas."
},
{
text: "El calzado de seguridad protege contra descargas eléctricas en todos los casos",
answer: false,
explanation: "Falso. Solo el calzado con certificación específica (aislante) protege contra riesgos eléctricos. No todo calzado de seguridad es aislante."
},
{
text: "El arnés de seguridad debe revisarse antes de cada uso",
answer: true,
explanation: "Verdadero. Inspeccionar costuras, hebillas y cintas antes de cada uso es obligatorio para detectar desgaste o daños."
},
{
text: "Un EPI prestado por un compañero es igual de seguro",
answer: false,
explanation: "Falso. Los EPIs deben estar ajustados al usuario. Un equipo mal ajustado puede no proteger adecuadamente o causar accidentes."
},
{
text: "Los EPIs tienen fecha de caducidad aunque no se usen",
answer: true,
explanation: "Verdadero. Los materiales se degradan con el tiempo. Consulta siempre la vida útil indicada por el fabricante."
}
];

let currentIndex = 0;
let score = 0;
let answers = [];
let canAnswer = true;

const scene = document.getElementById('scene');
const statementArea = document.getElementById('statement-area');
const optionsArea = document.getElementById('options');
const progressBar = document.getElementById('progress-bar');
const counter = document.getElementById('counter');
const introModal = document.getElementById('intro-modal');

function startGame() {
    introModal.classList.remove('active');
    renderQuestion();
}

function renderQuestion() {
    if (currentIndex >= statements.length) {
        showResults();
        return;
    }
    
    canAnswer = true;
    const stmt = statements[currentIndex];
    
    progressBar.style.width = ((currentIndex) / statements.length * 100) + '%';
    counter.textContent = (currentIndex + 1) + '/' + statements.length;
    
    statementArea.innerHTML = `<div class="statement-text">${stmt.text}</div>`;
    
    optionsArea.innerHTML = `
        <button class="btn-option" id="btn-true" onclick="selectAnswer(true)">✓ Verdadero</button>
        <button class="btn-option" id="btn-false" onclick="selectAnswer(false)">✗ Falso</button>
    `;
    
    ensureFits();
}

function selectAnswer(userAnswer) {
    if (!canAnswer) return;
    canAnswer = false;
    
    const stmt = statements[currentIndex];
    const isCorrect = userAnswer === stmt.answer;
    
    const btnTrue = document.getElementById('btn-true');
    const btnFalse = document.getElementById('btn-false');
    
    if (userAnswer === true) {
        btnTrue.classList.add(isCorrect ? 'correct' : 'incorrect');
    } else {
        btnFalse.classList.add(isCorrect ? 'correct' : 'incorrect');
    }
    
    if (isCorrect) score++;
    
    answers.push({
        text: stmt.text,
        userAnswer: userAnswer,
        correctAnswer: stmt.answer,
        isCorrect: isCorrect,
        explanation: stmt.explanation
    });
    
    setTimeout(() => {
        currentIndex++;
        renderQuestion();
    }, 1000);
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        
        const resultsHTML = answers.map(a => `
            <div class="result-item ${a.isCorrect ? 'correct' : 'incorrect'}">
                <div class="result-question">${a.text}</div>
                <div class="result-answer">
                    Tu respuesta: ${a.userAnswer ? 'Verdadero' : 'Falso'} ${a.isCorrect ? '✓' : '✗'}
                    ${!a.isCorrect ? `<br>Correcta: ${a.correctAnswer ? 'Verdadero' : 'Falso'}` : ''}
                </div>
                <div class="result-explanation">${a.explanation}</div>
            </div>
        `).join('');
        
        scene.innerHTML = `
            <div class="results-scroll">
                <div class="results-header">
                    <div class="results-title">¡Reto completado!</div>
                    <div class="results-score">${score}/${statements.length}</div>
                    <div class="results-subtitle">Respuestas correctas</div>
                </div>
                <div class="results-list">
                    ${resultsHTML}
                </div>
                <div class="result-item" style="background: var(--surface-alt, #f0f4ff); border-left: 4px solid var(--accent, #6366f1);">
                    <div class="result-question">💡 Consejo del encargado</div>
                    <div class="result-explanation">Antes de cada jornada, revisa tus EPIs: busca grietas, desgaste o daños. Si algo falla, cámbialo. Tu seguridad no es negociable.</div>
                </div>
                <div class="footer">
                    <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
                </div>
            </div>
        `;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
            action: 'TASK_COMPLETED'
        }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        document.documentElement.style.setProperty('--ui-scale', Math.max(0.88, scene.clientHeight / scene.scrollHeight));
    }
}

window.addEventListener('load', () => {
    introModal.classList.add('active');
    ensureFits();
});
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
