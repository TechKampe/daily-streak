
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧠 Conecta los Conceptos: Seguridad en Obra - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform 0.2s ease;font-family:'Baloo 2',cursive;box-sizing:border-box;padding:4px;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease;}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:space-between;font-size:14px;color:#0B214A;padding:0 16px;margin-bottom:8px;font-family:'Baloo 2',cursive;}
.stats-row span{font-weight:500;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🧠 Seguridad en Obra</div>
<div class="subtitle">Empareja cada EPI con su función</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para encontrar parejas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairsData=[
{id:1,a:"Casco",b:"Protege la cabeza",exp:"El casco es obligatorio en obra para proteger de caídas de objetos y golpes."},
{id:2,a:"Guantes",b:"Protege las manos",exp:"Los guantes evitan cortes, quemaduras y contacto con sustancias peligrosas."},
{id:3,a:"Gafas",b:"Protege los ojos",exp:"Las gafas de seguridad previenen lesiones por partículas, chispas o salpicaduras."},
{id:4,a:"Arnés",b:"Previene caídas",exp:"El arnés es vital en trabajos en altura para evitar caídas mortales."}
];

let cards=[],firstCard=null,secondCard=null,locked=false,attempts=0,matchedPairs=0,maxAttempts=10,results=[];
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function initGame(){
cards=[];
pairsData.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>flipCard(i,div);
board.appendChild(div);
});
ensureFits();
}

function flipCard(index,el){
if(locked||el.classList.contains('revealed')||el.classList.contains('matched'))return;
const card=cards[index];
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=card.text;

if(!firstCard){
firstCard={index,el,card};
}else{
secondCard={index,el,card};
locked=true;
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
checkMatch();
}
}

function checkMatch(){
const isMatch=firstCard.card.pairId===secondCard.card.pairId&&firstCard.card.type!==secondCard.card.type;
if(isMatch){
setTimeout(()=>{
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matchedPairs++;
pairsEl.textContent=`${matchedPairs}/4 parejas`;
const pair=pairsData.find(p=>p.pairId===firstCard.card.pairId);
results.push({pair,found:true});
resetTurn();
if(matchedPairs===4)endGame(true);
},300);
}else{
setTimeout(()=>{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('revealed','shake');
firstCard.el.classList.add('covered');
firstCard.el.textContent='?';
secondCard.el.classList.remove('revealed','shake');
secondCard.el.classList.add('covered');
secondCard.el.textContent='?';
resetTurn();
if(attempts>=maxAttempts)endGame(false);
},500);
},1500);
}
}

function resetTurn(){firstCard=null;secondCard=null;locked=false;}

function endGame(won){
const missing=pairsData.filter(p=>!results.find(r=>r.pair.id===p.id));
missing.forEach(p=>results.push({pair:p,found:false}));
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${won?'¡Excelente trabajo!':'¡Sigue practicando!'}</div>
<div class="results-score">${matchedPairs}/4</div>
<div class="results-subtitle">Parejas encontradas en ${attempts} intentos</div>
</div>
<div class="results-list">
${pairsData.map(p=>{
const found=results.find(r=>r.pair.id===p.id&&r.found);
return `<div class="result-item ${found?'correct':'incorrect'}">
<div class="result-question">${p.a} → ${p.b}</div>
<div class="result-answer">${found?'✓ Emparejado':'✗ No encontrado'}</div>
<div class="result-explanation">${p.exp}</div>
</div>`;
}).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{initGame();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
