
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-container">
<p id="statement"></p>
</div>
<div class="options" id="options">
<button class="btn-option" id="btn-true" onclick="answer(true)">✓ Verdadero</button>
<button class="btn-option" id="btn-false" onclick="answer(false)">✗ Falso</button>
</div>
</div>
<div class="footer">
<div class="helper">Decide si la afirmación es verdadera o falsa</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"La corriente doméstica de 230V no es peligrosa porque es de bajo voltaje.",correct:false,exp:"MITO. 230V puede ser mortal. Corrientes de solo 30mA atravesando el corazón pueden causar fibrilación ventricular."},
{text:"Antes de trabajar en una instalación eléctrica, siempre hay que cortar la corriente y verificar ausencia de tensión.",correct:true,exp:"REALIDAD. Es la regla de oro de la seguridad eléctrica. Nunca confíes solo en el interruptor, verifica con un comprobador."},
{text:"Los guantes de trabajo normales protegen contra descargas eléctricas.",correct:false,exp:"MITO. Solo los guantes dieléctricos homologados protegen contra electricidad. Los guantes normales no aíslan."},
{text:"Trabajar con las manos mojadas aumenta el riesgo de electrocución.",correct:true,exp:"REALIDAD. El agua reduce la resistencia de la piel, permitiendo que pase más corriente a través del cuerpo."},
{text:"Un cable pelado que no echa chispas está seguro y se puede tocar.",correct:false,exp:"MITO. Un cable con tensión puede no mostrar señales visibles pero seguir siendo mortal al contacto."},
{text:"Los cuadros eléctricos deben estar siempre señalizados con el símbolo de riesgo eléctrico.",correct:true,exp:"REALIDAD. La señalización es obligatoria por normativa para advertir del peligro y evitar accidentes."},
{text:"Si alguien sufre una descarga, hay que apartarlo inmediatamente con las manos.",correct:false,exp:"MITO. Nunca toques directamente a la víctima. Corta la corriente primero o usa material aislante para separarlo."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),stEl=document.getElementById('statement'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),btnTrue=document.getElementById('btn-true'),btnFalse=document.getElementById('btn-false'),optsDiv=document.getElementById('options');

function render(){
if(idx>=statements.length){showResults();return}
const s=statements[idx];
stEl.textContent=s.text;
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
btnTrue.className='btn-option';
btnFalse.className='btn-option';
btnTrue.disabled=false;
btnFalse.disabled=false;
ensureFits();
}

function answer(userAnswer){
btnTrue.disabled=true;
btnFalse.disabled=true;
const correct=userAnswer===statements[idx].correct;
const clickedBtn=userAnswer?btnTrue:btnFalse;
clickedBtn.classList.add(correct?'correct':'incorrect');
answers.push({text:statements[idx].text,userAnswer,correctAnswer:statements[idx].correct,correct,exp:statements[idx].exp});
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`
<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${i+1}. ${a.text}</div>
<div class="result-answer">Tu respuesta: ${a.userAnswer?'Verdadero':'Falso'} ${a.correct?'✓':'✗'} | Correcta: ${a.correctAnswer?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>
`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo práctico:</strong> Recuerda siempre las 5 reglas de oro: 1) Desconectar, 2) Prevenir reconexión, 3) Verificar ausencia de tensión, 4) Poner a tierra, 5) Señalizar la zona.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
