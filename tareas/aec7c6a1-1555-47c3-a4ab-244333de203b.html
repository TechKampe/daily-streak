
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o Realidad? ⚡ Seguridad Eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o Realidad? ⚡</div>
<div class="subtitle">Seguridad Eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Es verdadero o falso?</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"La baja tensión (230V) no es peligrosa porque es la que usamos en casa.",answer:false,exp:"FALSO. 230V puede ser mortal. Solo 50mA atravesando el corazón pueden causar fibrilación ventricular."},
{text:"Siempre hay que verificar ausencia de tensión con un comprobador antes de trabajar.",answer:true,exp:"VERDADERO. Es la regla de oro número 1. Nunca confíes solo en que el interruptor está apagado."},
{text:"La madera seca es un buen aislante y me protege de descargas eléctricas.",answer:false,exp:"FALSO. La madera puede absorber humedad y conducir electricidad. Solo los EPIs certificados garantizan protección."},
{text:"Los guantes aislantes deben revisarse visualmente antes de cada uso.",answer:true,exp:"VERDADERO. Busca grietas, cortes o deformaciones. Un guante dañado no protege."},
{text:"Si el diferencial no salta, significa que puedo trabajar con seguridad.",answer:false,exp:"FALSO. El diferencial puede fallar o no cubrir todos los circuitos. Siempre verifica con comprobador."},
{text:"Debo señalizar el cuadro eléctrico cuando trabajo en una instalación.",answer:true,exp:"VERDADERO. Coloca cartel de 'Trabajos en curso - No conectar' para evitar que alguien restablezca la corriente."},
{text:"Con zapatos de goma normales estoy protegido contra descargas eléctricas.",answer:false,exp:"FALSO. Solo el calzado dieléctrico certificado ofrece protección real. El calzado común no es EPI."}
];
let idx=0,score=0,answers=[],locked=false;
const scene=document.getElementById('scene'),stArea=document.getElementById('statement-area'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=statements.length){showResults();return}
locked=false;
const s=statements[idx];
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
stArea.innerHTML=`<div class="statement-text">${s.text}</div>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="choose(true)">✓ Verdadero</button><button class="btn-option" id="btn-false" onclick="choose(false)">✗ Falso</button>`;
ensureFits();
}

function choose(val){
if(locked)return;
locked=true;
const s=statements[idx];
const correct=val===s.answer;
if(correct)score++;
answers.push({text:s.text,userAnswer:val,correctAnswer:s.answer,correct,exp:s.exp});
const btnTrue=document.getElementById('btn-true');
const btnFalse=document.getElementById('btn-false');
if(val===true){
btnTrue.classList.add(correct?'correct':'incorrect');
}else{
btnFalse.classList.add(correct?'correct':'incorrect');
}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Prueba completada!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text}</div>
<div class="result-answer">${a.correct?'✓ Correcto':'✗ Respondiste: '+(a.userAnswer?'Verdadero':'Falso')}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo final:</strong> Aplica siempre las 5 reglas de oro: desconectar, enclavamiento, verificar ausencia de tensión, puesta a tierra y señalización. Tu vida depende de ello.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
