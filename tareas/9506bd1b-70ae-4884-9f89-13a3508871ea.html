
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Primero lo primero: ordena como un pro - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔧 Ordena como un pro</div>
<div class="subtitle" id="subtitle">Cargando...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">Reto 1/3</span>
</div>
</div>
<div class="main" id="main"></div>
<div class="footer">
<div class="helper" id="helper">Ordena los pasos con ↑↓ o arrastrando</div>
<button class="cta" id="cta">Confirmar orden</button>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">👷 Evaluación técnica</div>
<div class="modal-body">Tu supervisor te observa mientras ejecutas 3 procedimientos básicos. Ordena los pasos correctamente.</div>
<div class="modal-actions">
<button class="cta" onclick="closeModal()">Comenzar</button>
</div>
</div>
</div>

<script>
const challenges = [
{
title: "Preparar herramienta eléctrica",
steps: [
{ id: 1, text: "Revisar cable y conexiones" },
{ id: 2, text: "Conectar a la red eléctrica" },
{ id: 3, text: "Verificar funcionamiento" },
{ id: 4, text: "Usar la herramienta" },
{ id: 5, text: "Desconectar al terminar" }
],
correct: [1, 2, 3, 4, 5],
tip: "Siempre revisa el cable antes de conectar para evitar descargas."
},
{
title: "Orden y limpieza del puesto",
steps: [
{ id: 1, text: "Despejar la zona de trabajo" },
{ id: 2, text: "Clasificar materiales" },
{ id: 3, text: "Limpiar superficies" },
{ id: 4, text: "Inspeccionar el área" },
{ id: 5, text: "Reportar incidencias" }
],
correct: [1, 2, 3, 4, 5],
tip: "Un puesto ordenado reduce accidentes y mejora la productividad."
},
{
title: "Reportar una incidencia",
steps: [
{ id: 1, text: "Identificar el problema" },
{ id: 2, text: "Documentar con fotos/notas" },
{ id: 3, text: "Comunicar al supervisor" },
{ id: 4, text: "Esperar instrucciones" },
{ id: 5, text: "Actuar según indicaciones" }
],
correct: [1, 2, 3, 4, 5],
tip: "Documenta siempre antes de comunicar para dar información precisa."
}
];

let currentChallenge = 0;
let currentOrder = [];
let results = [];
let draggedItem = null;
let draggedIndex = -1;

const scene = document.getElementById('scene');
const main = document.getElementById('main');
const cta = document.getElementById('cta');
const subtitle = document.getElementById('subtitle');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const helper = document.getElementById('helper');
const modal = document.getElementById('modal');

function closeModal() {
    modal.classList.remove('active');
    renderChallenge();
}

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function renderChallenge() {
    if (currentChallenge >= challenges.length) {
        showResults();
        return;
    }
    const ch = challenges[currentChallenge];
    currentOrder = shuffle(ch.steps);
    subtitle.textContent = ch.title;
    progress.style.width = ((currentChallenge) / challenges.length * 100) + '%';
    counter.textContent = `Reto ${currentChallenge + 1}/${challenges.length}`;
    helper.textContent = "Ordena los pasos con ↑↓ o arrastrando";
    cta.textContent = "Confirmar orden";
    cta.onclick = confirmOrder;
    cta.disabled = false;
    renderCards();
    ensureFits();
}

function renderCards() {
    main.innerHTML = `<div class="cards" id="cards"></div>`;
    const container = document.getElementById('cards');
    currentOrder.forEach((step, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.draggable = true;
        card.dataset.idx = idx;
        card.innerHTML = `
            <span class="card-num">${idx + 1}</span>
            <span class="card-text">${step.text}</span>
            <div class="card-controls">
                <button class="btn-ghost" aria-label="Subir" onclick="moveUp(${idx})">↑</button>
                <button class="btn-ghost" aria-label="Bajar" onclick="moveDown(${idx})">↓</button>
            </div>
        `;
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('drop', handleDrop);
        card.addEventListener('touchstart', handleTouchStart, { passive: false });
        card.addEventListener('touchmove', handleTouchMove, { passive: false });
        card.addEventListener('touchend', handleTouchEnd);
        container.appendChild(card);
    });
}

function moveUp(idx) {
    if (idx <= 0) return;
    [currentOrder[idx], currentOrder[idx - 1]] = [currentOrder[idx - 1], currentOrder[idx]];
    renderCards();
    animateCard(idx - 1);
}

function moveDown(idx) {
    if (idx >= currentOrder.length - 1) return;
    [currentOrder[idx], currentOrder[idx + 1]] = [currentOrder[idx + 1], currentOrder[idx]];
    renderCards();
    animateCard(idx + 1);
}

function animateCard(idx) {
    const cards = document.querySelectorAll('.card');
    if (cards[idx]) {
        cards[idx].style.transform = 'scale(1.02)';
        setTimeout(() => { cards[idx].style.transform = ''; }, 150);
    }
}

function handleDragStart(e) {
    draggedItem = this;
    draggedIndex = parseInt(this.dataset.idx);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd() {
    this.classList.remove('dragging');
    draggedItem = null;
    draggedIndex = -1;
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
    e.preventDefault();
    const targetIdx = parseInt(this.dataset.idx);
    if (draggedIndex !== -1 && draggedIndex !== targetIdx) {
        const item = currentOrder.splice(draggedIndex, 1)[0];
        currentOrder.splice(targetIdx, 0, item);
        renderCards();
    }
}

let touchStartY = 0;
let touchCard = null;
let touchCardIdx = -1;

function handleTouchStart(e) {
    touchCard = this;
    touchCardIdx = parseInt(this.dataset.idx);
    touchStartY = e.touches[0].clientY;
    this.classList.add('dragging');
}

function handleTouchMove(e) {
    if (!touchCard) return;
    e.preventDefault();
    const touchY = e.touches[0].clientY;
    const cards = document.querySelectorAll('.card');
    let targetIdx = touchCardIdx;
    cards.forEach((card, idx) => {
        const rect = card.getBoundingClientRect();
        if (touchY > rect.top && touchY < rect.bottom && idx !== touchCardIdx) {
            targetIdx = idx;
        }
    });
    if (targetIdx !== touchCardIdx) {
        const item = currentOrder.splice(touchCardIdx, 1)[0];
        currentOrder.splice(targetIdx, 0, item);
        touchCardIdx = targetIdx;
        renderCards();
        const newCards = document.querySelectorAll('.card');
        if (newCards[targetIdx]) newCards[targetIdx].classList.add('dragging');
    }
}

function handleTouchEnd() {
    if (touchCard) touchCard.classList.remove('dragging');
    touchCard = null;
    touchCardIdx = -1;
}

function confirmOrder() {
    const ch = challenges[currentChallenge];
    const userOrder = currentOrder.map(s => s.id);
    const isCorrect = JSON.stringify(userOrder) === JSON.stringify(ch.correct);
    results.push({
        title: ch.title,
        userOrder: currentOrder.map(s => s.text),
        correctOrder: ch.steps.map(s => s.text),
        isCorrect,
        tip: ch.tip
    });
    showFeedback(isCorrect);
}

function showFeedback(isCorrect) {
    const ch = challenges[currentChallenge];
    const result = results[results.length - 1];
    let html = `<div class="feedback-box">`;
    if (isCorrect) {
        html += `<div class="feedback-title correct">✅ ¡Orden correcto!</div>`;
        html += `<div class="feedback-list">`;
        result.correctOrder.forEach((s, i) => {
            html += `<div class="feedback-step">${i + 1}. ${s}</div>`;
        });
        html += `</div>`;
    } else {
        html += `<div class="feedback-title incorrect">❌ Orden incorrecto</div>`;
        html += `<div class="feedback-section"><strong>Tu orden:</strong></div>`;
        html += `<div class="feedback-list">`;
        result.userOrder.forEach((s, i) => {
            html += `<div class="feedback-step">${i + 1}. ${s}</div>`;
        });
        html += `</div>`;
        html += `<div class="feedback-section"><strong>✅ Orden correcto:</strong></div>`;
        html += `<div class="feedback-list">`;
        result.correctOrder.forEach((s, i) => {
            html += `<div class="feedback-step">${i + 1}. ${s}</div>`;
        });
        html += `</div>`;
    }
    html += `<div class="feedback-tip">💡 ${ch.tip}</div>`;
    html += `</div>`;
    main.innerHTML = html;
    helper.textContent = isCorrect ? "¡Excelente trabajo!" : "Revisa la secuencia correcta";
    cta.textContent = currentChallenge < challenges.length - 1 ? "Siguiente reto" : "Ver resultados";
    cta.onclick = nextChallenge;
    ensureFits();
}

function nextChallenge() {
    currentChallenge++;
    renderChallenge();
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        const correctCount = results.filter(r => r.isCorrect).length;
        let html = `<div class="results-scroll">
            <div class="results-header">
                <div class="results-title">🎯 Evaluación completada</div>
                <div class="results-score">${correctCount}/${results.length}</div>
                <div class="results-subtitle">Secuencias correctas</div>
            </div>
            <div class="results-list">`;
        results.forEach((r, i) => {
            html += `<div class="result-item ${r.isCorrect ? 'correct' : 'incorrect'}">
                <div class="result-question">${i + 1}. ${r.title}</div>
                <div class="result-answer">${r.isCorrect ? '✓ Orden correcto' : '✗ Orden incorrecto'}</div>
                <div class="result-explanation">💡 ${r.tip}</div>
            </div>`;
        });
        html += `</div>
            <div class="footer">
                <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
            </div>
        </div>`;
        scene.innerHTML = html;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'TASK_COMPLETED' }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        const scale = Math.max(0.88, scene.clientHeight / scene.scrollHeight);
        document.documentElement.style.setProperty('--ui-scale', scale);
    }
}

window.addEventListener('load', () => { modal.classList.add('active'); ensureFits(); });
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
