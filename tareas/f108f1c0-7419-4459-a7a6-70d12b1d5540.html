
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Ordena y Conquista: Protocolos del Taller - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔧 Ordena y Conquista</div>
<div class="subtitle" id="subtitle">Ordena los pasos correctamente</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">Reto 1/3</span>
</div>
</div>
<div class="main" id="main"></div>
<div class="footer">
<div class="helper" id="helper">Usa ↑↓ o arrastra para ordenar</div>
<button class="cta" id="cta">Confirmar orden</button>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%202_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">🔧 Primer día en el taller</div>
<div class="modal-body">Tu supervisor te pide demostrar que conoces el orden correcto de los procedimientos antes de tocar cualquier equipo.</div>
<div class="modal-actions">
<button class="cta" onclick="closeModal()">¡Empezar!</button>
</div>
</div>
</div>

<script>
const challenges = [
{
title: "Intervención en aire acondicionado",
steps: [
{ id: 1, text: "Desconectar alimentación eléctrica" },
{ id: 2, text: "Verificar ausencia de tensión" },
{ id: 3, text: "Realizar la intervención técnica" },
{ id: 4, text: "Probar funcionamiento" },
{ id: 5, text: "Reconectar y documentar" }
],
correct: [1, 2, 3, 4, 5],
tip: "Siempre verifica ausencia de tensión con detector homologado antes de tocar."
},
{
title: "Carga de gas refrigerante",
steps: [
{ id: 1, text: "Conectar manómetros al sistema" },
{ id: 2, text: "Verificar vacío en el circuito" },
{ id: 3, text: "Conectar botella de refrigerante" },
{ id: 4, text: "Cargar gas según especificación" },
{ id: 5, text: "Comprobar presiones y cerrar" }
],
correct: [1, 2, 3, 4, 5],
tip: "Nunca cargues gas sin verificar que el circuito está en vacío correcto."
},
{
title: "Limpieza de filtros en split",
steps: [
{ id: 1, text: "Apagar el equipo completamente" },
{ id: 2, text: "Abrir tapa y extraer filtros" },
{ id: 3, text: "Limpiar con agua y jabón neutro" },
{ id: 4, text: "Secar completamente los filtros" },
{ id: 5, text: "Reinstalar y cerrar tapa" }
],
correct: [1, 2, 3, 4, 5],
tip: "Filtros húmedos pueden dañar el equipo. Sécalos siempre al 100%."
}
];

let currentChallenge = 0;
let currentOrder = [];
let results = [];
let draggedItem = null;
let draggedIndex = -1;

const scene = document.getElementById('scene');
const main = document.getElementById('main');
const cta = document.getElementById('cta');
const subtitle = document.getElementById('subtitle');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const helper = document.getElementById('helper');
const modal = document.getElementById('modal');

function closeModal() {
    modal.classList.remove('active');
    renderChallenge();
}

function shuffleArray(arr) {
    const shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    if (shuffled.every((s, i) => s.id === challenges[currentChallenge].correct[i])) {
        [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]];
    }
    return shuffled;
}

function renderChallenge() {
    if (currentChallenge >= challenges.length) {
        showResults();
        return;
    }
    
    const ch = challenges[currentChallenge];
    currentOrder = shuffleArray([...ch.steps]);
    
    subtitle.textContent = ch.title;
    counter.textContent = `Reto ${currentChallenge + 1}/3`;
    progress.style.width = `${(currentChallenge / 3) * 100}%`;
    helper.textContent = "Usa ↑↓ o arrastra para ordenar";
    cta.textContent = "Confirmar orden";
    cta.onclick = confirmOrder;
    cta.disabled = false;
    
    renderCards();
    ensureFits();
}

function renderCards() {
    main.innerHTML = `<div class="cards" id="cards">${currentOrder.map((step, i) => `
        <div class="card" data-index="${i}" draggable="true">
            <span class="card-num">${i + 1}</span>
            <span class="card-text">${step.text}</span>
            <div class="card-controls">
                <button class="btn-ghost" aria-label="Subir" onclick="moveUp(${i})">↑</button>
                <button class="btn-ghost" aria-label="Bajar" onclick="moveDown(${i})">↓</button>
            </div>
        </div>
    `).join('')}</div>`;
    
    setupDragAndDrop();
}

function setupDragAndDrop() {
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, index) => {
        card.addEventListener('dragstart', (e) => {
            draggedItem = card;
            draggedIndex = index;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        
        card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            draggedItem = null;
            draggedIndex = -1;
        });
        
        card.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });
        
        card.addEventListener('drop', (e) => {
            e.preventDefault();
            const targetIndex = parseInt(card.dataset.index);
            if (draggedIndex !== -1 && draggedIndex !== targetIndex) {
                const item = currentOrder.splice(draggedIndex, 1)[0];
                currentOrder.splice(targetIndex, 0, item);
                renderCards();
                animateCards();
            }
        });
        
        card.addEventListener('touchstart', handleTouchStart, { passive: true });
        card.addEventListener('touchmove', handleTouchMove, { passive: false });
        card.addEventListener('touchend', handleTouchEnd);
    });
}

let touchStartY = 0;
let touchedCard = null;
let touchedIndex = -1;

function handleTouchStart(e) {
    touchedCard = e.currentTarget;
    touchedIndex = parseInt(touchedCard.dataset.index);
    touchStartY = e.touches[0].clientY;
    touchedCard.classList.add('dragging');
}

function handleTouchMove(e) {
    if (!touchedCard) return;
    e.preventDefault();
    const touchY = e.touches[0].clientY;
    const cards = document.querySelectorAll('.card');
    
    cards.forEach((card, index) => {
        if (index === touchedIndex) return;
        const rect = card.getBoundingClientRect();
        const cardCenterY = rect.top + rect.height / 2;
        
        if (Math.abs(touchY - cardCenterY) < rect.height / 2) {
            const item = currentOrder.splice(touchedIndex, 1)[0];
            currentOrder.splice(index, 0, item);
            touchedIndex = index;
            renderCards();
            const newCard = document.querySelectorAll('.card')[index];
            newCard.classList.add('dragging');
            touchedCard = newCard;
        }
    });
}

function handleTouchEnd() {
    if (touchedCard) {
        touchedCard.classList.remove('dragging');
    }
    touchedCard = null;
    touchedIndex = -1;
}

function moveUp(index) {
    if (index > 0) {
        [currentOrder[index], currentOrder[index - 1]] = [currentOrder[index - 1], currentOrder[index]];
        renderCards();
        animateCards();
    }
}

function moveDown(index) {
    if (index < currentOrder.length - 1) {
        [currentOrder[index], currentOrder[index + 1]] = [currentOrder[index + 1], currentOrder[index]];
        renderCards();
        animateCards();
    }
}

function animateCards() {
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        card.style.transform = 'scale(0.98)';
        setTimeout(() => { card.style.transform = ''; }, 150);
    });
}

function confirmOrder() {
    const ch = challenges[currentChallenge];
    const userOrder = currentOrder.map(s => s.id);
    const isCorrect = userOrder.every((id, i) => id === ch.correct[i]);
    
    results.push({
        title: ch.title,
        userOrder: currentOrder.map(s => s.text),
        correctOrder: ch.steps.map(s => s.text),
        isCorrect,
        tip: ch.tip
    });
    
    showFeedback(isCorrect, ch);
}

function showFeedback(isCorrect, ch) {
    const userList = currentOrder.map((s, i) => `<div class="result-step">${i + 1}. ${s.text}</div>`).join('');
    const correctList = ch.steps.map((s, i) => `<div class="result-step">${i + 1}. ${s.text}</div>`).join('');
    
    main.innerHTML = `
        <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}">
            <div class="feedback-title">${isCorrect ? '✅ ¡Orden correcto!' : '❌ Orden incorrecto'}</div>
            ${!isCorrect ? `
                <div class="feedback-section">
                    <div class="feedback-label">Tu orden:</div>
                    ${userList}
                </div>
            ` : ''}
            <div class="feedback-section">
                <div class="feedback-label">${isCorrect ? 'Secuencia:' : '✅ Orden correcto:'}</div>
                ${correctList}
            </div>
            <div class="feedback-tip">💡 ${ch.tip}</div>
        </div>
    `;
    
    helper.textContent = isCorrect ? "¡Excelente trabajo!" : "Revisa el orden correcto";
    cta.textContent = currentChallenge < 2 ? "Siguiente reto" : "Ver resultados";
    cta.onclick = () => {
        currentChallenge++;
        renderChallenge();
    };
    
    ensureFits();
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        
        const correctCount = results.filter(r => r.isCorrect).length;
        
        scene.innerHTML = `
            <div class="results-scroll">
                <div class="results-header">
                    <div class="results-title">🔧 ¡Entrenamiento completado!</div>
                    <div class="results-score">${correctCount}/3</div>
                    <div class="results-subtitle">Procedimientos correctos</div>
                </div>
                <div class="results-list">
                    ${results.map((r, i) => `
                        <div class="result-item ${r.isCorrect ? 'correct' : 'incorrect'}">
                            <div class="result-question">Reto ${i + 1}: ${r.title}</div>
                            <div class="result-answer">${r.isCorrect ? '✓ Orden correcto' : '✗ Orden incorrecto'}</div>
                            <div class="result-explanation">💡 ${r.tip}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="footer">
                    <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
                </div>
            </div>
        `;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'TASK_COMPLETED' }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        document.documentElement.style.setProperty('--ui-scale', Math.max(0.88, scene.clientHeight / scene.scrollHeight));
    }
}

window.addEventListener('load', () => { modal.classList.add('active'); ensureFits(); });
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
