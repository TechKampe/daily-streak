
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔍 Caza el Fallo: Obra en Riesgo - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔍 Caza el Fallo</div>
<div class="subtitle" id="scene-text">Cargando...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/5</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper" id="helper">Toca el elemento con el error</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">🔍 Supervisor Novato</div>
<div class="modal-body">Tu jefe te pide revisar situaciones de obra. Encuentra el error en cada escena antes de que cause problemas.</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">¡Empezar!</button>
</div>
</div>
</div>

<script>
const scenes=[
{text:"Operario cortando baldosas con radial",items:["Radial conectada","Gafas de protección","Sin mascarilla antipolvo","Guantes de trabajo"],error:2,exp:"Cortar baldosas genera polvo de sílice muy dañino para los pulmones."},
{text:"Compañero cambiando enchufe en cocina",items:["Destornillador aislado","Enchufe desmontado","Cuadro eléctrico activo","Calzado de seguridad"],error:2,exp:"Siempre corta el suministro antes de manipular instalaciones eléctricas."},
{text:"Zona de paso junto a andamio montado",items:["Andamio con barandilla","Casco colocado","Zona sin señalizar","Botas con puntera"],error:2,exp:"Las zonas de riesgo deben señalizarse para alertar a todos los trabajadores."},
{text:"Trabajador subido lijando techo",items:["Escalera en ángulo 75°","Mascarilla FFP2","Escalera sobre suelo irregular","Gafas antipolvo"],error:2,exp:"La escalera debe apoyarse en superficie firme y nivelada."},
{text:"Fontanero soldando tubería de cobre",items:["Soplete de gas","Extintor cercano","Guantes ignífugos","Madera seca junto a llama"],error:3,exp:"Materiales inflamables deben retirarse antes de trabajar con llama."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),opts=document.getElementById('options'),sceneText=document.getElementById('scene-text'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),helper=document.getElementById('helper'),modal=document.getElementById('modal');

function startGame(){modal.classList.remove('active');render();}

function render(){
if(idx>=scenes.length){showResults();return}
const s=scenes[idx];
sceneText.textContent=s.text;
prog.style.width=((idx)/scenes.length*100)+'%';
counter.textContent=(idx+1)+'/'+scenes.length;
helper.textContent='Toca el elemento con el error';
opts.innerHTML=s.items.map((item,i)=>`<button class="btn-option" onclick="selectItem(${i})">${item}</button>`).join('');
ensureFits();
}

function selectItem(i){
const s=scenes[idx];
const btns=opts.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{b.disabled=true;if(j===i)b.classList.add('selected');});
const correct=i===s.error;
answers.push({scene:s.text,chosen:s.items[i],correctItem:s.items[s.error],correct,exp:s.exp});
setTimeout(()=>{
btns[i].classList.add(correct?'correct':'incorrect');
if(!correct)btns[s.error].classList.add('correct');
helper.textContent=correct?'✓ ¡Bien visto!':'✗ Error detectado';
setTimeout(()=>{idx++;render();},900);
},300);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">🔍 Inspección Completa</div>
<div class="results-score">${score}/${scenes.length}</div>
<div class="results-subtitle">Errores detectados correctamente</div>
</div>
<div class="results-list">
${answers.map(a=>`
<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.scene}</div>
<div class="result-answer">${a.correct?'✓ '+a.chosen:'✗ Elegiste: '+a.chosen}</div>
${!a.correct?`<div class="result-answer">→ Error real: ${a.correctItem}</div>`:''}
<div class="result-explanation">${a.exp}</div>
</div>
`).join('')}
<div class="result-item">
<div class="result-question">💡 Consejo del supervisor</div>
<div class="result-explanation">La atención al detalle salva vidas. Antes de actuar, observa tu entorno y verifica condiciones de seguridad.</div>
</div>
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{modal.classList.add('active');ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
