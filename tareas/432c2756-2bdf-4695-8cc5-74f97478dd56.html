
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el protocolo 🔧 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Completa el protocolo 🔧</div>
<div class="subtitle">Rellena el hueco con el término correcto</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<p id="phrase"></p>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Tu supervisor espera que demuestres tu conocimiento</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const data=[
{phrase:"Para medir tensión en un enchufe, uso el ___.",blank:"multímetro",opts:["multímetro","buscapolos","pinza amperimétrica"],exp:{buscapolos:"El buscapolos solo detecta presencia de fase, no mide valores.",pinza:"La pinza amperimétrica mide corriente, no tensión."}},
{phrase:"Antes de trabajar en un cuadro, debo ___ la instalación.",blank:"consignar",opts:["consignar","señalizar"],exp:{señalizar:"Señalizar avisa del peligro, pero consignar asegura el corte real."}},
{phrase:"Para protegerme de descargas, uso guantes ___.",blank:"aislantes",opts:["aislantes","de nitrilo","anticorte"],exp:{nitrilo:"Los de nitrilo protegen de químicos, no de electricidad.",anticorte:"Los anticorte evitan heridas mecánicas, no descargas."}},
{phrase:"El dispositivo que corta ante fugas a tierra es el ___.",blank:"diferencial",opts:["diferencial","magnetotérmico"],exp:{magnetotérmico:"El magnetotérmico protege contra sobrecargas y cortocircuitos."}},
{phrase:"Para saber si un cable tiene fase, uso el ___.",blank:"buscapolos",opts:["buscapolos","multímetro","polímetro"],exp:{multímetro:"El multímetro mide valores; el buscapolos detecta fase rápidamente.",polímetro:"Es sinónimo de multímetro; el buscapolos es más directo para detectar fase."}},
{phrase:"Cuando hay riesgo de caída de objetos, uso el ___.",blank:"casco",opts:["casco","guantes","gafas"],exp:{guantes:"Los guantes protegen las manos, no la cabeza.",gafas:"Las gafas protegen los ojos de proyecciones, no de impactos en cabeza."}}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),optsEl=document.getElementById('options'),phraseEl=document.getElementById('phrase'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=data.length){showResults();return}
const d=data[idx];
prog.style.width=(idx/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
phraseEl.innerHTML=d.phrase.replace('___','<u>___</u>');
optsEl.innerHTML=d.opts.map(o=>`<button class="btn-option" onclick="choose('${o}')">${o}</button>`).join('');
ensureFits();
}

function choose(opt){
const d=data[idx];
const correct=opt===d.blank;
answers.push({phrase:d.phrase,blank:d.blank,user:opt,correct,exp:d.exp});
idx++;
setTimeout(render,300);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
let html=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Protocolo completado!</div>
<div class="results-score">${answers.filter(a=>a.correct).length}/${answers.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">`;
answers.forEach(a=>{
const solved=a.phrase.replace('___',`<strong>${a.blank}</strong>`);
let expText='';
if(!a.correct&&a.exp[a.user]){expText=a.exp[a.user];}
else if(!a.correct){const k=Object.keys(a.exp).find(k=>k.toLowerCase()===a.user.toLowerCase());if(k)expText=a.exp[k];}
html+=`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${solved}</div>
<div class="result-answer">${a.correct?'✓ Correcto':'✗ Respondiste: '+a.user}</div>
${expText?`<div class="result-explanation">${expText}</div>`:''}
</div>`;
});
html+=`</div>
<div class="result-item">
<div class="result-explanation"><strong>Consejo:</strong> Usar la terminología precisa evita malentendidos y accidentes. Comunica siempre con claridad en el taller.</div>
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
scene.innerHTML=html;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
