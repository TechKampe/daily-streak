
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i id="progress"></i></div></div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Es verdadero o falso?</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">Primera semana en obra ⚡</div>
<div class="modal-body">El oficial quiere comprobar tus conocimientos de seguridad eléctrica. Decide si cada afirmación es verdadera o falsa.</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">Comenzar</button>
</div>
</div>
</div>

<script>
const data=[
{text:"Los voltajes bajos (menos de 50V) no son peligrosos para las personas.",ans:false,exp:"Incluso voltajes bajos pueden ser mortales en condiciones de humedad o si atraviesan el corazón."},
{text:"Siempre hay que cortar la corriente antes de manipular una instalación eléctrica.",ans:true,exp:"Regla básica de seguridad: cortar tensión, señalizar y verificar ausencia de tensión antes de trabajar."},
{text:"La madera seca es un buen aislante, pero mojada puede conducir electricidad.",ans:true,exp:"La madera húmeda contiene sales disueltas que la convierten en conductora. Nunca confíes en materiales mojados."},
{text:"Los guantes de trabajo normales protegen contra descargas eléctricas.",ans:false,exp:"Solo los guantes dieléctricos homologados protegen. Los guantes de obra estándar no aíslan la electricidad."},
{text:"Si alguien sufre una descarga, hay que apartarlo inmediatamente con las manos.",ans:false,exp:"Nunca toques directamente a la víctima. Corta la corriente o usa un objeto aislante para separarla."},
{text:"Un cuadro eléctrico debe estar siempre señalizado con el símbolo de riesgo eléctrico.",ans:true,exp:"La señalización es obligatoria por normativa para prevenir accidentes y facilitar la identificación."},
{text:"Un verificador de tensión o VAT es imprescindible antes de tocar cualquier cable.",ans:true,exp:"El VAT confirma ausencia de tensión. Nunca asumas que un circuito está sin corriente solo porque el diferencial está bajado."}
];

let idx=0,score=0,answers=[];
const scene=document.getElementById('scene'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),statement=document.getElementById('statement'),modal=document.getElementById('modal');

modal.classList.add('active');

function startGame(){
modal.classList.remove('active');
render();
}

function render(){
if(idx>=data.length){showResults();return}
const d=data[idx];
prog.style.width=((idx)/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
statement.innerHTML=`<p style="font-size:1.15rem;line-height:1.5;text-align:center;padding:1rem 0.5rem;margin:0;">${d.text}</p>`;
opts.innerHTML=`<button class="btn-option" onclick="answer(true)">✓ Verdadero</button><button class="btn-option" onclick="answer(false)">✗ Falso</button>`;
ensureFits();
}

function answer(sel){
const d=data[idx];
const correct=sel===d.ans;
if(correct)score++;
answers.push({text:d.text,correct,exp:d.exp,userAns:sel,correctAns:d.ans});

const btns=opts.querySelectorAll('.btn-option');
btns.forEach(b=>b.disabled=true);
if(sel===true){
btns[0].classList.add(correct?'correct':'incorrect');
}else{
btns[1].classList.add(correct?'correct':'incorrect');
}

setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Evaluación completada!</div>
<div class="results-score">${score}/${data.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text}</div>
<div class="result-answer">${a.correct?'✓ Acertaste':'✗ Fallaste'} — Correcta: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo práctico:</strong> Antes de tocar cualquier conductor, usa siempre el VAT (verificador de ausencia de tensión) en las tres fases y el neutro. Nunca confíes solo en el interruptor.
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
