
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el Manual 📋 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Completa el Manual 📋</div>
<div class="subtitle">Primer día como aprendiz</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<p id="sentence"></p>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Selecciona la palabra correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const clozes=[
{text:"Para medir tensión en un enchufe, uso el ___.",blank:"multímetro",opts:["multímetro","buscapolos","pinza amperimétrica"],exp:"El buscapolos solo detecta presencia de fase; la pinza mide corriente, no tensión."},
{text:"Para pelar cables finos utilizo el ___.",blank:"pelacables",opts:["pelacables","alicates universales"],exp:"Los alicates universales pueden dañar el conductor; el pelacables ajusta el corte."},
{text:"Para saber si un cable tiene fase, toco con el ___.",blank:"buscapolos",opts:["buscapolos","multímetro"],exp:"El multímetro requiere dos puntas; el buscapolos detecta fase con un solo contacto."},
{text:"Para apretar tornillos de mecanismos uso destornillador ___.",blank:"estrella",opts:["estrella","plano"],exp:"Los mecanismos eléctricos suelen llevar tornillos Phillips (estrella)."},
{text:"Para aislar empalmes expuestos al calor, prefiero ___.",blank:"tubo termorretráctil",opts:["tubo termorretráctil","cinta aislante"],exp:"El termorretráctil sella mejor y resiste más temperatura que la cinta."},
{text:"Antes de trabajar en un cuadro con tensión, me pongo ___.",blank:"guantes dieléctricos",opts:["guantes dieléctricos","guantes de nitrilo"],exp:"Los guantes de nitrilo no aíslan; los dieléctricos protegen contra descargas."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),sentenceEl=document.getElementById('sentence'),optsEl=document.getElementById('options'),progEl=document.getElementById('progress'),counterEl=document.getElementById('counter');

function render(){
if(idx>=clozes.length){showResults();return}
const c=clozes[idx];
sentenceEl.innerHTML=c.text.replace("___","<u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u>");
progEl.style.width=(idx/clozes.length*100)+"%";
counterEl.textContent=(idx+1)+"/"+clozes.length;
optsEl.innerHTML=c.opts.map(o=>`<button class="btn-option" onclick="choose('${o}')">${o}</button>`).join('');
ensureFits();
}

function choose(opt){
const c=clozes[idx];
const correct=opt===c.blank;
answers.push({text:c.text,blank:c.blank,user:opt,correct,exp:c.exp});
const btns=optsEl.querySelectorAll('.btn-option');
btns.forEach(b=>{
b.disabled=true;
if(b.textContent===opt)b.classList.add(correct?'correct':'incorrect');
if(b.textContent===c.blank)b.classList.add('correct');
});
sentenceEl.innerHTML=c.text.replace("___",`<u>${c.blank}</u>`);
setTimeout(()=>{idx++;render();},700);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Manual completado!</div>
<div class="results-score">${score}/${clozes.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text.replace("___","<strong>"+a.blank+"</strong>")}</div>
<div class="result-answer">${a.correct?'✓ Correcto':'✗ Tu respuesta: '+a.user}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
<div class="result-item">
<div class="result-question">💡 Consejo final</div>
<div class="result-explanation">Dominar el vocabulario técnico te permite comunicarte con claridad en obra y evitar errores costosos. ¡Sigue practicando!</div>
</div>
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
