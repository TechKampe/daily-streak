
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔍 Encuentra el Fallo: Obra en Marcha - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔍 Encuentra el Fallo</div>
<div class="subtitle" id="sceneText">Cargando...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/5</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper" id="helper">Toca el elemento incorrecto</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const scenes=[
{text:"Un compañero va a cortar azulejos con la radial.",items:["Gafas de seguridad","Guantes de tela finos","Disco de diamante","Mascarilla antipolvo"],error:1,exp:"Los guantes de tela finos no protegen del corte. Se necesitan guantes anticorte para esta tarea."},
{text:"Van a taladrar la pared para pasar cableado eléctrico.",items:["Detector de metales","Taladro percutor","Gafas protectoras","Broca para madera"],error:3,exp:"La broca para madera no sirve en paredes de obra. Se necesita broca de widia o diamante."},
{text:"Instalación de luminarias en el techo del baño.",items:["Escalera de tijera","Cortar luz del cuadro","Silicona para exterior","Conectores estancos"],error:2,exp:"La silicona de exterior no es apta para zonas húmedas interiores. Se necesita silicona antimoho."},
{text:"Preparando mezcla de cemento para reparar fachada.",items:["Cemento portland","Arena de río","Guantes de nitrilo","Agua del grifo"],error:2,exp:"Los guantes de nitrilo no resisten el cemite. Se necesitan guantes de goma gruesos para albañilería."},
{text:"Zona de obra abierta con zanja para tuberías.",items:["Cinta de balizamiento","Casco de seguridad","Botas de vestir","Chaleco reflectante"],error:2,exp:"Las botas de vestir no protegen. Se requieren botas de seguridad con puntera reforzada."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),opts=document.getElementById('options'),sceneText=document.getElementById('sceneText'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),helper=document.getElementById('helper');

function render(){
if(idx>=scenes.length){showResults();return}
const s=scenes[idx];
sceneText.textContent=s.text;
prog.style.width=(idx/scenes.length*100)+'%';
counter.textContent=(idx+1)+'/'+scenes.length;
helper.textContent='Toca el elemento incorrecto';
opts.innerHTML=s.items.map((item,i)=>`<button class="btn-option" onclick="selectItem(${i})">${item}</button>`).join('');
ensureFits();
}

function selectItem(i){
const s=scenes[idx];
const correct=i===s.error;
const btns=opts.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{
b.disabled=true;
if(j===i)b.classList.add(correct?'correct':'incorrect');
if(j===s.error&&!correct)b.classList.add('correct');
});
answers.push({scene:s.text,chosen:s.items[i],correctItem:s.items[s.error],isCorrect:correct,exp:s.exp});
setTimeout(()=>{idx++;render();},800);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.isCorrect).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">🔍 Revisión completada</div>
<div class="results-score">${score}/${scenes.length}</div>
<div class="results-subtitle">Errores detectados correctamente</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`
<div class="result-item ${a.isCorrect?'correct':'incorrect'}">
<div class="result-question">Escena ${i+1}: ${a.scene.substring(0,40)}...</div>
<div class="result-answer">${a.isCorrect?'✓ Correcto: '+a.chosen:'✗ Elegiste: '+a.chosen}</div>
${!a.isCorrect?`<div class="result-answer">→ Era: ${a.correctItem}</div>`:''}
<div class="result-explanation">${a.exp}</div>
</div>
`).join('')}
</div>
<div class="result-item">
<div class="result-question">💡 Consejo del supervisor</div>
<div class="result-explanation">La atención al detalle previene accidentes. Revisa siempre el equipo y materiales antes de empezar cualquier tarea.</div>
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
