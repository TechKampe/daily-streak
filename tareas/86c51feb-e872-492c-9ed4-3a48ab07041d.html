
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>⚡ Primero lo primero: ordena y sobrevive - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">⚡ Ordena y sobrevive</div>
<div class="subtitle" id="subtitle">Ordena los pasos correctamente</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">Reto 1/3</span>
</div>
</div>
<div class="main" id="main"></div>
<div class="footer">
<div class="helper" id="helper">Usa ↑↓ o arrastra para ordenar</div>
<button class="cta" id="cta">Confirmar orden</button>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">🎯 Tu prueba de seguridad</div>
<div class="modal-body">Tu jefe te pone a prueba: ordena los pasos de seguridad eléctrica antes de trabajar solo.</div>
<div class="modal-actions">
<button class="cta" onclick="closeModal()">¡Empezar!</button>
</div>
</div>
</div>

<script>
const sequences = [
{
title: "Antes de manipular un cuadro",
steps: [
"Cortar suministro eléctrico",
"Verificar ausencia de tensión",
"Señalizar zona de trabajo",
"Realizar la intervención",
"Rearmar el sistema"
],
tip: "Siempre verifica ausencia de tensión con detector homologado antes de tocar nada."
},
{
title: "Protocolo LOTO (Bloqueo/Etiquetado)",
steps: [
"Identificar fuentes de energía",
"Notificar a personal afectado",
"Apagar y aislar el equipo",
"Colocar candado y etiqueta",
"Verificar aislamiento efectivo"
],
tip: "Cada trabajador debe poner su propio candado. Nunca retires el de otro."
},
{
title: "Ante descarga de un compañero",
steps: [
"Cortar la corriente si es seguro",
"No tocar a la víctima directamente",
"Llamar a emergencias (112)",
"Iniciar RCP si no respira",
"Esperar a los servicios médicos"
],
tip: "Si no puedes cortar la corriente, usa material aislante para separar a la víctima."
}
];

let currentSeq = 0, userOrders = [], score = 0;
let draggedCard = null, dragStartY = 0, dragStartIndex = -1;

const scene = document.getElementById('scene');
const main = document.getElementById('main');
const cta = document.getElementById('cta');
const subtitle = document.getElementById('subtitle');
const progress = document.getElementById('progress');
const counter = document.getElementById('counter');
const helper = document.getElementById('helper');
const modal = document.getElementById('modal');

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    if (a.every((v, i) => v === arr[i])) {
        [a[0], a[1]] = [a[1], a[0]];
    }
    return a;
}

function closeModal() {
    modal.classList.remove('active');
    renderSequence();
}

function renderSequence() {
    if (currentSeq >= sequences.length) {
        showResults();
        return;
    }
    const seq = sequences[currentSeq];
    subtitle.textContent = seq.title;
    progress.style.width = (currentSeq / sequences.length * 100) + '%';
    counter.textContent = `Reto ${currentSeq + 1}/3`;
    helper.textContent = "Usa ↑↓ o arrastra para ordenar";
    cta.textContent = "Confirmar orden";
    cta.onclick = confirmOrder;
    cta.disabled = false;

    const shuffled = shuffle(seq.steps);
    window.currentOrder = [...shuffled];

    main.innerHTML = `<div class="cards" id="cards"></div>`;
    renderCards();
    ensureFits();
}

function renderCards() {
    const cards = document.getElementById('cards');
    cards.innerHTML = window.currentOrder.map((step, i) => `
        <div class="card" data-index="${i}" draggable="true">
            <span class="card-num">${i + 1}</span>
            <span class="card-text">${step}</span>
            <div class="card-controls">
                <button class="btn-ghost" aria-label="Subir" onclick="moveUp(${i})">↑</button>
                <button class="btn-ghost" aria-label="Bajar" onclick="moveDown(${i})">↓</button>
            </div>
        </div>
    `).join('');
    
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('drop', handleDrop);
        card.addEventListener('touchstart', handleTouchStart, {passive: false});
        card.addEventListener('touchmove', handleTouchMove, {passive: false});
        card.addEventListener('touchend', handleTouchEnd);
    });
}

function moveUp(i) {
    if (i === 0) return;
    [window.currentOrder[i], window.currentOrder[i-1]] = [window.currentOrder[i-1], window.currentOrder[i]];
    renderCards();
    animateSwap(i-1);
}

function moveDown(i) {
    if (i === window.currentOrder.length - 1) return;
    [window.currentOrder[i], window.currentOrder[i+1]] = [window.currentOrder[i+1], window.currentOrder[i]];
    renderCards();
    animateSwap(i);
}

function animateSwap(index) {
    const cards = document.querySelectorAll('.card');
    if (cards[index]) {
        cards[index].style.transform = 'scale(1.02)';
        setTimeout(() => cards[index].style.transform = '', 150);
    }
}

function handleDragStart(e) {
    draggedCard = this;
    dragStartIndex = parseInt(this.dataset.index);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd() {
    this.classList.remove('dragging');
    draggedCard = null;
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function handleDrop(e) {
    e.preventDefault();
    const dropIndex = parseInt(this.dataset.index);
    if (dragStartIndex !== dropIndex && dragStartIndex !== -1) {
        const item = window.currentOrder.splice(dragStartIndex, 1)[0];
        window.currentOrder.splice(dropIndex, 0, item);
        renderCards();
    }
}

function handleTouchStart(e) {
    draggedCard = this;
    dragStartIndex = parseInt(this.dataset.index);
    dragStartY = e.touches[0].clientY;
    this.classList.add('dragging');
}

function handleTouchMove(e) {
    if (!draggedCard) return;
    e.preventDefault();
    const touch = e.touches[0];
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, i) => {
        const rect = card.getBoundingClientRect();
        if (touch.clientY > rect.top && touch.clientY < rect.bottom && i !== dragStartIndex) {
            const item = window.currentOrder.splice(dragStartIndex, 1)[0];
            window.currentOrder.splice(i, 0, item);
            dragStartIndex = i;
            renderCards();
            document.querySelectorAll('.card')[i].classList.add('dragging');
        }
    });
}

function handleTouchEnd() {
    if (draggedCard) draggedCard.classList.remove('dragging');
    draggedCard = null;
    dragStartIndex = -1;
}

function confirmOrder() {
    const seq = sequences[currentSeq];
    const correct = seq.steps;
    const user = [...window.currentOrder];
    const isCorrect = user.every((s, i) => s === correct[i]);
    
    if (isCorrect) score++;
    userOrders.push({ title: seq.title, user, correct, isCorrect, tip: seq.tip });
    
    showFeedback(isCorrect, user, correct, seq.tip);
}

function showFeedback(isCorrect, user, correct, tip) {
    const icon = isCorrect ? '✅' : '❌';
    const title = isCorrect ? 'Orden correcto' : 'Orden incorrecto';
    
    main.innerHTML = `
        <div class="feedback-box">
            <div class="feedback-title">${icon} ${title}</div>
            ${!isCorrect ? `
                <div class="feedback-section">
                    <div class="feedback-label">Tu orden:</div>
                    ${user.map((s, i) => `<div class="feedback-step">${i+1}. ${s}</div>`).join('')}
                </div>
            ` : ''}
            <div class="feedback-section">
                <div class="feedback-label">${isCorrect ? 'Secuencia:' : '✅ Orden correcto:'}</div>
                ${correct.map((s, i) => `<div class="feedback-step correct">${i+1}. ${s}</div>`).join('')}
            </div>
            <div class="feedback-tip">💡 ${tip}</div>
        </div>
    `;
    
    helper.textContent = isCorrect ? "¡Perfecto!" : "Revisa el orden correcto";
    cta.textContent = currentSeq < 2 ? "Siguiente reto" : "Ver resultados";
    cta.onclick = () => { currentSeq++; renderSequence(); };
    ensureFits();
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        
        scene.innerHTML = `
            <div class="results-scroll">
                <div class="results-header">
                    <div class="results-title">¡Prueba completada!</div>
                    <div class="results-score">${score}/3</div>
                    <div class="results-subtitle">Secuencias correctas</div>
                </div>
                <div class="results-list">
                    ${userOrders.map((o, i) => `
                        <div class="result-item ${o.isCorrect ? 'correct' : 'incorrect'}">
                            <div class="result-question">${i+1}. ${o.title}</div>
                            <div class="result-answer">${o.isCorrect ? '✓ Orden correcto' : '✗ Orden incorrecto'}</div>
                            ${!o.isCorrect ? `<div class="result-explanation"><strong>Correcto:</strong> ${o.correct.map((s,j) => `${j+1}. ${s}`).join(' → ')}</div>` : ''}
                            <div class="result-explanation">💡 ${o.tip}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="footer">
                    <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
                </div>
            </div>
        `;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ action: 'TASK_COMPLETED' }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        document.documentElement.style.setProperty('--ui-scale', Math.max(0.88, scene.clientHeight / scene.scrollHeight));
    }
}

window.addEventListener('load', () => { modal.classList.add('active'); ensureFits(); });
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
