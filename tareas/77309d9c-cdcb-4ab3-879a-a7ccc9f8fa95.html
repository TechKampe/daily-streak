
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔧 Elige tu arma: herramientas del oficio - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔧 Elige tu arma</div>
<div class="subtitle" id="task">Cargando tarea...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Elige la herramienta correcta para cada tarea</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const tasks=[
{task:"Cortar un tubo de cobre de 15mm",opts:["Cortatubos","Sierra de arco","Cúter"],ans:0,why:["El cortatubos hace cortes limpios sin deformar el tubo.","La sierra deja rebabas y puede aplastar el tubo.","El cúter no corta metal, solo materiales blandos."],tip:"Usa cortatubos para cobre/plástico; sierra solo si no cabe la herramienta."},
{task:"Pelar un cable eléctrico de 2.5mm²",opts:["Pelacables","Tijeras","Alicates universales"],ans:0,why:["El pelacables ajusta la profundidad sin dañar el conductor.","Las tijeras pueden cortar hilos del cable.","Los alicates no tienen control de profundidad y dañan el cobre."],tip:"El pelacables evita cortar hilos; ajusta el calibre antes de usar."},
{task:"Apretar una tuerca en espacio reducido",opts:["Llave inglesa","Llave fija","Llave Allen"],ans:1,why:["La llave inglesa es muy ancha para espacios reducidos.","La llave fija es compacta y no resbala en la tuerca.","La llave Allen es para tornillos hexagonales interiores, no tuercas."],tip:"Llave fija para tuercas accesibles; inglesa cuando no tengas la medida exacta."},
{task:"Verificar si un enchufe tiene tensión",opts:["Destornillador plano","Destornillador de estrella","Buscapolos"],ans:2,why:["El destornillador plano no detecta tensión, riesgo de descarga.","El de estrella tampoco detecta corriente.","El buscapolos indica presencia de tensión de forma segura."],tip:"Siempre verifica tensión con buscapolos antes de manipular circuitos."},
{task:"Comprobar que un marco está horizontal",opts:["Nivel de burbuja","Flexómetro","Escuadra"],ans:0,why:["El nivel de burbuja indica si la superficie está nivelada.","El flexómetro mide longitud, no inclinación.","La escuadra verifica ángulos de 90°, no horizontalidad."],tip:"Nivel para horizontalidad; escuadra para ángulos rectos; flexómetro para medir."},
{task:"Encajar baldosas sin romperlas",opts:["Martillo metálico","Mazo de goma","Maza"],ans:1,why:["El martillo metálico rompe o marca la baldosa.","El mazo de goma distribuye el golpe sin dañar la superficie.","La maza es demasiado pesada y destructiva para este trabajo."],tip:"Mazo de goma para materiales delicados; martillo para clavos; maza para demolición."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),optsEl=document.getElementById('options'),taskEl=document.getElementById('task'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=tasks.length){showResults();return}
const t=tasks[idx];
taskEl.textContent=t.task;
prog.style.width=(idx/tasks.length*100)+'%';
counter.textContent=(idx+1)+'/'+tasks.length;
optsEl.innerHTML=t.opts.map((o,i)=>`<button class="btn-option" onclick="select(${i})">${o}</button>`).join('');
ensureFits();
}

function select(i){
const t=tasks[idx],correct=i===t.ans;
answers.push({task:t.task,user:t.opts[i],correctTool:t.opts[t.ans],correct,why:t.why,tip:t.tip});
const btns=optsEl.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{
b.disabled=true;
if(j===i){
b.classList.add(correct?'correct':'incorrect');
b.innerHTML=(correct?'✓ ':'✗ ')+t.opts[j];
}
});
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">🔧 ¡Reto completado!</div>
<div class="results-score">${score}/${tasks.length}</div>
<div class="results-subtitle">Herramientas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.task}</div>
<div class="result-answer">${a.correct?'✓ '+a.user:'✗ Elegiste: '+a.user+' → Correcta: '+a.correctTool}</div>
<div class="result-explanation">${a.correct?a.why[0]:a.why[answers.indexOf(a)%3]}</div>
<div class="result-explanation"><strong>Consejo:</strong> ${a.tip}</div>
</div>`).join('')}
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
