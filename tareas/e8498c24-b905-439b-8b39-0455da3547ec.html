
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el Manual del Electricista 🔌 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Manual del Electricista 🔌</div>
<div class="subtitle" id="subtitle">Completa las frases del manual</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main" id="main"></div>
<div class="footer">
<div class="helper" id="helper">Selecciona la palabra correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const clozes=[
{sentence:"El cable de color amarillo-verde es el ___.",blank:"tierra",opts:["tierra","fase","neutro"],exp:"El amarillo-verde identifica siempre la tierra por normativa internacional."},
{sentence:"Antes de trabajar en un cuadro, debo cortar el ___.",blank:"suministro",opts:["suministro","voltaje","cableado"],exp:"Cortar el suministro garantiza que no haya corriente. 'Voltaje' y 'cableado' no se cortan."},
{sentence:"Para detectar tensión sin contacto uso el ___.",blank:"buscapolos",opts:["buscapolos","pelacables","alicate"],exp:"El buscapolos detecta presencia de tensión. El pelacables y alicate son para otras tareas."},
{sentence:"El dispositivo que protege de sobrecargas es el ___.",blank:"magnetotérmico",opts:["magnetotérmico","diferencial","enchufe"],exp:"El magnetotérmico protege de sobrecargas; el diferencial protege de fugas a tierra."},
{sentence:"El cable de color azul corresponde al ___.",blank:"neutro",opts:["neutro","fase","tierra"],exp:"El azul es neutro por normativa. La fase suele ser marrón/negro y tierra es amarillo-verde."},
{sentence:"El dispositivo que protege a las personas es el ___.",blank:"diferencial",opts:["diferencial","magnetotérmico","fusible"],exp:"El diferencial detecta fugas a tierra y protege de electrocución."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),main=document.getElementById('main'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),helper=document.getElementById('helper'),subtitle=document.getElementById('subtitle');

function render(){
if(idx>=clozes.length){showResults();return}
const c=clozes[idx];
prog.style.width=((idx)/clozes.length*100)+'%';
counter.textContent=(idx+1)+'/'+clozes.length;
subtitle.textContent='Frase '+(idx+1)+' de '+clozes.length;
const sentenceHTML=c.sentence.replace('___','<span class="cloze-blank">___</span>');
main.innerHTML=`
<p class="cloze-sentence">${sentenceHTML}</p>
<div class="options" id="options">
${c.opts.map((o,i)=>`<button class="btn-option" data-idx="${i}">${o}</button>`).join('')}
</div>
`;
document.querySelectorAll('#options .btn-option').forEach(btn=>{
btn.onclick=()=>selectOption(parseInt(btn.dataset.idx));
});
ensureFits();
}

function selectOption(i){
const c=clozes[idx];
const correct=c.opts[i]===c.blank;
answers.push({sentence:c.sentence,blank:c.blank,user:c.opts[i],correct,exp:c.exp,opts:c.opts});
const btns=document.querySelectorAll('#options .btn-option');
btns.forEach((btn,j)=>{
btn.disabled=true;
if(j===i)btn.classList.add(correct?'correct':'incorrect');
if(c.opts[j]===c.blank&&!correct)btn.classList.add('correct');
});
const blankEl=document.querySelector('.cloze-blank');
if(blankEl){
blankEl.textContent=c.opts[i];
blankEl.classList.add(correct?'correct':'incorrect');
}
setTimeout(()=>{idx++;render();},900);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Manual completado!</div>
<div class="results-score">${score}/${answers.length}</div>
<div class="results-subtitle">Frases correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`
<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.sentence.replace('___','<strong>'+a.blank+'</strong>')}</div>
<div class="result-answer">${a.correct?'✓ Correcto':'✗ Tu respuesta: '+a.user}</div>
<div class="result-explanation">${a.exp}</div>
</div>
`).join('')}
</div>
<div class="results-tip">
<strong>Consejo:</strong> Dominar la terminología eléctrica es clave para comunicarte con tu equipo y evitar errores peligrosos en obra.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>
`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
