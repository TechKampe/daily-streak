
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>⚡ Conexiones Seguras: Quiz Eléctrico - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">⚡ Conexiones Seguras</div>
<div class="subtitle" id="question">Cargando pregunta...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/5</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Tu primer día como ayudante. ¡Demuestra lo que sabes!</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const quizData = [
{
q: "¿De qué color es el cable de tierra?",
opts: ["Azul", "Verde/Amarillo", "Marrón", "Negro"],
ans: 1,
exp: "El cable de tierra siempre es verde/amarillo por normativa. Nunca lo uses para otra función."
},
{
q: "Antes de tocar un cable, ¿qué debes hacer?",
opts: ["Verificar ausencia de tensión", "Preguntar al jefe", "Tocarlo rápido"],
ans: 0,
exp: "Siempre verifica con un detector que no hay tensión. Nunca asumas que está desconectado."
},
{
q: "¿Qué EPI es esencial para trabajos eléctricos?",
opts: ["Casco de obra", "Guantes aislantes", "Botas de agua"],
ans: 1,
exp: "Los guantes aislantes protegen contra descargas. El casco protege pero no aísla."
},
{
q: "¿Qué herramienta usas para pelar cables?",
opts: ["Alicates universales", "Pelacables", "Destornillador"],
ans: 1,
exp: "El pelacables evita dañar el conductor. Otras herramientas pueden cortar hilos."
},
{
q: "Si un compañero sufre descarga, ¿qué haces primero?",
opts: ["Tocarlo para alejarlo", "Cortar la corriente", "Echarle agua"],
ans: 1,
exp: "Primero corta la corriente. Si lo tocas directamente, tú también recibirás la descarga."
}
];

let currentIndex = 0;
let score = 0;
let userAnswers = [];

const scene = document.getElementById('scene');
const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const progressEl = document.getElementById('progress');
const counterEl = document.getElementById('counter');

function renderQuestion() {
if (currentIndex >= quizData.length) {
showResults();
return;
}

const current = quizData[currentIndex];
questionEl.textContent = current.q;
progressEl.style.width = ((currentIndex) / quizData.length * 100) + '%';
counterEl.textContent = (currentIndex + 1) + '/' + quizData.length;

optionsEl.innerHTML = current.opts.map((opt, i) => 
    `<button class="btn-option" onclick="selectAnswer(${i})" aria-label="${opt}">${opt}</button>`
).join('');

ensureFits();
}

function selectAnswer(index) {
const current = quizData[currentIndex];
const isCorrect = index === current.ans;

if (isCorrect) score++;

userAnswers.push({
    question: current.q,
    userAnswer: current.opts[index],
    correctAnswer: current.opts[current.ans],
    isCorrect: isCorrect,
    explanation: current.exp
});

const buttons = optionsEl.querySelectorAll('.btn-option');
buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (i === current.ans) btn.classList.add('correct');
    if (i === index && !isCorrect) btn.classList.add('incorrect');
    if (i === index) btn.classList.add('selected');
});

setTimeout(() => {
    currentIndex++;
    renderQuestion();
}, 800);
}

function showResults() {
setTimeout(() => {
    document.documentElement.classList.replace('gameplay', 'results');
    scene.classList.replace('gameplay', 'results');

    scene.innerHTML = `
        <div class="results-scroll">
            <div class="results-header">
                <div class="results-title">¡Quiz completado!</div>
                <div class="results-score">${score}/${quizData.length}</div>
                <div class="results-subtitle">Respuestas correctas</div>
            </div>
            <div class="results-list">
                ${userAnswers.map((a, i) => `
                    <div class="result-item ${a.isCorrect ? 'correct' : 'incorrect'}">
                        <div class="result-question">${i + 1}. ${a.question}</div>
                        <div class="result-answer">${a.isCorrect ? '✓ ' + a.userAnswer : '✗ ' + a.userAnswer + ' → ' + a.correctAnswer}</div>
                        <div class="result-explanation">${a.explanation}</div>
                    </div>
                `).join('')}
            </div>
            <div class="results-tip">
                <strong>💡 Consejo:</strong> Nunca asumas que un cable está desconectado. Siempre verifica con un detector de tensión antes de trabajar.
            </div>
            <div class="footer">
                <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
            </div>
        </div>
    `;
}, 500);
}

function completeTask() {
if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({
        action: 'TASK_COMPLETED'
    }));
}
}

function ensureFits() {
scene.classList.remove('compact', 'compact-xs');
document.documentElement.style.setProperty('--ui-scale', 1);

if (scene.scrollHeight > scene.clientHeight) {
    scene.classList.add('compact');
}
if (scene.scrollHeight > scene.clientHeight) {
    scene.classList.add('compact-xs');
}
if (scene.scrollHeight > scene.clientHeight) {
    const scale = Math.max(0.88, scene.clientHeight / scene.scrollHeight);
    document.documentElement.style.setProperty('--ui-scale', scale);
}
}

window.addEventListener('load', () => { ensureFits(); renderQuestion(); });
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));

renderQuestion();
</script>
</body>
</html>
