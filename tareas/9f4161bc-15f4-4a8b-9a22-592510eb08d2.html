
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🗣️ Tu primer día con el cliente - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene"></div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const avatars={
mentor:{name:"Carlos (Mentor)",img:"https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png"},
cliente:{name:"Marta (Clienta)",img:"https://techkampe.github.io/daily-streak/assets/Avatar%204_low.png"}
};

const turns=[
{
messages:[
{from:"cliente",text:"Por fin llega alguien... Llevo dos días sin aire y hace un calor insoportable. 😤"}
],
options:[
{text:"Buenos días, soy técnico de Kämpe. Entiendo su frustración, vamos a solucionarlo.",value:"correct"},
{text:"Hola. Bueno, el calor es normal en verano...",value:"incorrect"},
{text:"Buenos días. Vengo a revisar el equipo.",value:"partial"}
],
feedback:{
correct:"👍 Excelente inicio: profesional y empático.",
incorrect:"😬 Minimizar el problema genera tensión.",
partial:"👌 Correcto pero algo frío."
}
},
{
messages:[
{from:"mentor",text:"💬 Recuerda: primero escucha, luego diagnostica."},
{from:"cliente",text:"¿Y bien? ¿Qué tiene mi aire? Seguro está roto del todo..."}
],
options:[
{text:"Voy a revisarlo paso a paso. Le explico lo que encuentre.",value:"correct"},
{text:"Probablemente sea el compresor, eso sale caro.",value:"incorrect"},
{text:"Déjeme ver el equipo primero.",value:"partial"}
],
feedback:{
correct:"👍 Generas confianza sin adelantar conclusiones.",
incorrect:"😬 Alarmar sin diagnóstico es un error grave.",
partial:"👌 Bien, pero podrías anticipar el proceso."
}
},
{
messages:[
{from:"cliente",text:"Mi vecino dice que seguro es la bombona de gas... ¿Es eso?"}
],
options:[
{text:"Puede ser una causa, pero hay varias. Lo confirmo tras la revisión.",value:"correct"},
{text:"Los vecinos no saben de esto, mejor no haga caso.",value:"incorrect"},
{text:"Sí, probablemente sea eso.",value:"partial"}
],
feedback:{
correct:"👍 Respuesta profesional y educada.",
incorrect:"😬 Desacreditar al cliente genera rechazo.",
partial:"👌 Arriesgado: y si no es eso?"
}
},
{
messages:[
{from:"mentor",text:"💬 Si necesitas pedir piezas, sé claro con los tiempos."},
{from:"cliente",text:"¿Cuánto va a tardar? Tengo una reunión importante mañana."}
],
options:[
{text:"La revisión tarda 20 min. Si hay que pedir pieza, le confirmo plazos exactos.",value:"correct"},
{text:"No sé, depende de lo que encuentre.",value:"incorrect"},
{text:"Intentaré acabar hoy, pero no prometo nada.",value:"partial"}
],
feedback:{
correct:"👍 Plazos claros generan tranquilidad.",
incorrect:"😬 La incertidumbre frustra al cliente.",
partial:"👌 Honesto, pero poco concreto."
}
},
{
messages:[
{from:"cliente",text:"Vale, le dejo trabajar. Avíseme cuando sepa algo."}
],
options:[
{text:"Perfecto. Le informo en cuanto termine y le dejo mi contacto por si tiene dudas.",value:"correct"},
{text:"Ok.",value:"incorrect"},
{text:"Sí, ahora le digo.",value:"partial"}
],
feedback:{
correct:"👍 Cierre profesional con seguimiento.",
incorrect:"😬 Demasiado seco, sin valor añadido.",
partial:"👌 Correcto pero sin ofrecer contacto."
}
}
];

let currentTurn=0,chatHistory=[],answers=[];
const scene=document.getElementById('scene');

function render(){
if(currentTurn>=turns.length){showResults();return;}
const turn=turns[currentTurn];
let html=`
<div class="hud">
<div class="hud-titles">
<div class="brand">🗣️ Tu primer día con el cliente</div>
<div class="subtitle">Elige cómo responder</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i style="width:${(currentTurn/turns.length)*100}%"></i></div>
</div>
<span class="badge">${currentTurn+1}/${turns.length}</span>
</div>
</div>
<div class="chat-container" id="chatContainer">
<div class="chat-history" id="chatHistory">`;
chatHistory.forEach(msg=>{
if(msg.isUser){
html+=`<div class="chat-bubble user-bubble">${msg.text}</div>`;
}else{
html+=`<div class="chat-bubble npc-bubble">
<img src="${msg.avatar}" class="chat-avatar" alt="">
<div class="chat-content">
<span class="chat-name">${msg.name}</span>
<span class="chat-text">${msg.text}</span>
</div>
</div>`;
}
});
turn.messages.forEach(m=>{
const char=avatars[m.from];
html+=`<div class="chat-bubble npc-bubble">
<img src="${char.img}" class="chat-avatar" alt="">
<div class="chat-content">
<span class="chat-name">${char.name}</span>
<span class="chat-text">${m.text}</span>
</div>
</div>`;
});
html+=`</div></div>
<div class="chat-options" id="chatOptions">`;
turn.options.forEach((opt,i)=>{
html+=`<button class="btn-option" onclick="selectOption(${i})">${opt.text}</button>`;
});
html+=`</div>`;
scene.innerHTML=html;
const chatH=document.getElementById('chatHistory');
chatH.scrollTop=chatH.scrollHeight;
ensureFits();
}

function selectOption(idx){
const turn=turns[currentTurn];
const opt=turn.options[idx];
answers.push({turn:currentTurn+1,value:opt.value,text:opt.text,feedback:turn.feedback[opt.value]});
turn.messages.forEach(m=>{
const char=avatars[m.from];
chatHistory.push({isUser:false,name:char.name,avatar:char.img,text:m.text});
});
chatHistory.push({isUser:true,text:opt.text});
const feedbackMsg=turn.feedback[opt.value];
chatHistory.push({isUser:false,name:avatars.mentor.name,avatar:avatars.mentor.img,text:feedbackMsg});
currentTurn++;
render();
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
let score=answers.filter(a=>a.value==='correct').length;
let html=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Servicio completado!</div>
<div class="results-score">${score}/${turns.length}</div>
<div class="results-subtitle">Respuestas óptimas</div>
</div>
<div class="results-list">`;
answers.forEach((a,i)=>{
const cls=a.value==='correct'?'correct':(a.value==='partial'?'partial':'incorrect');
html+=`<div class="result-item ${cls}">
<div class="result-question">Turno ${a.turn}</div>
<div class="result-answer">${a.text}</div>
<div class="result-explanation">${a.feedback}</div>
</div>`;
});
html+=`</div>
<div class="results-tip">
<strong>💡 Consejo:</strong> Los primeros 30 segundos con un cliente definen toda la relación. Saluda, empatiza y anticipa el proceso.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
scene.innerHTML=html;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
<style>
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;padding:0 16px;}
.chat-history{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:10px 0;-webkit-overflow-scrolling:touch;}
.chat-bubble{display:flex;align-items:flex-start;gap:8px;max-width:90%;}
.npc-bubble{align-self:flex-start;}
.user-bubble{align-self:flex-end;background:var(--surface);color:#000;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:0.95rem;margin-left:auto;}
.chat-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.chat-content{background:var(--surface);padding:8px 12px;border-radius:4px 16px 16px 16px;display:flex;flex-direction:column;gap:2px;}
.chat-name{font-size:0.75rem;font-weight:700;color:var(--accent);}
.chat-text{font-size:0.95rem;color:var(--ink);line-height:1.3;}
.chat-options{display:flex;flex-direction:column;gap:8px;padding:12px 16px 16px;background:var(--bg);flex-shrink:0;}
.chat-options .btn-option{font-size:0.9rem;padding:12px 14px;text-align:left;white-space:normal;line-height:1.25;}
.results-tip{background:var(--surface);padding:14px;border-radius:12px;margin:0 16px 16px;font-size:0.9rem;line-height:1.4;}
.result-item.partial{border-left:4px solid #f59e0b;background:rgba(245,158,11,0.08);}
</style>
</body>
</html>
