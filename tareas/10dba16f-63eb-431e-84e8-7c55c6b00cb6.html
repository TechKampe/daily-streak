
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔍 Caza el Fallo: Obra en Alerta - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔍 Caza el Fallo</div>
<div class="subtitle" id="sceneDesc">Cargando escena...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/5</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper" id="helper">Toca el elemento incorrecto</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">🔍 Supervisor Novato</div>
<div class="modal-body">Tu jefe te pide revisar 5 situaciones en obra. Encuentra el error en cada una antes de que cause problemas.</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">¡Empezar!</button>
</div>
</div>
</div>
<script>
const scenes=[
{desc:"Instalación eléctrica en cocina",items:["Cable con manguera protectora","Conexión a cuadro diferencial","Cable pelado sin proteger","Canaleta bien fijada"],error:2,exp:"Un cable pelado puede causar electrocución o incendio. Siempre debe estar protegido."},
{desc:"Trabajos en altura - andamio",items:["Casco de seguridad puesto","Arnés anclado correctamente","Trabajador sin casco en zona de caída","Barandilla perimetral instalada"],error:2,exp:"En zonas con riesgo de caída de objetos, el casco es obligatorio para proteger la cabeza."},
{desc:"Uso de escalera de mano",items:["Escalera apoyada en pared firme","Escalera mal apoyada en tubo","Ángulo de inclinación correcto","Zapatas antideslizantes"],error:1,exp:"Una escalera mal apoyada puede resbalar y provocar caídas graves. Siempre en superficie estable."},
{desc:"Zona de almacén y emergencias",items:["Salida de emergencia señalizada","Botiquín completo","Extintor caducado hace 2 años","Pasillos despejados"],error:2,exp:"Un extintor caducado puede fallar en emergencia. Revisar fechas de caducidad es vital."},
{desc:"Manipulación de materiales químicos",items:["Gafas de protección","Guantes de jardinería para ácido","Mascarilla con filtros","Ropa de trabajo cerrada"],error:1,exp:"Los guantes deben ser específicos para químicos. Unos de jardinería no protegen contra ácidos."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),opts=document.getElementById('options'),descEl=document.getElementById('sceneDesc'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),helper=document.getElementById('helper'),modal=document.getElementById('modal');

function startGame(){modal.classList.remove('active');render();}

function render(){
if(idx>=scenes.length){showResults();return}
const s=scenes[idx];
descEl.textContent=s.desc;
prog.style.width=((idx)/scenes.length*100)+'%';
counter.textContent=(idx+1)+'/'+scenes.length;
helper.textContent='Toca el elemento incorrecto';
opts.innerHTML=s.items.map((item,i)=>`<button class="btn-option" onclick="selectItem(${i})">${item}</button>`).join('');
ensureFits();
}

function selectItem(i){
const s=scenes[idx];
const correct=i===s.error;
answers.push({scene:s.desc,selected:s.items[i],correctItem:s.items[s.error],correct,exp:s.exp});
const btns=opts.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{b.disabled=true;if(j===i)b.classList.add(correct?'correct':'incorrect');if(j===s.error&&!correct)b.classList.add('correct');});
setTimeout(()=>{idx++;render();},800);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Revisión Completada!</div>
<div class="results-score">${score}/${scenes.length}</div>
<div class="results-subtitle">Errores detectados correctamente</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${i+1}. ${a.scene}</div>
<div class="result-answer">${a.correct?'✓ Correcto: '+a.selected:'✗ Elegiste: '+a.selected}</div>
${!a.correct?`<div class="result-answer">Error real: ${a.correctItem}</div>`:''}
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
<div class="result-item">
<div class="result-question">💡 Consejo práctico</div>
<div class="result-explanation">La atención al detalle salva vidas. Antes de empezar cualquier tarea, dedica 30 segundos a revisar tu entorno. Un pequeño error puede tener grandes consecuencias.</div>
</div>
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{modal.classList.add('active');ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
