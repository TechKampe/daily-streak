
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Herramienta o EPI? 🛠️ - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Herramienta o EPI? 🛠️</div>
<div class="subtitle">Clasifica el material del taller</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress-bar"></i></div>
</div>
<span class="badge" id="counter">1/10</span>
</div>
</div>
<div class="main">
<div id="item-display"></div>
<div class="options" id="categories"></div>
</div>
<div class="footer">
<div class="helper">Toca la categoría correcta para cada ítem</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const items=[
{name:"Guantes de nitrilo",cat:"EPI",exp:"Protegen las manos de químicos y cortes menores. Obligatorios en manipulación de sustancias."},
{name:"Destornillador",cat:"Herramienta",exp:"Herramienta manual básica para apretar o aflojar tornillos."},
{name:"Cono naranja",cat:"Señalización",exp:"Delimita zonas de trabajo o peligro. Debe ser visible a distancia."},
{name:"Gafas de seguridad",cat:"EPI",exp:"Protección ocular obligatoria ante proyecciones, chispas o salpicaduras."},
{name:"Cinta balizadora",cat:"Señalización",exp:"Marca perímetros de seguridad. No es barrera física, solo visual."},
{name:"Llave inglesa",cat:"Herramienta",exp:"Herramienta ajustable para tuercas y tornillos de distintos tamaños."},
{name:"Casco",cat:"EPI",exp:"Protege la cabeza de impactos y caída de objetos. Norma EN 397."},
{name:"Alicate",cat:"Herramienta",exp:"Herramienta para sujetar, cortar o doblar cables y materiales."},
{name:"Chaleco reflectante",cat:"EPI",exp:"Garantiza visibilidad del trabajador. Obligatorio en vías y obras."},
{name:"Taladro",cat:"Herramienta",exp:"Herramienta eléctrica para perforar materiales diversos."}
];
const categories=["Herramienta","EPI","Señalización"];
let idx=0,answers=[];
const scene=document.getElementById('scene'),itemDisplay=document.getElementById('item-display'),catsEl=document.getElementById('categories'),progBar=document.getElementById('progress-bar'),counter=document.getElementById('counter');

function render(){
if(idx>=items.length){showResults();return}
const item=items[idx];
progBar.style.width=(idx/items.length*100)+'%';
counter.textContent=(idx+1)+'/'+items.length;
itemDisplay.innerHTML=`<div class="brand" style="font-size:1.5rem;text-align:center;margin:1.5rem 0">${item.name}</div>`;
catsEl.innerHTML=categories.map(c=>`<button class="btn-option" onclick="selectCat('${c}')">${c}</button>`).join('');
ensureFits();
}

function selectCat(cat){
const item=items[idx];
const correct=cat===item.cat;
answers.push({name:item.name,user:cat,correct:item.cat,ok:correct,exp:item.exp});
const btns=catsEl.querySelectorAll('.btn-option');
btns.forEach(b=>{
b.disabled=true;
if(b.textContent===item.cat)b.classList.add('correct');
if(b.textContent===cat&&!correct)b.classList.add('incorrect');
});
setTimeout(()=>{idx++;render();},600);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.ok).length;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Organización completada!</div>
<div class="results-score">${score}/${items.length}</div>
<div class="results-subtitle">Clasificaciones correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.ok?'correct':'incorrect'}">
<div class="result-question">${a.name}</div>
<div class="result-answer">${a.ok?'✓ '+a.correct:'✗ Tu respuesta: '+a.user+' → Correcto: '+a.correct}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="result-item">
<div class="result-question">💡 Consejo final</div>
<div class="result-explanation">Antes de empezar, organiza mentalmente: lo que te protege (EPI), lo que usas para trabajar (Herramienta) y lo que avisa a otros (Señalización). Así actuarás con seguridad y eficiencia.</div>
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
