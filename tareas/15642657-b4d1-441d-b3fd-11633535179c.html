
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o Realidad? ⚡ EPIs al Descubierto - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o Realidad? ⚡</div>
<div class="subtitle">EPIs al Descubierto</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Verdadero o Falso? Toca para responder</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">
<script>
const data=[
{statement:"Los cascos de seguridad tienen fecha de caducidad y deben revisarse periódicamente.",answer:true,exp:"Los cascos caducan entre 3-5 años desde fabricación. Revisa siempre la fecha interior."},
{statement:"Los guantes de látex son suficientes para trabajos eléctricos de baja tensión.",answer:false,exp:"Para trabajos eléctricos se necesitan guantes dieléctricos homologados, no látex común."},
{statement:"Las gafas de protección solo son necesarias al usar radiales o taladros.",answer:false,exp:"Son obligatorias en cualquier tarea con riesgo de proyecciones, salpicaduras o polvo."},
{statement:"El calzado de seguridad debe tener puntera reforzada y suela antideslizante.",answer:true,exp:"La puntera protege de impactos y la suela antideslizante previene caídas en obra."},
{statement:"El arnés de seguridad es obligatorio a partir de 2 metros de altura.",answer:true,exp:"La normativa española exige protección anticaídas en trabajos a más de 2 metros."},
{statement:"La empresa es la única responsable de proporcionar los EPIs, el trabajador no tiene obligaciones.",answer:false,exp:"El trabajador debe usar correctamente los EPIs y comunicar cualquier defecto o daño."},
{statement:"Los tapones de oídos solo son necesarios si el ruido supera los 100 decibelios.",answer:false,exp:"La protección auditiva es obligatoria a partir de 85 dB de exposición prolongada."}
];
let idx=0,score=0,answers=[],processing=false;
const scene=document.getElementById('scene'),opts=document.getElementById('options'),statementArea=document.getElementById('statement-area'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=data.length){showResults();return}
processing=false;
const d=data[idx];
prog.style.width=((idx)/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
statementArea.innerHTML=`<p style="font-size:1.1rem;line-height:1.5;text-align:center;padding:0 8px;margin:0 0 16px 0;">${d.statement}</p>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="selectAnswer(true)">✓ Verdadero</button><button class="btn-option" id="btn-false" onclick="selectAnswer(false)">✗ Falso</button>`;
ensureFits();
}

function selectAnswer(userAnswer){
if(processing)return;
processing=true;
const d=data[idx];
const correct=userAnswer===d.answer;
if(correct)score++;
answers.push({statement:d.statement,userAnswer,correctAnswer:d.answer,correct,exp:d.exp});
const btnTrue=document.getElementById('btn-true');
const btnFalse=document.getElementById('btn-false');
if(userAnswer===true){
btnTrue.classList.add(correct?'correct':'incorrect');
}else{
btnFalse.classList.add(correct?'correct':'incorrect');
}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Reto completado!</div>
<div class="results-score">${score}/${data.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.statement}</div>
<div class="result-answer">Tu respuesta: ${a.userAnswer?'Verdadero':'Falso'} ${a.correct?'✓':'✗'} | Correcta: ${a.correctAnswer?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip" style="background:var(--surface);border-radius:12px;padding:16px;margin:16px 0;">
<strong>💡 Consejo clave:</strong> Antes de cada jornada, revisa el estado de tus EPIs. Un casco agrietado o unos guantes desgastados no te protegen. Tu seguridad empieza por ti.
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
