
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tu primer día en obra 🏗️ - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene"></div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%202_low.png" alt="" loading="lazy">
<script>
const avatars={
encargado:{name:"Carlos (Encargado)",img:"https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png"},
companero:{name:"Miguel (Veterano)",img:"https://techkampe.github.io/daily-streak/assets/Avatar%202_low.png"},
cliente:{name:"Sra. García (Cliente)",img:"https://techkampe.github.io/daily-streak/assets/Avatar%203_low.png"},
player:{name:"Tú",img:"https://techkampe.github.io/daily-streak/assets/Avatar%204_low.png"}
};

const turns=[
{
messages:[
{from:"encargado",text:"¡Buenos días! Tú debes ser el nuevo aprendiz. Soy Carlos, el encargado de obra. ¿Cómo te presentas?"}
],
options:[
{text:"Buenos días, Carlos. Soy [nombre], el nuevo aprendiz. Encantado de conocerle.",score:2,reaction:"Excelente, me gusta la gente educada. Bienvenido al equipo."},
{text:"Hola, ¿qué tal? Soy el nuevo.",score:1,reaction:"Bien... Vamos a trabajar en esa presentación, ¿vale?"},
{text:"Buenas. ¿Dónde me pongo?",score:0,reaction:"Calma, primero las presentaciones. La actitud importa aquí."}
]
},
{
messages:[
{from:"encargado",text:"Te presento a Miguel, lleva 15 años en el oficio. Él será tu mentor."},
{from:"companero",text:"¡Ey, bienvenido! ¿Qué quieres preguntarme para empezar?"}
],
options:[
{text:"¿Cuáles son las normas de seguridad básicas que debo conocer?",score:2,reaction:"¡Bien preguntado! La seguridad es lo primero. Me caes bien."},
{text:"¿A qué hora es el descanso?",score:0,reaction:"Mmm... Primero trabaja, luego descansa. Prioridades, chaval."},
{text:"¿Qué herramientas voy a usar hoy?",score:1,reaction:"Buena pregunta, aunque la seguridad va antes que las herramientas."}
]
},
{
messages:[
{from:"companero",text:"Toma, ponte el casco y el chaleco. Aquí no se entra sin EPI."}
],
options:[
{text:"Gracias, Miguel. ¿Me enseñas a ajustarlo correctamente?",score:2,reaction:"¡Así me gusta! Preguntar es de

 sabios. Ven, te enseño."},
{text:"Vale, me lo pongo ahora mismo.",score:1,reaction:"Bien, pero asegúrate de que quede bien ajustado."},
{text:"¿Es obligatorio? Hace mucho calor...",score:0,reaction:"Sin EPI no pisas la obra. Es por tu seguridad, créeme."}
]
},
{
messages:[
{from:"encargado",text:"Atención, viene la Sra. García, la clienta. Compórtate de forma profesional."},
{from:"cliente",text:"Buenos días. ¿Cómo va la obra? ¿Quién es este joven?"}
],
options:[
{text:"Buenos días, señora. Soy aprendiz, estoy aquí para aprender del equipo.",score:2,reaction:"Qué bien, gente joven con ganas. Me alegra verlo."},
{text:"Hola. Soy nuevo, acabo de llegar.",score:1,reaction:"Entiendo. Espero que aprendas mucho aquí."},
{text:"[No dices nada y miras al suelo]",score:0,reaction:"...Bueno, espero que sea buen trabajador aunque tímido."}
]
},
{
messages:[
{from:"companero",text:"Oye, necesito que lleves esas cajas al segundo piso. Pero no estoy seguro si la escalera aguanta tanto peso. ¿Qué haces?"}
],
options:[
{text:"Antes de subir, pregunto al encargado si es seguro.",score:2,reaction:"¡Perfecto! Ante la duda, siempre consulta. Así se evitan accidentes."},
{text:"Subo las cajas de una en una para no arriesgar.",score:1,reaction:"No está mal, pero mejor confirmar primero con Carlos."},
{text:"Las subo todas de una vez para acabar rápido.",score:0,reaction:"¡Para! Eso es peligroso. Nunca improvises con la seguridad."}
]
}
];

let currentTurn=0,chatHistory=[],answers=[];
const scene=document.getElementById('scene');

function render(){
if(currentTurn>=turns.length){showResults();return}
const turn=turns[currentTurn];
let html=`
<div class="hud">
<div class="hud-titles">
<div class="brand">Tu primer día en obra 🏗️</div>
<div class="subtitle">Turno ${currentTurn+1} de ${turns.length}</div>
</div>
<div class="progress-row">
<div class="bar-wrap"><div class="bar"><i style="width:${(currentTurn/turns.length)*100}%"></i></div></div>
<span class="badge">${currentTurn+1}/${turns.length}</span>
</div>
</div>
<div class="chat-container">
<div class="chat-history" id="chatHistory">`;
chatHistory.forEach(msg=>{
const isPlayer=msg.from==='player';
html+=`<div class="chat-bubble ${isPlayer?'player':'npc'}">
${!isPlayer?`<img class="chat-avatar" src="${avatars[msg.from].img}" alt="">`:''} 
<div class="chat-content ${isPlayer?'player-msg':''}">
${!isPlayer?`<div class="chat-name">${avatars[msg.from].name}</div>`:''}
<div class="chat-text">${msg.text}</div>
</div>
${isPlayer?`<img class="chat-avatar" src="${avatars.player.img}" alt="">`:''}
</div>`;
});
turn.messages.forEach(msg=>{
html+=`<div class="chat-bubble npc">
<img class="chat-avatar" src="${avatars[msg.from].img}" alt="">
<div class="chat-content">
<div class="chat-name">${avatars[msg.from].name}</div>
<div class="chat-text">${msg.text}</div>
</div>
</div>`;
});
html+=`</div></div>
<div class="chat-options" id="options">
<div class="helper">¿Cómo respondes?</div>`;
turn.options.forEach((opt,i)=>{
html+=`<button class="btn-option" onclick="selectOption(${i})">${opt.text}</button>`;
});
html+=`</div>`;
scene.innerHTML=html;
const historyEl=document.getElementById('chatHistory');
historyEl.scrollTop=historyEl.scrollHeight;
ensureFits();
}

function selectOption(i){
const turn=turns[currentTurn];
const opt=turn.options[i];
turn.messages.forEach(msg=>{
chatHistory.push({from:msg.from,text:msg.text});
});
chatHistory.push({from:'player',text:opt.text});
const reactor=turn.messages[turn.messages.length-1].from;
chatHistory.push({from:reactor,text:opt.reaction});
answers.push({turn:currentTurn+1,question:turn.messages[turn.messages.length-1].text,answer:opt.text,score:opt.score,maxScore:2});
currentTurn++;
render();
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const totalScore=answers.reduce((a,b)=>a+b.score,0);
const maxTotal=answers.length*2;
const feedback=[
"Una actitud profesional genera confianza desde el primer momento.",
"La seguridad siempre va primero. Preguntar demuestra madurez.",
"El EPI es obligatorio y no negociable en obra.",
"Con clientes, la educación y profesionalidad son clave.",
"Ante dudas de seguridad, consulta antes de actuar."
];
let html=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Primer día completado!</div>
<div class="results-score">${totalScore}/${maxTotal}</div>
<div class="results-subtitle">Puntos obtenidos</div>
</div>
<div class="results-list">`;
answers.forEach((a,i)=>{
const status=a.score===2?'correct':a.score===1?'partial':'incorrect';
const icon=a.score===2?'✓':a.score===1?'~':'✗';
html+=`<div class="result-item ${status}">
<div class="result-question">Turno ${a.turn}: ${a.question.substring(0,50)}...</div>
<div class="result-answer">${icon} ${a.answer.substring(0,40)}...</div>
<div class="result-explanation">${feedback[i]}</div>
</div>`;
});
html+=`</div>
<div class="results-tip">
<strong>💡 Consejo:</strong> Las primeras impresiones definen tu reputación en el gremio. Sé educado, pregunta antes de actuar y nunca comprometas la seguridad.
</div>
<div class="footer fixed-footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
scene.innerHTML=html;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',render);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));

const style=document.createElement('style');
style.textContent=`
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;padding:0 8px;}
.chat-history{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.chat-bubble{display:flex;align-items:flex-start;gap:8px;max-width:90%;}
.chat-bubble.npc{align-self:flex-start;}
.chat-bubble.player{align-self:flex-end;flex-direction:row-reverse;}
.chat-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.chat-content{background:var(--surface);border-radius:12px;padding:8px 12px;max-width:100%;}
.chat-content.player-msg{background:var(--text);color:var(--bg);}
.chat-name{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:2px;}
.chat-text{font-size:14px;line-height:1.3;}
.chat-options{padding:8px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.chat-options .helper{font-size:12px;text-align:center;opacity:0.7;margin-bottom:4px;}
.chat-options .btn-option{font-size:13px;padding:10px 12px;text-align:left;line-height:1.3;}
.results-tip{background:var(--surface);border-radius:12px;padding:12px;margin:12px 16px;font-size:13px;line-height:1.4;}
.result-item.partial{border-left:4px solid var(--warn, #f0ad4e);}
.fixed-footer{position:sticky;bottom:0;background:var(--bg);padding:12px 16px;margin-top:auto;}
`;
document.head.appendChild(style);
</script>
</body>
</html>
