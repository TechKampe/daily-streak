
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔌 Conecta los Conceptos Eléctricos - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease;user-select:none;-webkit-tap-highlight-color:transparent;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease-in-out;}
.mem-card.pop{animation:pop 0.2s ease-out;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:space-between;padding:0 16px;font-size:14px;color:#0B214A;margin-bottom:8px;}
.locked{pointer-events:none;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔌 Conecta los Conceptos</div>
<div class="subtitle">Encuentra las parejas técnicas</div>
</div>
</div>
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejar conceptos</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairs=[
{id:1,a:"Polímetro",b:"Medir voltaje",exp:"El polímetro o multímetro es la herramienta básica para medir tensión, corriente y resistencia."},
{id:2,a:"Interr. diferencial",b:"Protección personas",exp:"El interruptor diferencial detecta fugas de corriente y protege contra electrocución."},
{id:3,a:"Cable fase",b:"Color marrón/negro",exp:"Por normativa, los cables de fase son de color marrón, negro o gris."},
{id:4,a:"Magnetotérmico",b:"Protección circuitos",exp:"El magnetotérmico protege los circuitos contra sobrecargas y cortocircuitos."}
];
let cards=[],flipped=[],matched=0,attempts=0,locked=false,history=[];
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function init(){
cards=[];
pairs.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
ensureFits();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.textContent='?';
div.dataset.index=i;
div.onclick=()=>flipCard(i,div);
board.appendChild(div);
});
}

function flipCard(index,el){
if(locked||flipped.length>=2||flipped.some(f=>f.index===index)||el.classList.contains('matched'))return;
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[index].text;
flipped.push({index,el,pairId:cards[index].pairId,type:cards[index].type});
if(flipped.length===2)checkMatch();
}

function checkMatch(){
locked=true;
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
const[f1,f2]=flipped;
const isMatch=f1.pairId===f2.pairId&&f1.type!==f2.type;
if(isMatch){
f1.el.classList.remove('revealed');
f1.el.classList.add('matched');
f2.el.classList.remove('revealed');
f2.el.classList.add('matched');
matched++;
pairsEl.textContent=`${matched}/4 parejas`;
history.push({pair:pairs.find(p=>p.id===f1.pairId),found:true});
flipped=[];
locked=false;
if(matched===4)endGame(true);
}else{
f1.el.classList.add('shake');
f2.el.classList.add('shake');
setTimeout(()=>{
f1.el.classList.remove('revealed','shake');
f1.el.classList.add('covered');
f1.el.textContent='?';
f2.el.classList.remove('revealed','shake');
f2.el.classList.add('covered');
f2.el.textContent='?';
flipped=[];
locked=false;
if(attempts>=10&&matched<4)endGame(false);
},2000);
}
}

function endGame(won){
const missing=pairs.filter(p=>!history.some(h=>h.pair.id===p.id));
missing.forEach(m=>history.push({pair:m,found:false}));
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${won?'¡Excelente trabajo!':'¡Sigue practicando!'}</div>
<div class="results-score">${matched}/4</div>
<div class="results-subtitle">parejas encontradas en ${attempts} intentos</div>
</div>
<div class="results-list">
${pairs.map(p=>{
const found=history.find(h=>h.pair.id===p.id&&h.found);
return `<div class="result-item ${found?'correct':'incorrect'}">
<div class="result-question">${p.a} ↔ ${p.b}</div>
<div class="result-answer">${found?'✓ Pareja encontrada':'✗ No encontrada'}</div>
<div class="result-explanation">${p.exp}</div>
</div>`;
}).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
