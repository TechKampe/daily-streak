
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el Manual 🔧 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Completa el Manual 🔧</div>
<div class="subtitle" id="subtitle">Completa cada frase del manual</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main" id="main">
<p id="phrase"></p>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper" id="helper">Selecciona la palabra correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 2_low.png" alt="" loading="lazy">

<div class="modal-backdrop" id="modal">
<div class="modal">
<div class="modal-title">📋 Tu primer día</div>
<div class="modal-body">El técnico senior te pide repasar el manual. Completa cada frase eligiendo la palabra correcta.</div>
<div class="modal-actions">
<button class="cta" onclick="startGame()">Comenzar</button>
</div>
</div>
</div>

<script>
const data = [
{
phrase: "Para verificar la presión del circuito de refrigeración, uso el ___.",
blank: "___",
opts: ["Manómetro", "Termómetro"],
ans: 0,
exp: "El manómetro mide presión. El termómetro solo mide temperatura."
},
{
phrase: "Antes de cargar gas, debo hacer vacío con el ___.",
blank: "___",
opts: ["Vacuómetro", "Manómetro"],
ans: 0,
exp: "El vacuómetro mide el vacío necesario antes de cargar refrigerante."
},
{
phrase: "El refrigerante ___ es inflamable y requiere precauciones especiales.",
blank: "___",
opts: ["R-32", "R-410A"],
ans: 0,
exp: "El R-32 es ligeramente inflamable (A2L). El R-410A no es inflamable."
},
{
phrase: "Al manipular refrigerantes líquidos, uso guantes ___.",
blank: "___",
opts: ["Criogénicos", "De látex"],
ans: 0,
exp: "Los guantes criogénicos protegen de quemaduras por frío extremo."
},
{
phrase: "Si detecto una fuga, lo primero es asegurar la ___ del área.",
blank: "___",
opts: ["Ventilación", "Iluminación"],
ans: 0,
exp: "La ventilación evita acumulación de gas y riesgo de asfixia."
},
{
phrase: "Para detectar fugas uso un detector electrónico o ___ jabonosa.",
blank: "___",
opts: ["Agua", "Espuma"],
ans: 1,
exp: "La espuma jabonosa muestra burbujas donde hay fugas. El agua sola no."
}
];

let idx = 0, answers = [];
const scene = document.getElementById('scene');
const opts = document.getElementById('options');
const phraseEl = document.getElementById('phrase');
const prog = document.getElementById('progress');
const counter = document.getElementById('counter');
const modal = document.getElementById('modal');
const helper = document.getElementById('helper');

modal.classList.add('active');

function startGame() {
    modal.classList.remove('active');
    render();
}

function render() {
    if (idx >= data.length) { showResults(); return; }
    const d = data[idx];
    prog.style.width = (idx / data.length * 100) + '%';
    counter.textContent = (idx + 1) + '/' + data.length;
    
    const parts = d.phrase.split(d.blank);
    phraseEl.innerHTML = parts[0] + '<span class="cloze-blank">______</span>' + (parts[1] || '');
    
    opts.innerHTML = d.opts.map((o, i) => 
        `<button class="btn-option" onclick="selectOption(${i})">${o}</button>`
    ).join('');
    
    ensureFits();
}

function selectOption(i) {
    const d = data[idx];
    const correct = i === d.ans;
    const buttons = opts.querySelectorAll('.btn-option');
    
    buttons.forEach((b, j) => {
        b.disabled = true;
        if (j === i) {
            b.classList.add(correct ? 'correct' : 'incorrect');
        }
        if (j === d.ans && !correct) {
            b.classList.add('correct');
        }
    });
    
    const parts = d.phrase.split(d.blank);
    const selectedWord = d.opts[i];
    phraseEl.innerHTML = parts[0] + `<span class="cloze-filled ${correct ? 'correct' : 'incorrect'}">${selectedWord}</span>` + (parts[1] || '');
    
    answers.push({
        phrase: d.phrase.replace(d.blank, d.opts[d.ans]),
        user: selectedWord,
        correct: correct,
        correctAnswer: d.opts[d.ans],
        exp: d.exp
    });
    
    setTimeout(() => {
        idx++;
        render();
    }, 800);
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        
        const score = answers.filter(a => a.correct).length;
        
        scene.innerHTML = `
            <div class="results-scroll">
                <div class="results-header">
                    <div class="results-title">¡Manual Completado!</div>
                    <div class="results-score">${score}/${data.length}</div>
                    <div class="results-subtitle">Frases correctas</div>
                </div>
                <div class="results-list">
                    ${answers.map(a => `
                        <div class="result-item ${a.correct ? 'correct' : 'incorrect'}">
                            <div class="result-question">${a.phrase}</div>
                            <div class="result-answer">${a.correct ? '✓ ' + a.user : '✗ Tu respuesta: ' + a.user}</div>
                            <div class="result-explanation">${a.exp}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="results-tip">
                    <strong>💡 Consejo:</strong> Repite en voz alta los términos técnicos mientras trabajas. Dominar el vocabulario del oficio te ayudará a comunicarte mejor con tu equipo y entender manuales rápidamente.
                </div>
                <div class="footer">
                    <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
                </div>
            </div>
        `;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
            action: 'TASK_COMPLETED'
        }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        document.documentElement.style.setProperty('--ui-scale', Math.max(0.88, scene.clientHeight / scene.scrollHeight));
    }
}

window.addEventListener('load', ensureFits);
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));
</script>
</body>
</html>
