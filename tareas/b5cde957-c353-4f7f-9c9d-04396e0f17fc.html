
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Herramienta o EPI? 🛠️ - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Herramienta o EPI? 🛠️</div>
<div class="subtitle" id="instruction">Clasifica cada elemento</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress-bar" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/10</span>
</div>
</div>
<div class="main">
<div id="item-display"></div>
<div class="options" id="categories"></div>
</div>
<div class="footer">
<div class="helper">Toca la categoría correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const items = [
{ name: "Guantes dieléctricos", category: "EPI", exp: "Protegen de descargas eléctricas → EPI" },
{ name: "Destornillador buscapolos", category: "Herramienta", exp: "Sirve para detectar tensión → Herramienta" },
{ name: "Casco de seguridad", category: "EPI", exp: "Protege la cabeza de impactos → EPI" },
{ name: "Alicates", category: "Herramienta", exp: "Sirven para cortar y sujetar → Herramienta" },
{ name: "Gafas de seguridad", category: "EPI", exp: "Protegen los ojos de partículas → EPI" },
{ name: "Multímetro", category: "Herramienta", exp: "Mide magnitudes eléctricas → Herramienta" },
{ name: "Botas con puntera", category: "EPI", exp: "Protegen los pies de impactos → EPI" },
{ name: "Pelacables", category: "Herramienta", exp: "Sirve para pelar conductores → Herramienta" },
{ name: "Arnés anticaídas", category: "EPI", exp: "Protege de caídas en altura → EPI" },
{ name: "Cinta aislante", category: "Herramienta", exp: "Es material de trabajo, no protección personal → Herramienta" }
];

let currentIndex = 0;
let answers = [];
let score = 0;

const scene = document.getElementById('scene');
const itemDisplay = document.getElementById('item-display');
const categoriesEl = document.getElementById('categories');
const progressBar = document.getElementById('progress-bar');
const counterEl = document.getElementById('counter');
const instructionEl = document.getElementById('instruction');

function render() {
    if (currentIndex >= items.length) {
        showResults();
        return;
    }
    const item = items[currentIndex];
    progressBar.style.width = (currentIndex / items.length * 100) + '%';
    counterEl.textContent = (currentIndex + 1) + '/' + items.length;
    instructionEl.textContent = '¿Dónde clasificas este elemento?';
    
    itemDisplay.innerHTML = `<div class="brand" style="font-size:1.5rem;text-align:center;padding:1rem 0">${item.name}</div>`;
    
    categoriesEl.innerHTML = `
        <button class="btn-option" onclick="selectCategory('EPI')">🛡️ EPI</button>
        <button class="btn-option" onclick="selectCategory('Herramienta')">🔧 Herramienta</button>
    `;
    ensureFits();
}

function selectCategory(selected) {
    const item = items[currentIndex];
    const isCorrect = selected === item.category;
    if (isCorrect) score++;
    
    answers.push({
        name: item.name,
        correct: isCorrect,
        userAnswer: selected,
        correctAnswer: item.category,
        exp: item.exp
    });

    const buttons = categoriesEl.querySelectorAll('.btn-option');
    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent.includes(item.category)) {
            btn.classList.add('correct');
        } else if (btn.textContent.includes(selected) && !isCorrect) {
            btn.classList.add('incorrect');
        }
    });

    setTimeout(() => {
        currentIndex++;
        render();
    }, 600);
}

function showResults() {
    setTimeout(() => {
        document.documentElement.classList.replace('gameplay', 'results');
        scene.classList.replace('gameplay', 'results');
        
        scene.innerHTML = `
            <div class="results-scroll">
                <div class="results-header">
                    <div class="results-title">¡Almacén organizado!</div>
                    <div class="results-score">${score}/${items.length}</div>
                    <div class="results-subtitle">Elementos bien clasificados</div>
                </div>
                <div class="results-list">
                    ${answers.map(a => `
                        <div class="result-item ${a.correct ? 'correct' : 'incorrect'}">
                            <div class="result-question">${a.name}</div>
                            <div class="result-answer">${a.correct ? '✓ ' + a.correctAnswer : '✗ Dijiste: ' + a.userAnswer}</div>
                            <div class="result-explanation">${a.exp}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="results-tip">
                    <div class="modal-title">💡 Consejo</div>
                    <div class="modal-body">Antes de empezar cualquier trabajo, separa mentalmente lo que te protege (EPIs) de lo que usas para trabajar (herramientas). ¡Tu seguridad primero!</div>
                </div>
                <div class="footer">
                    <button class="cta" onclick="completeTask()">Ver mi recompensa</button>
                </div>
            </div>
        `;
    }, 500);
}

function completeTask() {
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
            action: 'TASK_COMPLETED'
        }));
    }
}

function ensureFits() {
    scene.classList.remove('compact', 'compact-xs');
    document.documentElement.style.setProperty('--ui-scale', 1);
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact');
    if (scene.scrollHeight > scene.clientHeight) scene.classList.add('compact-xs');
    if (scene.scrollHeight > scene.clientHeight) {
        const scale = Math.max(0.88, scene.clientHeight / scene.scrollHeight);
        document.documentElement.style.setProperty('--ui-scale', scale);
    }
}

window.addEventListener('load', () => { ensureFits(); render(); });
window.addEventListener('resize', ensureFits);
window.addEventListener('orientationchange', () => setTimeout(ensureFits, 100));

render();
</script>
</body>
</html>
