
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el protocolo 🔧 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Completa el protocolo 🔧</div>
<div class="subtitle" id="instruction">Selecciona la palabra correcta</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<p id="sentence"></p>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Elige el término que completa la frase</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const data=[
{sentence:"Para trabajar en un cuadro eléctrico, uso destornilladores ___.",blank:"aislados",opts:["aislados","convencionales"],exp:"Los destornilladores aislados protegen de descargas; los convencionales no tienen protección eléctrica."},
{sentence:"Antes de tocar un cable, compruebo si hay tensión con el ___.",blank:"buscapolos",opts:["buscapolos","destornillador","alicate"],exp:"El buscapolos detecta presencia de tensión; el destornillador y alicate no tienen esa función."},
{sentence:"Para medir tensión, corriente y resistencia uso el ___.",blank:"polímetro",opts:["polímetro","buscapolos"],exp:"El polímetro mide múltiples magnitudes; el buscapolos solo detecta fase."},
{sentence:"Protejo mis manos de descargas con guantes ___.",blank:"dieléctricos",opts:["dieléctricos","de cuero","de nitrilo"],exp:"Los guantes dieléctricos aíslan de la electricidad; los de cuero y nitrilo no ofrecen protección eléctrica."},
{sentence:"El cable marrón o negro corresponde a la ___.",blank:"fase",opts:["fase","neutro"],exp:"La fase transporta corriente activa (marrón/negro); el neutro es azul."},
{sentence:"El dispositivo que corta el circuito ante fugas a tierra es el ___.",blank:"diferencial",opts:["diferencial","magnetotérmico"],exp:"El diferencial detecta fugas a tierra; el magnetotérmico protege de sobrecargas y cortocircuitos."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),opts=document.getElementById('options'),sentenceEl=document.getElementById('sentence'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),instruction=document.getElementById('instruction');

function render(){
if(idx>=data.length){showResults();return}
const d=data[idx];
prog.style.width=(idx/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
sentenceEl.innerHTML=d.sentence.replace('___','<u>______</u>');
opts.innerHTML=d.opts.map((o,i)=>`<button class="btn-option" onclick="select(${i})">${o}</button>`).join('');
ensureFits();
}

function select(i){
const d=data[idx];
const chosen=d.opts[i];
const correct=chosen===d.blank;
answers.push({sentence:d.sentence,blank:d.blank,user:chosen,correct,exp:d.exp});
opts.querySelectorAll('.btn-option').forEach((b,j)=>{
b.disabled=true;
if(j===i)b.classList.add(correct?'correct':'incorrect');
if(d.opts[j]===d.blank)b.classList.add('correct');
});
sentenceEl.innerHTML=d.sentence.replace('___',`<u>${chosen}</u>`);
setTimeout(()=>{idx++;render();},600);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Protocolo completado!</div>
<div class="results-score">${score}/${data.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.sentence.replace('___','<strong>'+a.blank+'</strong>')}</div>
<div class="result-answer">${a.correct?'✓ Correcto: '+a.user:'✗ Tu respuesta: '+a.user+' → Correcta: '+a.blank}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
<div class="result-item">
<div class="result-question">💡 Consejo final</div>
<div class="result-explanation">Dominar la terminología técnica es clave para comunicarte con claridad en obra y evitar errores de seguridad.</div>
</div>
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
