
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>¿Mito o realidad? ⚡ Seguridad eléctrica - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">¿Mito o realidad? ⚡</div>
<div class="subtitle">Seguridad eléctrica</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/7</span>
</div>
</div>
<div class="main">
<div id="statement-area"></div>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">¿Esta afirmación es verdadera o falsa?</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const statements=[
{text:"Las tensiones por debajo de 50V son siempre seguras y no pueden causar daño.",ans:false,exp:"Falso. Aunque 50V se considera baja tensión, en condiciones de humedad o con piel mojada pueden ser peligrosas."},
{text:"Los guantes aislantes deben revisarse visualmente antes de cada uso.",ans:true,exp:"Verdadero. Hay que comprobar que no tengan cortes, grietas o perforaciones que comprometan su aislamiento."},
{text:"Si el diferencial no salta, el circuito está completamente seguro para trabajar.",ans:false,exp:"Falso. El diferencial protege contra contactos indirectos, pero no garantiza ausencia de tensión. Siempre hay que verificar."},
{text:"La señalización de trabajos en curso es obligatoria al intervenir en un cuadro eléctrico.",ans:true,exp:"Verdadero. Colocar señales y bloqueos previene que otros reconecten la instalación mientras trabajas."},
{text:"El calzado de seguridad estándar es suficiente para trabajos eléctricos.",ans:false,exp:"Falso. Para riesgo eléctrico se necesita calzado con suela aislante certificada, no solo calzado de seguridad genérico."},
{text:"Ante una descarga eléctrica, lo primero es separar a la víctima de la fuente sin tocarla directamente.",ans:true,exp:"Verdadero. Usa material aislante (madera, plástico) o corta la corriente antes de tocar a la víctima."},
{text:"Un buscapolos que no se ilumina confirma que no hay tensión en el circuito.",ans:false,exp:"Falso. El buscapolos puede fallar o no detectar neutros con tensión. Usa siempre un comprobador de tensión fiable."}
];
let idx=0,score=0,answers=[],blocked=false;
const scene=document.getElementById('scene'),opts=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),stmtArea=document.getElementById('statement-area');

function render(){
if(idx>=statements.length){showResults();return}
blocked=false;
const s=statements[idx];
prog.style.width=((idx)/statements.length*100)+'%';
counter.textContent=(idx+1)+'/'+statements.length;
stmtArea.innerHTML=`<div class="statement-text">${s.text}</div>`;
opts.innerHTML=`<button class="btn-option" id="btn-true" onclick="answer(true)">✓ Verdadero</button><button class="btn-option" id="btn-false" onclick="answer(false)">✗ Falso</button>`;
ensureFits();
}

function answer(userAns){
if(blocked)return;
blocked=true;
const s=statements[idx];
const correct=userAns===s.ans;
if(correct)score++;
answers.push({text:s.text,userAns,correctAns:s.ans,correct,exp:s.exp});
const btnT=document.getElementById('btn-true'),btnF=document.getElementById('btn-false');
if(userAns===true){
btnT.classList.add(correct?'correct':'incorrect');
}else{
btnF.classList.add(correct?'correct':'incorrect');
}
setTimeout(()=>{idx++;render();},1000);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const tip="Recuerda la regla de oro: siempre verifica la ausencia de tensión con un comprobador fiable antes de tocar cualquier conductor.";
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Reto completado!</div>
<div class="results-score">${score}/${statements.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.text}</div>
<div class="result-answer">Tu respuesta: ${a.userAns?'Verdadero':'Falso'} ${a.correct?'✓':'✗'} | Correcta: ${a.correctAns?'Verdadero':'Falso'}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="tip-box"><strong>💡 Consejo:</strong> ${tip}</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',ensureFits);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
