
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔌 Conecta los Conceptos Eléctricos - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease,background 0.3s ease;font-family:'Baloo 2',sans-serif;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.mem-card.pop{animation:pop 0.2s ease-out;}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:center;gap:20px;font-size:14px;color:#0B214A;font-family:'Baloo 2',sans-serif;margin:8px 0;}
.stats-row span{background:rgba(255,255,255,0.9);padding:4px 12px;border-radius:12px;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔌 Conecta los Conceptos</div>
<div class="subtitle">Empareja términos eléctricos</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejarlas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairs=[
{id:1,a:'Interruptor diferencial',b:'Protege contra contactos eléctricos',exp:'El diferencial detecta fugas de corriente y corta el suministro para evitar electrocuciones.'},
{id:2,a:'Cable de tierra',b:'Color verde y amarillo',exp:'El cable de tierra siempre es verde/amarillo por normativa internacional de seguridad.'},
{id:3,a:'Fusible',b:'Se funde por sobrecarga',exp:'El fusible protege el circuito fundiéndose cuando la corriente supera su capacidad.'},
{id:4,a:'Voltímetro',b:'Mide tensión eléctrica',exp:'El voltímetro mide la diferencia de potencial (voltios) entre dos puntos del circuito.'}
];
let cards=[],firstCard=null,secondCard=null,lockBoard=false,attempts=0,matchedPairs=0,maxAttempts=10,gameHistory=[];
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs');

function initGame(){
cards=[];
pairs.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>flipCard(i,div);
board.appendChild(div);
});
}

function flipCard(index,el){
if(lockBoard||el.classList.contains('revealed')||el.classList.contains('matched'))return;
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[index].text;
if(!firstCard){
firstCard={index,el};
}else{
secondCard={index,el};
attempts++;
attemptsEl.textContent=`Intento ${attempts}/${maxAttempts}`;
checkMatch();
}
}

function checkMatch(){
lockBoard=true;
const c1=cards[firstCard.index],c2=cards[secondCard.index];
if(c1.pairId===c2.pairId&&c1.type!==c2.type){
firstCard.el.classList.add('matched');
secondCard.el.classList.add('matched');
matchedPairs++;
pairsEl.textContent=`${matchedPairs}/4 parejas`;
const pair=pairs.find(p=>p.id===c1.pairId);
gameHistory.push({pair,found:true});
resetTurn();
if(matchedPairs===4)endGame(true);
}else{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('revealed','shake');
firstCard.el.classList.add('covered');
firstCard.el.textContent='?';
secondCard.el.classList.remove('revealed','shake');
secondCard.el.classList.add('covered');
secondCard.el.textContent='?';
resetTurn();
if(attempts>=maxAttempts)endGame(false);
},2000);
}
}

function resetTurn(){firstCard=null;secondCard=null;lockBoard=false;}

function endGame(won){
const notFound=pairs.filter(p=>!gameHistory.find(h=>h.pair.id===p.id));
notFound.forEach(p=>gameHistory.push({pair:p,found:false}));
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
document.getElementById('scene').classList.replace('gameplay','results');
renderResults(won);
},500);
}

function renderResults(won){
const scene=document.getElementById('scene');
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${won?'¡Excelente trabajo!':'¡Sigue practicando!'}</div>
<div class="results-score">${matchedPairs}/4</div>
<div class="results-subtitle">parejas encontradas en ${attempts} intentos</div>
</div>
<div class="results-list">
${pairs.map(p=>{
const found=gameHistory.find(h=>h.pair.id===p.id&&h.found);
return `<div class="result-item ${found?'correct':'incorrect'}">
<div class="result-question">${p.a} ↔ ${p.b}</div>
<div class="result-answer">${found?'✓ Encontrada':'✗ No encontrada'}</div>
<div class="result-explanation">${p.exp}</div>
</div>`;
}).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
const scene=document.getElementById('scene');
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{initGame();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
