
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧠 Conecta los Conceptos: Seguridad en Obra - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto}
.mem-card{height:70px;width:100%;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:transform 0.2s ease;padding:4px;box-sizing:border-box}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2}
.mem-card.shake{animation:shake 0.5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.mem-card.pop{animation:pop 0.2s ease}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:center;gap:16px;font-size:14px;color:#0B214A;margin:8px 0}
.stats-row span{background:#f0f0f0;padding:4px 10px;border-radius:12px}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🧠 Seguridad en Obra</div>
<div class="subtitle">Empareja cada EPI con su riesgo</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejarlas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const pairsData=[
{id:1,a:"Casco",b:"Caída de objetos",exp:"El casco protege la cabeza de impactos por objetos que caen desde altura."},
{id:2,a:"Guantes aislantes",b:"Riesgo eléctrico",exp:"Los guantes aislantes evitan el paso de corriente eléctrica al cuerpo."},
{id:3,a:"Mascarilla FFP2",b:"Polvo/partículas",exp:"La mascarilla FFP2 filtra partículas finas y polvo nocivo en suspensión."},
{id:4,a:"Gafas protectoras",b:"Proyecciones",exp:"Las gafas protegen los ojos de fragmentos y salpicaduras."}
];
let cards=[],firstCard=null,secondCard=null,locked=false,attempts=0,matchedPairs=0,maxAttempts=10;
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs');

function init(){
cards=[];
pairsData.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const el=document.createElement('div');
el.className='mem-card covered';
el.dataset.index=i;
el.textContent='?';
el.onclick=()=>handleClick(i,el);
board.appendChild(el);
});
ensureFits();
}

function handleClick(idx,el){
if(locked)return;
if(el.classList.contains('matched'))return;
if(el.classList.contains('revealed'))return;
revealCard(el,idx);
if(!firstCard){
firstCard={idx,el};
}else{
secondCard={idx,el};
locked=true;
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
checkMatch();
}
}

function revealCard(el,idx){
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[idx].text;
}

function coverCard(el,idx){
el.classList.remove('revealed','pop');
el.classList.add('covered');
el.textContent='?';
}

function checkMatch(){
const c1=cards[firstCard.idx],c2=cards[secondCard.idx];
if(c1.pairId===c2.pairId&&c1.type!==c2.type){
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matchedPairs++;
pairsEl.textContent=`${matchedPairs}/4 parejas`;
resetSelection();
if(matchedPairs===4){showResults(true);}
else if(attempts>=maxAttempts){showResults(false);}
}else{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('shake');
secondCard.el.classList.remove('shake');
coverCard(firstCard.el,firstCard.idx);
coverCard(secondCard.el,secondCard.idx);
resetSelection();
if(attempts>=maxAttempts&&matchedPairs<4){showResults(false);}
},2000);
}
}

function resetSelection(){firstCard=null;secondCard=null;locked=false;}

function showResults(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
document.getElementById('scene').classList.replace('gameplay','results');
const matched=pairsData.filter(p=>isMatched(p.id));
const missed=pairsData.filter(p=>!isMatched(p.id));
let html=`<div class="results-scroll"><div class="results-header"><div class="results-title">${won?'¡Excelente!':'¡Sigue practicando!'}</div><div class="results-score">${matchedPairs}/4</div><div class="results-subtitle">parejas encontradas en ${attempts} intentos</div></div><div class="results-list">`;
if(won){
html+=`<div class="result-item correct"><div class="result-question">¡Has demostrado conocer los EPIs básicos!</div></div>`;
pairsData.forEach(p=>{
html+=`<div class="result-item correct"><div class="result-question">${p.a} ↔ ${p.b}</div><div class="result-explanation">${p.exp}</div></div>`;
});
}else{
if(matched.length>0){
html+=`<div class="result-item correct"><div class="result-question">Parejas encontradas:</div></div>`;
matched.forEach(p=>{
html+=`<div class="result-item correct"><div class="result-question">${p.a} ↔ ${p.b}</div><div class="result-explanation">${p.exp}</div></div>`;
});
}
html+=`<div class="result-item incorrect"><div class="result-question">Parejas que faltaban:</div></div>`;
missed.forEach(p=>{
html+=`<div class="result-item incorrect"><div class="result-question">${p.a} ↔ ${p.b}</div><div class="result-explanation">${p.exp}</div></div>`;
});
html+=`<div class="result-item"><div class="result-explanation">¡No te rindas! La seguridad es fundamental en obra.</div></div>`;
}
html+=`</div><div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div></div>`;
document.getElementById('scene').innerHTML=html;
},500);
}

function isMatched(pairId){
const idxs=cards.map((c,i)=>c.pairId===pairId?i:-1).filter(i=>i>=0);
const els=board.querySelectorAll('.mem-card');
return idxs.every(i=>els[i]&&els[i].classList.contains('matched'));
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
const scene=document.getElementById('scene');
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
