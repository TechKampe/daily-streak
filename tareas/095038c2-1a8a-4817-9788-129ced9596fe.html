
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Completa el Hueco: Herramientas del Oficio 🔧 - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">Herramientas del Oficio 🔧</div>
<div class="subtitle" id="subtitle">Completa la frase correctamente</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/6</span>
</div>
</div>
<div class="main">
<p id="sentence-text"></p>
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Selecciona la palabra correcta para el hueco</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const clozes=[
{sentence:"Para medir tensión eléctrica, uso el ___.",blank:"multímetro",opts:["multímetro","buscapolos","pelacables"],exp:"El multímetro mide tensión, corriente y resistencia. El buscapolos solo detecta presencia de fase y el pelacables quita aislante."},
{sentence:"Para detectar si un cable tiene corriente, uso el ___.",blank:"buscapolos",opts:["buscapolos","multímetro","regleta"],exp:"El buscapolos indica presencia de fase de forma rápida. El multímetro da medidas precisas pero es más lento para comprobaciones simples."},
{sentence:"Para quitar el aislante de un cable, uso el ___.",blank:"pelacables",opts:["pelacables","destornillador","guantes"],exp:"El pelacables está diseñado para retirar aislante sin dañar el conductor. Un destornillador puede cortar el cable."},
{sentence:"Para proteger mis manos de descargas, uso ___.",blank:"guantes aislantes",opts:["guantes aislantes","gafas","casco"],exp:"Los guantes aislantes protegen de descargas eléctricas. Las gafas protegen los ojos y el casco la cabeza de impactos."},
{sentence:"La tensión se mide en ___.",blank:"voltios",opts:["voltios","amperios","ohmios"],exp:"Los voltios miden tensión. Los amperios miden intensidad de corriente y los ohmios miden resistencia."},
{sentence:"Para encender o apagar la luz, pulso el ___.",blank:"interruptor",opts:["interruptor","enchufe","diferencial"],exp:"El interruptor abre o cierra el circuito de iluminación. El enchufe da conexión a aparatos y el diferencial protege personas."}
];
let idx=0,answers=[];
const scene=document.getElementById('scene'),optsEl=document.getElementById('options'),prog=document.getElementById('progress'),counter=document.getElementById('counter'),sentenceEl=document.getElementById('sentence-text');

function render(){
if(idx>=clozes.length){showResults();return}
const c=clozes[idx];
prog.style.width=(idx/clozes.length*100)+'%';
counter.textContent=(idx+1)+'/'+clozes.length;
sentenceEl.innerHTML=c.sentence.replace('___','<u>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</u>');
optsEl.innerHTML=c.opts.map((o,i)=>`<button class="btn-option" onclick="choose(${i})">${o}</button>`).join('');
ensureFits();
}

function choose(i){
const c=clozes[idx];
const correct=c.opts[i]===c.blank;
answers.push({sentence:c.sentence,blank:c.blank,user:c.opts[i],correct,exp:c.exp,opts:c.opts});
const btns=optsEl.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{b.disabled=true;if(j===i)b.classList.add(correct?'correct':'incorrect');if(c.opts[j]===c.blank)b.classList.add('correct');});
sentenceEl.innerHTML=c.sentence.replace('___',`<u>${c.opts[i]}</u>`);
setTimeout(()=>{idx++;render();},700);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const score=answers.filter(a=>a.correct).length;
scene.innerHTML=`<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Prueba superada!</div>
<div class="results-score">${score}/${clozes.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map(a=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${a.sentence.replace('___','<b>'+a.blank+'</b>')}</div>
<div class="result-answer">${a.correct?'✓ Correcto':'✗ Respondiste: '+a.user}</div>
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
<div class="result-item">
<div class="result-question">💡 Consejo final</div>
<div class="result-explanation">Dominar la terminología técnica es clave para comunicarte en obra y evitar errores. Repasa los nombres de herramientas y unidades hasta que te salgan solos.</div>
</div>
</div>
<div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',render);
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
