
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧠 Conecta los EPIs con su protección - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease;font-family:'Baloo 2',sans-serif;}
.mem-card.tapped{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;font-weight:500;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;font-weight:500;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease;}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:space-between;font-size:14px;color:#0B214A;padding:0 16px;margin-bottom:8px;font-family:'Baloo 2',sans-serif;}
.stats-row span{font-weight:500;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🧠 EPIs y Protección</div>
<div class="subtitle">Encuentra las 4 parejas</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejar EPI con protección</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairs=[
{id:1,a:"Casco",b:"Protege la cabeza",exp:"El casco evita traumatismos por caída de objetos o golpes."},
{id:2,a:"Guantes",b:"Protege las manos",exp:"Los guantes previenen cortes, quemaduras y contacto con sustancias."},
{id:3,a:"Gafas de seguridad",b:"Protege los ojos",exp:"Las gafas evitan proyecciones, salpicaduras y partículas."},
{id:4,a:"Tapones auditivos",b:"Protege los oídos",exp:"Los tapones previenen daños por ruido excesivo en obra."}
];
let cards=[],first=null,second=null,attempts=0,matched=0,locked=false;
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function init(){
cards=[];
pairs.forEach(p=>{
cards.push({pairId:p.id,text:p.a,type:'a'});
cards.push({pairId:p.id,text:p.b,type:'b'});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card tapped';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>handleClick(i,div);
board.appendChild(div);
});
ensureFits();
}

function handleClick(index,el){
if(locked)return;
if(el.classList.contains('matched')||el.classList.contains('revealed'))return;
if(first&&first.index===index)return;
el.classList.remove('tapped');
el.classList.add('revealed','pop');
el.textContent=cards[index].text;
if(!first){
first={index,el,card:cards[index]};
}else{
second={index,el,card:cards[index]};
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
checkMatch();
}
}

function checkMatch(){
locked=true;
const isMatch=first.card.pairId===second.card.pairId&&first.card.type!==second.card.type;
if(isMatch){
setTimeout(()=>{
first.el.classList.remove('revealed');
first.el.classList.add('matched');
second.el.classList.remove('revealed');
second.el.classList.add('matched');
matched++;
pairsEl.textContent=`${matched}/4 parejas`;
resetSelection();
if(matched===4)endGame(true);
else if(attempts>=10)endGame(false);
},300);
}else{
setTimeout(()=>{
first.el.classList.add('shake');
second.el.classList.add('shake');
},100);
setTimeout(()=>{
first.el.classList.remove('revealed','shake');
first.el.classList.add('tapped');
first.el.textContent='?';
second.el.classList.remove('revealed','shake');
second.el.classList.add('tapped');
second.el.textContent='?';
resetSelection();
if(attempts>=10)endGame(false);
},2000);
}
}

function resetSelection(){first=null;second=null;locked=false;}

function endGame(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
const missing=pairs.filter(p=>!isMatched(p.id));
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${won?'¡Excelente!':'¡Sigue practicando!'}</div>
<div class="results-score">${matched}/4</div>
<div class="results-subtitle">Parejas encontradas en ${attempts} intentos</div>
</div>
<div class="results-list">
${pairs.map(p=>`
<div class="result-item ${isMatched(p.id)?'correct':'incorrect'}">
<div class="result-question">${p.a} → ${p.b}</div>
<div class="result-answer">${isMatched(p.id)?'✓ Emparejado':'✗ No encontrado'}</div>
<div class="result-explanation">${p.exp}</div>
</div>
`).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function isMatched(pairId){
const cardEls=board.querySelectorAll('.mem-card');
let count=0;
cards.forEach((c,i)=>{
if(c.pairId===pairId&&cardEls[i]&&cardEls[i].classList.contains('matched'))count++;
});
return count===2;
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
