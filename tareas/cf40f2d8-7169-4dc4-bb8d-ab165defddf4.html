
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🧠 Conecta el Oficio: Memory de Herramientas - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease;font-family:'Baloo 2',sans-serif;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:center;gap:20px;font-size:14px;color:#0B214A;font-family:'Baloo 2',sans-serif;margin:8px 0;}
.stats-row span{background:#f0f0f0;padding:4px 12px;border-radius:12px;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🧠 Memory de Herramientas</div>
<div class="subtitle">Encuentra las 4 parejas herramienta-función</div>
</div>
</div>
<div class="main">
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejarlas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairsData=[
{id:1,tool:"Llave inglesa",func:"Apretar tuercas",exp:"La llave inglesa ajusta tuercas de distintos tamaños gracias a su mandíbula regulable."},
{id:2,tool:"Destornillador",func:"Fijar tornillos",exp:"El destornillador transmite torque para apretar o aflojar tornillos de forma precisa."},
{id:3,tool:"Nivel de burbuja",func:"Comprobar horizontalidad",exp:"El nivel de burbuja indica si una superficie está perfectamente horizontal o vertical."},
{id:4,tool:"Alicates",func:"Sujetar y cortar cables",exp:"Los alicates permiten sujetar piezas y cortar cables con sus bordes afilados."}
];

let cards=[],firstCard=null,secondCard=null,attempts=0,matchedPairs=0,locked=false;
const maxAttempts=10,totalPairs=4;
const board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs'),scene=document.getElementById('scene');

function init(){
cards=[];
pairsData.forEach(p=>{
cards.push({pairId:p.id,text:p.tool,type:'tool'});
cards.push({pairId:p.id,text:p.func,type:'func'});
});
shuffle(cards);
renderBoard();
ensureFits();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>handleClick(i,div);
board.appendChild(div);
});
}

function handleClick(index,el){
if(locked)return;
if(el.classList.contains('matched'))return;
if(el.classList.contains('revealed'))return;
if(firstCard&&firstCard.index===index)return;

revealCard(el,index);

if(!firstCard){
firstCard={index,el,card:cards[index]};
}else{
secondCard={index,el,card:cards[index]};
attempts++;
updateStats();
checkMatch();
}
}

function revealCard(el,index){
const c=cards[index];
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=c.text;
}

function coverCard(el){
el.classList.remove('revealed','pop');
el.classList.add('covered');
el.textContent='?';
}

function checkMatch(){
locked=true;
const isMatch=firstCard.card.pairId===secondCard.card.pairId&&firstCard.card.type!==secondCard.card.type;

if(isMatch){
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matchedPairs++;
updateStats();
resetSelection();
locked=false;
if(matchedPairs===totalPairs){
showResults(true);
}
}else{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('shake');
secondCard.el.classList.remove('shake');
coverCard(firstCard.el);
coverCard(secondCard.el);
resetSelection();
locked=false;
if(attempts>=maxAttempts){
showResults(false);
}
},2000);
}
}

function resetSelection(){firstCard=null;secondCard=null;}

function updateStats(){
attemptsEl.textContent=`Intento ${attempts}/${maxAttempts}`;
pairsEl.textContent=`${matchedPairs}/${totalPairs} parejas`;
}

function showResults(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');

const matchedIds=[];
document.querySelectorAll('.mem-card.matched').forEach(el=>{
const c=cards[el.dataset.index];
if(!matchedIds.includes(c.pairId))matchedIds.push(c.pairId);
});

let html=`<div class="results-scroll"><div class="results-header">
<div class="results-title">${won?'¡Felicidades!':'¡Sigue practicando!'}</div>
<div class="results-score">${matchedPairs}/${totalPairs}</div>
<div class="results-subtitle">${won?'Parejas encontradas':'parejas encontradas'}</div>
</div><div class="results-list">`;

pairsData.forEach(p=>{
const found=matchedIds.includes(p.id);
html+=`<div class="result-item ${found?'correct':'incorrect'}">
<div class="result-question">${p.tool} → ${p.func}</div>
<div class="result-answer">${found?'✓ Pareja encontrada':'✗ No encontrada'}</div>
<div class="result-explanation">${p.exp}</div>
</div>`;
});

html+=`</div><div class="footer"><button class="cta" onclick="completeTask()">Ver mi recompensa</button></div></div>`;
scene.innerHTML=html;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
