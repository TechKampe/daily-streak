
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔌 Conecta los Conceptos Eléctricos - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto;}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease;user-select:none;-webkit-user-select:none;}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700;}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2;}
.mem-card.shake{animation:shake 0.5s ease;}
.mem-card.pop{animation:pop 0.2s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:space-between;padding:0 16px;font-size:14px;color:#0B214A;margin-bottom:8px;}
.pair-item{padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:8px;}
.pair-title{font-weight:700;color:#0B214A;margin-bottom:4px;}
.pair-desc{font-size:13px;color:#555;line-height:1.3;}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔌 Conceptos Eléctricos</div>
<div class="subtitle">Empareja términos con definiciones</div>
</div>
</div>
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="main">
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejar</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar%201_low.png" alt="" loading="lazy">
<script>
const pairs=[
{id:1,term:"Diferencial",def:"Protege contra fugas",explanation:"El diferencial detecta fugas de corriente a tierra y corta el suministro para evitar electrocuciones."},
{id:2,term:"Fase",def:"Cable con corriente",explanation:"El cable de fase (marrón/negro) transporta la corriente eléctrica desde el cuadro hasta los receptores."},
{id:3,term:"Multímetro",def:"Mide voltaje y Ω",explanation:"El multímetro es la herramienta básica del electricista para medir tensión, corriente y resistencia."},
{id:4,term:"Empalme",def:"Une dos cables",explanation:"Un empalme correcto garantiza continuidad eléctrica y seguridad en las conexiones."}
];

let cards=[],firstCard=null,secondCard=null,locked=false,attempts=0,matchedPairs=0;
const maxAttempts=10,board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs');

function init(){
cards=[];
pairs.forEach(p=>{
cards.push({pairId:p.id,text:p.term,type:'term'});
cards.push({pairId:p.id,text:p.def,type:'def'});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>handleClick(i,div);
board.appendChild(div);
});
ensureFits();
}

function handleClick(index,el){
if(locked)return;
if(el.classList.contains('matched'))return;
if(el.classList.contains('revealed'))return;
if(firstCard&&firstCard.index===index)return;

el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[index].text;

if(!firstCard){
firstCard={index,el,pairId:cards[index].pairId};
}else{
secondCard={index,el,pairId:cards[index].pairId};
attempts++;
updateStats();
checkMatch();
}
}

function checkMatch(){
locked=true;
if(firstCard.pairId===secondCard.pairId){
setTimeout(()=>{
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matchedPairs++;
updateStats();
resetTurn();
if(matchedPairs===4)endGame(true);
else if(attempts>=maxAttempts)endGame(false);
},300);
}else{
setTimeout(()=>{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
},200);
setTimeout(()=>{
firstCard.el.classList.remove('revealed','shake');
firstCard.el.classList.add('covered');
firstCard.el.textContent='?';
secondCard.el.classList.remove('revealed','shake');
secondCard.el.classList.add('covered');
secondCard.el.textContent='?';
resetTurn();
if(attempts>=maxAttempts)endGame(false);
},2000);
}
}

function resetTurn(){firstCard=null;secondCard=null;locked=false;}
function updateStats(){attemptsEl.textContent=`Intento ${attempts}/10`;pairsEl.textContent=`${matchedPairs}/4 parejas`;}

function endGame(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
document.getElementById('scene').classList.replace('gameplay','results');
const scene=document.getElementById('scene');
const title=won?'¡Excelente trabajo!':'¡Sigue practicando!';
const subtitle=won?`Completaste todas las parejas en ${attempts} intentos`:`Encontraste ${matchedPairs}/4 parejas`;
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${title}</div>
<div class="results-score">${matchedPairs}/4</div>
<div class="results-subtitle">${subtitle}</div>
</div>
<div class="results-list">
<div style="padding:0 16px 8px;font-weight:700;color:#0B214A;">Parejas y su importancia:</div>
${pairs.map(p=>`
<div class="pair-item">
<div class="pair-title">${p.term} ↔ ${p.def}</div>
<div class="pair-desc">${p.explanation}</div>
</div>
`).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
const scene=document.getElementById('scene');
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
