
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>🔌 Conecta los Conceptos Eléctricos - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
<style>
.memory-board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;width:100%;max-width:400px;margin:0 auto}
.mem-card{height:70px;width:100%;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;box-sizing:border-box;transition:transform 0.2s ease,background 0.2s ease}
.mem-card.covered{background:#00E6BC;color:#0B214A;font-size:15px;font-weight:700}
.mem-card.revealed{background:#fff;border:2px solid #0B214A;color:#0B214A;font-size:12px;line-height:1.2}
.mem-card.matched{background:#d4edda;border:2px solid #28a745;color:#0B214A;font-size:12px;line-height:1.2}
.mem-card.shake{animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.mem-card.pop{animation:pop 0.2s ease}
@keyframes pop{0%{transform:scale(0.95)}100%{transform:scale(1)}}
.stats-row{display:flex;justify-content:space-between;padding:0 16px;font-size:14px;color:#0B214A;margin-bottom:8px}
.pairs-list{display:flex;flex-direction:column;gap:8px;padding:0 16px}
.pair-item{background:#f8f9fa;border-radius:8px;padding:12px;border-left:4px solid #00E6BC}
.pair-item .pair-title{font-weight:700;color:#0B214A;margin-bottom:4px}
.pair-item .pair-desc{font-size:13px;color:#555;line-height:1.3}
</style>
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">🔌 Conecta Conceptos</div>
<div class="subtitle">Encuentra las 4 parejas técnicas</div>
</div>
</div>
<div class="stats-row">
<span id="attempts">Intento 0/10</span>
<span id="pairs">0/4 parejas</span>
</div>
<div class="main">
<div class="memory-board" id="board"></div>
</div>
<div class="footer">
<div class="helper">Toca dos cartas para emparejarlas</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const pairsData=[
{id:1,a:"Interruptor diferencial",b:"Protege contra fugas",exp:"El diferencial detecta fugas de corriente y corta el suministro para evitar electrocuciones."},
{id:2,a:"Cable de tierra",b:"Color verde-amarillo",exp:"Por normativa, el cable de tierra siempre es verde-amarillo para identificarlo fácilmente."},
{id:3,a:"Voltímetro",b:"Mide tensión eléctrica",exp:"El voltímetro mide la diferencia de potencial (voltios) entre dos puntos del circuito."},
{id:4,a:"Fase",b:"Cable con corriente activa",exp:"La fase es el conductor que lleva la corriente eléctrica desde la red al punto de consumo."}
];
let cards=[],firstCard=null,secondCard=null,locked=false,attempts=0,matchedPairs=0;
const maxAttempts=10,board=document.getElementById('board'),attemptsEl=document.getElementById('attempts'),pairsEl=document.getElementById('pairs');

function init(){
cards=[];
pairsData.forEach(p=>{
cards.push({pairId:p.id,text:p.a});
cards.push({pairId:p.id,text:p.b});
});
shuffle(cards);
renderBoard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function renderBoard(){
board.innerHTML='';
cards.forEach((c,i)=>{
const div=document.createElement('div');
div.className='mem-card covered';
div.dataset.index=i;
div.textContent='?';
div.onclick=()=>flipCard(i,div);
board.appendChild(div);
});
ensureFits();
}

function flipCard(idx,el){
if(locked||el.classList.contains('revealed')||el.classList.contains('matched'))return;
el.classList.remove('covered');
el.classList.add('revealed','pop');
el.textContent=cards[idx].text;
if(!firstCard){
firstCard={idx,el};
}else{
secondCard={idx,el};
locked=true;
attempts++;
attemptsEl.textContent=`Intento ${attempts}/10`;
checkMatch();
}
}

function checkMatch(){
const isMatch=cards[firstCard.idx].pairId===cards[secondCard.idx].pairId;
if(isMatch){
firstCard.el.classList.remove('revealed');
firstCard.el.classList.add('matched');
secondCard.el.classList.remove('revealed');
secondCard.el.classList.add('matched');
matchedPairs++;
pairsEl.textContent=`${matchedPairs}/4 parejas`;
resetSelection();
if(matchedPairs===4)endGame(true);
}else{
firstCard.el.classList.add('shake');
secondCard.el.classList.add('shake');
setTimeout(()=>{
firstCard.el.classList.remove('revealed','shake');
firstCard.el.classList.add('covered');
firstCard.el.textContent='?';
secondCard.el.classList.remove('revealed','shake');
secondCard.el.classList.add('covered');
secondCard.el.textContent='?';
resetSelection();
if(attempts>=maxAttempts)endGame(false);
},2000);
}
}

function resetSelection(){firstCard=null;secondCard=null;locked=false;}

function endGame(won){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
document.getElementById('scene').classList.replace('gameplay','results');
const title=won?'¡Excelente trabajo!':'¡Sigue practicando!';
const subtitle=won?`Encontraste las 4 parejas en ${attempts} intentos`:`Encontraste ${matchedPairs}/4 parejas`;
document.getElementById('scene').innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">${title}</div>
<div class="results-score">${matchedPairs}/4</div>
<div class="results-subtitle">${subtitle}</div>
</div>
<div class="pairs-list">
${pairsData.map(p=>`
<div class="pair-item">
<div class="pair-title">${p.a} ↔ ${p.b}</div>
<div class="pair-desc">${p.exp}</div>
</div>
`).join('')}
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
const scene=document.getElementById('scene');
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{init();ensureFits();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
</script>
</body>
</html>
