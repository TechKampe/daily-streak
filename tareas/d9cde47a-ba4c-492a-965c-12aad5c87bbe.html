
<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>⚡ Voltios bajo control - Kämpe Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://techkampe.github.io/daily-streak/assets/css/daily_tasks.css">
</head>
<body>
<div class="scene gameplay" id="scene">
<div class="hud">
<div class="hud-titles">
<div class="brand">⚡ Voltios bajo control</div>
<div class="subtitle" id="question">Cargando...</div>
</div>
<div class="progress-row">
<div class="bar-wrap">
<span class="bar-label">Progreso</span>
<div class="bar"><i id="progress" style="width:0%"></i></div>
</div>
<span class="badge" id="counter">1/5</span>
</div>
</div>
<div class="main">
<div class="options" id="options"></div>
</div>
<div class="footer">
<div class="helper">Toca la respuesta correcta</div>
</div>
</div>
<img class="avatar" src="https://techkampe.github.io/daily-streak/assets/Avatar 1_low.png" alt="" loading="lazy">
<script>
const data=[
{q:"¿De qué color es el cable de tierra?",opts:["Azul","Verde/Amarillo","Marrón","Negro"],ans:1,exp:"El cable verde/amarillo siempre es tierra por normativa UNE."},
{q:"¿Cuál es el voltaje doméstico en España?",opts:["110V","220V","230V","380V"],ans:2,exp:"En España el voltaje doméstico es 230V desde la norma europea."},
{q:"¿Qué EPI es básico para un electricista?",opts:["Casco de obra","Guantes aislantes","Chaleco reflectante"],ans:1,exp:"Los guantes aislantes protegen contra descargas eléctricas."},
{q:"¿Qué hacer antes de tocar un cuadro?",opts:["Avisar al jefe","Cortar el suministro","Ponerse gafas"],ans:1,exp:"Siempre corta el suministro y verifica ausencia de tensión."},
{q:"¿Qué herramienta comprueba tensión?",opts:["Destornillador plano","Buscapolos","Alicates"],ans:1,exp:"El buscapolos detecta presencia de tensión de forma segura."}
];
let idx=0,score=0,answers=[],animating=false;
const scene=document.getElementById('scene'),opts=document.getElementById('options'),qEl=document.getElementById('question'),prog=document.getElementById('progress'),counter=document.getElementById('counter');

function render(){
if(idx>=data.length){showResults();return}
const d=data[idx];
qEl.textContent=d.q;
prog.style.width=(idx/data.length*100)+'%';
counter.textContent=(idx+1)+'/'+data.length;
opts.innerHTML=d.opts.map((o,i)=>`<button class="btn-option" onclick="select(${i})" aria-label="${o}">${o}</button>`).join('');
opts.style.opacity='1';
opts.style.transform='translateX(0)';
ensureFits();
}

function select(i){
if(animating)return;
animating=true;
const d=data[idx];
const correct=i===d.ans;
if(correct)score++;
answers.push({q:d.q,correct,exp:d.exp,user:d.opts[i],correctAns:d.opts[d.ans]});
const btns=opts.querySelectorAll('.btn-option');
btns.forEach((b,j)=>{
if(j===i)b.classList.add(correct?'correct':'incorrect');
if(j===d.ans&&!correct)b.classList.add('correct');
b.disabled=true;
});
setTimeout(()=>{
opts.style.opacity='0';
opts.style.transform='translateX(-20px)';
setTimeout(()=>{
idx++;
animating=false;
render();
},250);
},600);
}

function showResults(){
setTimeout(()=>{
document.documentElement.classList.replace('gameplay','results');
scene.classList.replace('gameplay','results');
scene.innerHTML=`
<div class="results-scroll">
<div class="results-header">
<div class="results-title">¡Prueba superada!</div>
<div class="results-score">${score}/${data.length}</div>
<div class="results-subtitle">Respuestas correctas</div>
</div>
<div class="results-list">
${answers.map((a,i)=>`<div class="result-item ${a.correct?'correct':'incorrect'}">
<div class="result-question">${i+1}. ${a.q}</div>
<div class="result-answer">${a.correct?'✓ '+a.user:'✗ Tu respuesta: '+a.user}</div>
${!a.correct?`<div class="result-answer">→ Correcta: ${a.correctAns}</div>`:''}
<div class="result-explanation">${a.exp}</div>
</div>`).join('')}
</div>
<div class="results-tip">
<strong>💡 Consejo:</strong> Antes de tocar, verifica siempre con el buscapolos. La electricidad no avisa.
</div>
<div class="footer">
<button class="cta" onclick="completeTask()">Ver mi recompensa</button>
</div>
</div>`;
},500);
}

function completeTask(){
if(window.ReactNativeWebView){
window.ReactNativeWebView.postMessage(JSON.stringify({action:'TASK_COMPLETED'}));
}
}

function ensureFits(){
scene.classList.remove('compact','compact-xs');
document.documentElement.style.setProperty('--ui-scale',1);
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact');
if(scene.scrollHeight>scene.clientHeight)scene.classList.add('compact-xs');
if(scene.scrollHeight>scene.clientHeight){
document.documentElement.style.setProperty('--ui-scale',Math.max(0.88,scene.clientHeight/scene.scrollHeight));
}
}

window.addEventListener('load',()=>{ensureFits();render();});
window.addEventListener('resize',ensureFits);
window.addEventListener('orientationchange',()=>setTimeout(ensureFits,100));
render();
</script>
</body>
</html>
