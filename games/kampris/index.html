<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KampRIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=19">
</head>
<body>
  <div id="wrapper">

    <!-- INTRO / COUNTDOWN -->
    <section id="intro" class="screen active">
      <img class="intro-title" src="https://res.cloudinary.com/kampe/image/upload/f_auto,q_auto/game_title_vgld8d.png" alt="KampRIS" draggable="false">
      <div class="intro-tagline">Clasifica. Acumula. No pares.</div>
      <button id="btn-start" class="btn-primary" disabled>CARGANDO…</button>
      <div id="preload-progress"><div id="preload-fill"></div></div>
    </section>

    <!-- GAMEPLAY -->
    <section id="play" class="screen">

      <!-- HUD -->
      <div id="hud">
        <img id="hud-logo" src="https://res.cloudinary.com/kampe/image/upload/f_auto,q_auto/game_title_vgld8d.png" alt="KampRIS" draggable="false">
        <div id="hud-score-wrap">
          <div id="hud-score-label">Puntos</div>
          <div id="hud-score">0</div>
        </div>
      </div>

      <!-- PLAYFIELD -->
      <div id="playfield">
        <div id="lane-tints">
          <div class="lane-tint" data-lane="0"></div>
          <div class="lane-tint" data-lane="1"></div>
          <div class="lane-tint" data-lane="2"></div>
        </div>
        <div id="grid-bg"></div>

        <!-- Fall zone: the entire area above the label strip. Contains falling items AND stacks. -->
        <div id="fall-zone">
          <div id="lanes-stacks">
            <div class="lane-stack" data-lane="0"></div>
            <div class="lane-stack" data-lane="1"></div>
            <div class="lane-stack" data-lane="2"></div>
          </div>
          <!-- falling item injected here by JS -->
        </div>

        <!-- Lane label strip at the BOTTOM — landing surface for the first piece per lane -->
        <div id="lane-headers">
          <div class="lane-header" data-lane="0" data-category="electricidad">
            <img class="lane-icon" src="https://res.cloudinary.com/kampe/image/upload/f_auto,q_auto/icon_electricidad_s2ymmv.png" alt="Electricidad" draggable="false">
            <div class="lane-label">ELECTRICIDAD</div>
          </div>
          <div class="lane-header" data-lane="1" data-category="fontaneria">
            <img class="lane-icon" src="https://res.cloudinary.com/kampe/image/upload/f_auto,q_auto/icon_fontaneria_r4tgdy.png" alt="Fontanería" draggable="false">
            <div class="lane-label">FONTANERÍA</div>
          </div>
          <div class="lane-header" data-lane="2" data-category="climatizacion">
            <img class="lane-icon" src="https://res.cloudinary.com/kampe/image/upload/f_auto,q_auto/icon_climatizacion_cmgom2.png" alt="Climatización" draggable="false">
            <div class="lane-label">CLIMATIZACIÓN</div>
          </div>
        </div>

        <div id="floor-line"></div>

        <div id="particles"></div>
        <div id="combo-text"></div>
        <div id="flash-overlay"></div>

        <!-- Tutorial overlay (annotations only, not a modal) -->
        <div id="tutorial" class="hidden">
          <div id="tutorial-dim"></div>
          <div id="tutorial-annotations"></div>
          <div id="tutorial-tap-hint">Toca para continuar</div>
        </div>
      </div>

      <!-- COUNTDOWN OVERLAY (shown at play start) -->
      <div id="countdown" class="hidden">
        <div id="countdown-number"></div>
      </div>

    </section>

    <!-- RESULTS -->
    <section id="results" class="screen">
      <div id="shatter-stage"></div>
      <div id="results-panel">
        <h1 class="results-title">¡GAME OVER!</h1>
        <div id="results-score">0 pts</div>
        <div id="results-record"></div>
        <div id="results-stats"></div>
        <button id="btn-replay" class="btn-primary">JUGAR OTRA VEZ</button>
      </div>
    </section>

  </div>

  <script src="game.js?v=19"></script>
</body>
</html>
