<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sonia y la Fabrica de Cajas Electricas</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="W">

<!-- ===== INTRO ===== -->
<div class="scr" id="intro">
  <img class="bg" id="intro-bg" alt="">
  <div class="dim"></div>
  <div class="intro-card">
    <h1 class="intro-title">Sonia y la Fabrica de Cajas Electricas</h1>
    <img class="intro-av" id="intro-av" alt="Sonia">
    <div class="intro-bub" id="intro-msg"></div>
    <button class="btn" id="intro-btn">Vamos!</button>
  </div>
</div>

<!-- ===== PLAY ===== -->
<div class="scr off" id="play">
  <img class="bg" id="play-bg" alt="">
  <div class="dim"></div>
  <div class="hud">
    <div class="hud-item" id="hud-score">0 pts</div>
    <div class="hud-item" id="hud-obj">Obj: 300</div>
  </div>

  <!-- Sonia avatar (floating, left side) -->
  <img class="avatar-img" id="avatar-img" alt="Sonia">

  <div class="play-body">
    <!-- Cable card -->
    <div class="piece-zone" id="piece-zone"></div>

    <!-- Multiplier info -->
    <div class="multiplier-info" id="multiplier-info"></div>

    <!-- Caja electrica -->
    <div class="caja-wrapper" id="caja-wrapper">
      <img class="caja-img" id="caja-img" alt="Caja electrica">
      <div class="caja-zones">
        <div class="caja-zone" id="zone-entrada" data-zone="entrada">
          <div class="zone-bar"><div class="zone-fill" id="fill-entrada"></div></div>
          <div class="zone-label">Entrada</div>
        </div>
        <div class="caja-zone" id="zone-derivacion" data-zone="derivacion">
          <div class="zone-bar"><div class="zone-fill" id="fill-derivacion"></div></div>
          <div class="zone-label">Derivacion</div>
        </div>
        <div class="caja-zone" id="zone-salida" data-zone="salida">
          <div class="zone-bar"><div class="zone-fill" id="fill-salida"></div></div>
          <div class="zone-label">Salida</div>
        </div>
      </div>
    </div>
  </div>
  <div class="char-msg" id="char-msg">
    <div class="char-msg-bubble">
      <div id="char-msg-text"></div>
      <button class="edu-btn" id="edu-btn" style="display:none">Entendido</button>
    </div>
  </div>
  <div class="edu-overlay" id="edu-overlay"></div>

  <!-- Blackjack decision overlay -->
  <div class="bj-overlay hidden" id="bj-overlay">
    <div class="bj-card">
      <div class="bj-msg" id="bj-msg"></div>
      <div class="bj-score" id="bj-score"></div>
      <div class="bj-incentive" id="bj-incentive"></div>
      <div class="bj-btns">
        <button class="btn bj-btn-close" id="bj-close">Cerrar caja</button>
        <button class="btn bj-btn-continue" id="bj-continue">Seguir</button>
      </div>
    </div>
  </div>

  <!-- Box closed / bust feedback overlay -->
  <div class="box-result-overlay hidden" id="box-result-overlay">
    <div class="box-result-card" id="box-result-card">
      <div class="box-result-icon" id="box-result-icon"></div>
      <div class="box-result-msg" id="box-result-msg"></div>
      <div class="box-result-pts" id="box-result-pts"></div>
      <button class="btn" id="box-result-btn">Siguiente caja</button>
    </div>
  </div>
</div>

<!-- ===== RESULTS ===== -->
<div class="scr off" id="results">
  <div class="res-inner">
    <div class="res-badge" id="res-badge"></div>
    <div class="res-scores">
      <div class="res-col"><div class="res-val" id="res-score">0</div><div class="res-label">Puntos</div></div>
      <div class="res-col"><div class="res-val" id="res-record" style="color:var(--lemon)">0</div><div class="res-label">Record</div></div>
    </div>
    <div class="res-new hidden" id="res-new">NUEVO RECORD!</div>
    <img class="res-av" id="res-av" alt="Sonia">
    <div class="res-info">
      <div class="res-msg" id="res-msg"></div>
      <div class="res-stats" id="res-stats"></div>
    </div>
    <div class="res-bot">
      <button class="btn" id="res-btn">Otra ronda!</button>
    </div>
  </div>
</div>

<!-- Drag ghost -->
<div class="drag-ghost hidden" id="drag-ghost"></div>

</div>
<script src="game.js"></script>
</body>
</html>
