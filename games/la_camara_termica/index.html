<!DOCTYPE html>
<html lang="es" class="gameplay">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>La Cámara Térmica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">

    <!-- INTRO -->
    <div id="intro" class="screen active">
      <div class="intro-content">
        <img id="intro-avatar" src="https://res.cloudinary.com/kampe/image/upload/v1774024685/arnaldo_happy_juodoe.png" alt="Arnaldo" class="avatar-intro">
        <h1 class="game-title">La Cámara Térmica</h1>
        <div class="speech-bubble">
          <p>Mira lo que acabo de comprar — una cámara termográfica profesional. Esto es la cámara del Predator, chaval. Vamos a aislar estas tuberías y escanearlas. Si sale azul, perfecto. Si sale rojo… rehaces.</p>
        </div>
        <button id="btn-start" class="cta">Vamos a ello</button>
      </div>
    </div>

    <!-- PLAY -->
    <div id="play" class="screen">
      <div id="hud">
        <div id="hud-dots"></div>
        <span id="hud-section">Sección 1/6</span>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="continuity-display" class="hidden"></div>
      <img id="play-avatar" src="https://res.cloudinary.com/kampe/image/upload/v1774024685/arnaldo_happy_juodoe.png" alt="Arnaldo" class="avatar-gameplay">
      <div id="speech" class="speech-bubble hidden">
        <p id="speech-text"></p>
      </div>
    </div>

    <!-- TUTORIAL OVERLAY -->
    <div id="tutorial" class="overlay hidden">
      <div class="overlay-content">
        <p id="tutorial-text"></p>
        <button id="btn-tutorial" class="cta cta-small">Siguiente</button>
      </div>
    </div>

    <!-- SUCCESS PANEL -->
    <div id="success-panel" class="overlay hidden">
      <div class="success-card">
        <div id="success-score" class="success-score"></div>
        <h2 class="success-title">Continuidad correcta</h2>
        <p id="success-detail" class="success-detail"></p>
        <p id="success-arnaldo" class="success-arnaldo"></p>
        <button id="btn-next" class="cta">Siguiente sección</button>
      </div>
    </div>

    <!-- DEFECT PANEL -->
    <div id="defect-panel" class="overlay hidden">
      <div class="defect-card">
        <h2 class="defect-title">Hay fugas térmicas</h2>
        <div id="defect-list"></div>
        <hr>
        <p id="defect-arnaldo" class="defect-arnaldo"></p>
        <button id="btn-redo" class="cta">Rehaz esta sección</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="screen">
      <div class="results-content">
        <img id="results-avatar" src="https://res.cloudinary.com/kampe/image/upload/v1774024685/arnaldo_happy_juodoe.png" alt="Arnaldo" class="avatar-results">
        <p id="results-message" class="results-message"></p>
        <div id="results-cards"></div>
        <div class="results-total">
          <span>Total:</span>
          <span id="results-total-value">0</span>
          <span>/ 1000</span>
        </div>
        <div id="results-record" class="results-record"></div>
        <button id="btn-retry" class="cta">Volver a jugar</button>
      </div>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
