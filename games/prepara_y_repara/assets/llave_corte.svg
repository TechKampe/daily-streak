<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Left pipe -->
  <rect x="10" y="62" width="30" height="16" fill="#888888"/>
  <!-- Right pipe -->
  <rect x="80" y="62" width="30" height="16" fill="#888888"/>
  <!-- Valve body -->
  <rect x="38" y="55" width="44" height="30" rx="4" fill="#AAAAAA"/>
  <!-- Stem -->
  <rect x="56" y="30" width="8" height="28" fill="#999999"/>
  <!-- Handle (round wheel) -->
  <circle cx="60" cy="26" r="16" fill="none" stroke="#E74C3C" stroke-width="7"/>
  <!-- Handle center -->
  <circle cx="60" cy="26" r="4" fill="#C0392B"/>
  <!-- Valve body detail -->
  <line x1="44" y1="70" x2="76" y2="70" stroke="#999999" stroke-width="2"/>
</svg>