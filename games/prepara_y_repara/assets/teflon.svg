<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Tape roll core -->
  <circle cx="55" cy="60" r="28" fill="#3498DB"/>
  <!-- Inner hole -->
  <circle cx="55" cy="60" r="12" fill="white"/>
  <!-- Tape band on roll -->
  <circle cx="55" cy="60" r="28" fill="none" stroke="white" stroke-width="8" stroke-dasharray="60 120" stroke-dashoffset="0"/>
  <!-- Tape strip trailing off -->
  <path d="M83,58 Q92,55 98,48 Q102,42 95,38" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M83,58 Q92,55 98,48 Q102,42 95,38" fill="none" stroke="#ECF0F1" stroke-width="5" stroke-linecap="round"/>
  <!-- Roll outline -->
  <circle cx="55" cy="60" r="28" fill="none" stroke="#2980B9" stroke-width="2"/>
  <circle cx="55" cy="60" r="12" fill="none" stroke="#2980B9" stroke-width="1.5"/>
</svg>