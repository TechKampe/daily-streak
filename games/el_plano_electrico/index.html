<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Plano Electrico</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="W">

<!-- ===== INTRO ===== -->
<div class="scr" id="intro">
  <div class="intro-card">
    <div class="intro-badge">⚡</div>
    <h1 class="intro-title">El Plano Electrico</h1>
    <img class="intro-av" id="intro-av-alex" alt="Alex">
    <div class="intro-bub" id="intro-msg">Antes de tocar un cable, tengo que demostrar que se leer un plano. ¡Vamos alla!</div>
    <div class="intro-from">— Alex, alumno de practicas</div>
    <button class="btn" id="intro-btn">¡Vamos!</button>
  </div>
</div>

<!-- ===== PLAY ===== -->
<div class="scr off" id="play">
  <div class="hud">
    <div class="hud-left">
      <div class="hud-phase" id="hud-level">Nivel 1</div>
      <div class="hud-lives" id="hud-lives"></div>
    </div>
    <div class="hud-score" id="hud-score">0 pts</div>
  </div>

  <div class="play-body">
    <!-- Mission bar -->
    <div class="mission-bar" id="mission-bar">
      <div class="mission-text" id="mission-text"></div>
    </div>

    <!-- Character row (N3/N4): Alex habla -->
    <div class="char-row hidden" id="char-row">
      <img class="char-av" id="alex-av" alt="Alex">
      <div class="char-bubble" id="char-bubble"></div>
    </div>

    <!-- Main game area -->
    <div class="game-area" id="game-area"></div>

    <!-- Fixed bottom avatar (N1: Alex, N2: Alex small) -->
    <div class="bottom-av hidden" id="bottom-av">
      <img id="bottom-av-img" alt="">
    </div>

    <!-- Timer bar (N4) -->
    <div class="timer-wrap hidden" id="timer-wrap">
      <div class="timer-bar" id="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
  </div>
</div>

<!-- ===== FEEDBACK OVERLAY ===== -->
<div class="fb-overlay off" id="fb-overlay">
  <div class="fb-card" id="fb-card">
    <div class="fb-icon" id="fb-icon"></div>
    <div class="fb-text" id="fb-text"></div>
    <button class="btn btn-sm" id="fb-btn">Seguir</button>
  </div>
</div>

<!-- ===== RESULTS ===== -->
<div class="scr off" id="results">
  <div class="res-card">
    <div class="res-badge">⚡</div>
    <h2 class="res-title" id="res-title">¡Resultado!</h2>
    <img class="res-av" id="res-av" alt="Alex">
    <div class="res-bub" id="res-msg"></div>
    <div class="res-score-row">
      <div class="res-score-box">
        <div class="res-score-label">Puntuacion</div>
        <div class="res-score-val" id="res-score">0</div>
      </div>
      <div class="res-score-box">
        <div class="res-score-label">Record</div>
        <div class="res-score-val" id="res-record">0</div>
      </div>
    </div>
    <button class="btn" id="res-btn">Repetir</button>
  </div>
</div>

</div>
<script src="game.js"></script>
</body>
</html>
