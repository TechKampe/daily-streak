<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cables a Su Sitio</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="wrapper intro-content" id="intro-inner"></div>
  </div>

  <!-- PLAY -->
  <div id="play" class="screen">
    <div class="wrapper play-wrap">
      <!-- HUD -->
      <div class="hud">
        <div class="hud-left">
          <span id="hud-round">Ronda 1/4</span>
          <span id="hud-score">0 pts</span>
        </div>
        <button id="help-btn" class="help-btn" aria-label="Ayuda">?</button>
        <div id="hud-lives" class="hud-right"></div>
      </div>

      <!-- CUADRO (panel eléctrico) -->
      <div id="cuadro">
        <div id="barras-row"></div>
<div id="comps-row"></div>
      </div>

      <!-- MIDDLE: Rehacer + Fer -->
      <div id="middle-row">
        <div id="rehacer-zone" class="rehacer-zone">
          <span class="rehacer-label">Rehacer</span>
          <span id="rehacer-count" class="rehacer-count hidden">0</span>
        </div>
        <div id="fer-row">
          <img id="fer-img" src="" alt="Fer" class="fer-sm">
          <div id="fer-bubble" class="fer-bub hidden"><p id="fer-msg"></p></div>
        </div>
      </div>

      <!-- CONVEYOR BELT -->
      <div id="conveyor">
        <div id="belt-track">
          <div id="belt-cables"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div id="edu-overlay" class="overlay hidden">
    <div class="ov-card">
      <img id="edu-av" class="ov-av" src="" alt="Fer">
      <div id="edu-content"></div>
      <button class="cta cta-sm" id="edu-btn">Entendido</button>
    </div>
  </div>

  <div id="help-overlay" class="overlay hidden">
    <div class="ov-card">
      <p id="help-txt"></p>
      <button class="cta cta-sm" id="help-close-btn">Entendido</button>
    </div>
  </div>

  <div id="wa-overlay" class="overlay hidden">
    <div class="wa-box">
      <div class="wa-bub">
        <img id="wa-av" class="wa-av" src="" alt="Fer">
        <div class="wa-body">
          <p id="wa-txt"></p>
          <span class="bub-time"><span id="wa-time"></span> <span class="bub-check">✓✓</span></span>
        </div>
      </div>
      <button class="cta" id="wa-btn">Siguiente ronda</button>
    </div>
  </div>

  <div id="gameover-overlay" class="overlay hidden">
    <div class="ov-card">
      <img id="go-av" class="ov-av" src="" alt="Fer">
      <p id="go-txt"></p>
      <button class="cta cta-sm" id="go-btn">Reintentar</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="wrapper res-content" id="res-inner"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
