<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Carga la Furgo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── INTRO ─────────────────────────────── -->
  <div id="screen-intro" class="screen active">
    <div class="wrapper">
      <div class="intro-inner">
        <img src="assets/juancarlos_happy.jpg" class="intro-avatar" alt="Juan Carlos" />
        <h1 class="game-title">Carga la Furgo</h1>
        <p class="game-subtitle">Juan Carlos necesita tus piezas. Ya.</p>
        <div class="bubble intro-bubble">
          <p>"Oye, que estoy en doble fila y tengo una avería que atender. Necesito que me cargues la furgoneta. Yo te digo lo que necesito y tú me lo buscas. ¿Listo?"</p>
        </div>
        <button class="btn" id="btn-start">Vamos allá</button>
      </div>
    </div>
  </div>

  <!-- ── PLAY ──────────────────────────────── -->
  <div id="screen-play" class="screen">
    <div class="wrapper play-wrapper">

      <!-- HERO: imagen JC + overlays encima -->
      <div class="videocall" id="videocall">
        <img src="assets/juancarlos_happy.jpg" class="jc-img" id="jc-img" alt="Juan Carlos" />

        <!-- Dial de aparcamiento — esquina superior izquierda -->
        <svg id="parking-dial" width="90" height="90" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
          <circle cx="55" cy="55" r="52" fill="#0B214A" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
          <g id="dial-ticks"></g>
          <g id="dial-labels"></g>
          <circle id="dial-full" cx="55" cy="55" r="44" fill="#00E6BC" opacity="1"/>
          <path id="dial-slice" fill="#00E6BC" d="M 55 55"/>
          <circle cx="55" cy="55" r="30" fill="#0B214A"/>
          <polygon points="55,5 51,20 59,20" fill="white" opacity="0.9"/>
          <text id="dial-text-val" x="55" y="56" text-anchor="middle"
                font-family="'Baloo 2',cursive" font-size="26" font-weight="800" fill="#FFFFAB">30</text>
          <text x="55" y="70" text-anchor="middle"
                font-family="'Baloo 2',cursive" font-size="11" font-weight="600"
                fill="rgba(255,255,255,0.55)">min</text>
        </svg>

        <!-- Progreso — esquina superior derecha -->
        <div class="hud-progress-overlay" id="hud-progress">0/8</div>

        <!-- Overlay lluvia -->
        <canvas id="rain-canvas"></canvas>

        <!-- Notificación llamada entrante -->
        <div class="notif-call" id="notif-call">
          <span class="notif-dot"></span>
          <span>📞 Cliente</span>
        </div>
      </div>

      <!-- BOCADILLO — debajo de la imagen -->
      <div class="call-bubble" id="call-bubble">
        <p id="call-text"></p>
      </div>

      <!-- BANDEJA -->
      <div class="bandeja" id="bandeja">
        <div class="piezas-grid" id="piezas-grid"></div>
      </div>

      <!-- OVERLAY RECOMPENSA (acierto) -->
      <div class="overlay-reward" id="overlay-reward">
        <img class="reward-img" id="reward-img" src="" alt="" />
        <p class="reward-msg" id="reward-msg"></p>
      </div>

      <!-- OVERLAY EDUCATIVO -->
      <div class="overlay-edu" id="overlay-edu">
        <div class="overlay-card">
          <img src="assets/juancarlos_worried.jpg" class="overlay-jc" alt="Juan Carlos" />
          <div class="overlay-body">
            <p class="overlay-mandaste" id="overlay-mandaste"></p>
            <p class="overlay-pista" id="overlay-pista"></p>
          </div>
          <button class="btn" id="btn-entendido">Entendido</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── RESULTS ───────────────────────────── -->
  <div id="screen-results" class="screen">
    <div class="wrapper">
      <div class="results-inner">
        <img src="assets/juancarlos_happy.jpg" class="results-avatar" id="results-avatar" alt="Juan Carlos" />
        <h2 class="results-estado" id="results-estado"></h2>
        <div class="results-stats">
          <p class="results-fallos" id="results-fallos"></p>
          <p class="results-extra"  id="results-extra"></p>
          <p class="results-record" id="results-record"></p>
        </div>
        <div class="bubble results-bubble">
          <p id="results-msg"></p>
        </div>
        <div class="results-grid" id="results-grid"></div>
        <button class="btn" id="btn-retry">Volver a intentar</button>
      </div>
    </div>
  </div>

  <canvas id="asmr-canvas"></canvas>
  <script src="game.js"></script>
</body>
</html>
