<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Planta tu Futuro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== INTRO ===== -->
    <div id="intro" class="screen active">
      <div class="intro-bg"></div>
      <div class="intro-content">
        <h1 class="intro-title">Planta<br>tu Futuro</h1>
        <img id="intro-avatar" class="avatar avatar-intro" src="assets/jesus_happy.png" alt="Jesús">
        <div class="speech-bubble">
          <p>Esta semana has plantado muchas semillas — cada entrevista, cada candidatura, cada contacto. Hoy te voy a enseñar a cuidarlas. Después, el jardín es tuyo.</p>
        </div>
        <button id="btn-start" class="btn-primary">Vamos</button>
      </div>
    </div>

    <!-- ===== ONBOARDING ===== -->
    <div id="onboarding" class="screen">
      <div class="onboarding-bg"></div>
      <div class="onboarding-content">
        <img id="onboarding-avatar" class="avatar-onboarding" src="assets/jesus_happy.png" alt="Jesús">
        <div class="ob-card">
          <div id="onboarding-plant" class="onboarding-plant-container">
            <!-- SVG planta de ejemplo se inyecta desde JS -->
          </div>
          <p id="onboarding-text" class="ob-text"></p>
        </div>
        <div class="onboarding-bottom">
          <div class="onboarding-dots">
            <span class="ob-dot active"></span>
            <span class="ob-dot"></span>
            <span class="ob-dot"></span>
            <span class="ob-dot"></span>
          </div>
          <button id="btn-onboarding-next" class="btn-primary">Siguiente</button>
        </div>
      </div>
    </div>

    <!-- ===== GAMEPLAY ===== -->
    <div id="play" class="screen">
      <!-- Fondo balcón -->
      <div class="play-bg"></div>

      <!-- Sol / Luna / Estrellas / Overlay noche -->
      <svg class="sol" viewBox="0 0 60 60" width="40" height="40">
        <circle cx="30" cy="30" r="14" fill="#FFFFAB"/>
        <g class="rayos">
          <line x1="30" y1="4" x2="30" y2="12" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="48.4" y1="11.6" x2="42.7" y2="17.3" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="56" y1="30" x2="48" y2="30" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="48.4" y1="48.4" x2="42.7" y2="42.7" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="30" y1="56" x2="30" y2="48" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="11.6" y1="48.4" x2="17.3" y2="42.7" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="4" y1="30" x2="12" y2="30" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
          <line x1="11.6" y1="11.6" x2="17.3" y2="17.3" stroke="#FFFFAB" stroke-width="3" stroke-linecap="round"/>
        </g>
      </svg>
      <svg class="luna" viewBox="0 0 60 60" width="40" height="40">
        <circle cx="30" cy="30" r="14" fill="#FFFFFF"/>
        <circle cx="25" cy="25" r="3" fill="rgba(200,200,200,0.4)"/>
        <circle cx="34" cy="32" r="2" fill="rgba(200,200,200,0.3)"/>
        <circle cx="28" cy="36" r="1.5" fill="rgba(200,200,200,0.25)"/>
      </svg>
      <div class="estrellas"></div>
      <div class="overlay-noche"></div>

      <!-- HUD -->
      <div class="hud">
        <span id="hud-dia">DÍA 1 de 21</span>
        <div id="hud-vidas" class="vidas">
          <span class="vida">&#10084;</span>
          <span class="vida">&#10084;</span>
          <span class="vida">&#10084;</span>
        </div>
      </div>

      <!-- Dots carrusel -->
      <div id="carousel-dots" class="carousel-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <!-- Pista contextual -->
      <div id="pista" class="pista-card">
        <p id="pista-text"></p>
      </div>

      <!-- Carrusel de macetas -->
      <div id="carousel" class="carousel">
        <div class="carousel-wrapper">
          <div id="carousel-track" class="carousel-track">
            <!-- 4 slides con SVG planta+maceta se inyectan desde JS -->
          </div>
        </div>
      </div>

      <!-- Macetas laterales ahora visibles via carrusel peek -->

      <!-- Jesús toast -->
      <div id="jesus-toast" class="jesus-toast" style="display:none;">
        <img id="jesus-toast-img" class="jesus-toast-img" src="assets/jesus_happy.png" alt="Jesús">
        <p id="jesus-toast-text" class="jesus-toast-text"></p>
      </div>

      <!-- Swipe hint -->
      <div id="swipe-hint" class="swipe-hint">
        <span class="swipe-hand">👆</span>
        <span class="swipe-text">Desliza</span>
      </div>

      <!-- Pregunta -->
      <p id="question-label" class="question-label">¿Qué hacer?</p>

      <!-- Botones de acción -->
      <div id="actions" class="actions">
        <!-- Botones contextuales se inyectan desde JS -->
      </div>

      <!-- Botón siguiente día -->
      <button id="btn-next-day" class="btn-next-day">Siguiente día →</button>
    </div>

    <!-- ===== MODAL EVENTO ===== -->
    <div id="modal-evento" class="modal-overlay" style="display:none;">
      <div class="modal-card">
        <p id="modal-evento-text" class="modal-text"></p>
        <div id="modal-evento-options" class="modal-options">
          <!-- Botones de opción se inyectan desde JS -->
        </div>
      </div>
    </div>

    <!-- ===== OVERLAY EDUCATIVO ===== -->
    <div id="overlay-edu" class="overlay-edu" style="display:none;">
      <div class="overlay-edu-card">
        <p id="edu-titulo" class="edu-titulo"></p>
        <p class="edu-label">Qué hiciste:</p>
        <p id="edu-que" class="edu-text"></p>
        <p class="edu-label">Por qué está mal:</p>
        <p id="edu-porque" class="edu-text"></p>
        <p class="edu-label">La regla:</p>
        <p id="edu-regla" class="edu-text"></p>
        <button id="btn-entendido" class="btn-primary">Entendido</button>
      </div>
    </div>

    <!-- ===== RESULTADOS ===== -->
    <div id="results" class="screen">
      <div class="results-bg"></div>
      <div class="results-content">
        <h2 id="results-titulo" class="results-titulo">Tu jardín</h2>
        <div id="results-plants" class="results-plants">
          <!-- 4 macetas en fila se inyectan desde JS -->
        </div>
        <div class="results-score">
          <span id="results-pts" class="results-pts">0</span>
          <span class="results-pts-label">pts</span>
        </div>
        <div id="results-record" class="results-record"></div>
        <img id="results-avatar" class="avatar" src="assets/jesus_happy.png" alt="Jesús">
        <div class="speech-bubble">
          <p id="results-message"></p>
        </div>
        <button id="btn-retry" class="btn-primary">Volver a intentar</button>
      </div>
    </div>

  </div>

  <canvas id="asmr-canvas"></canvas>
  <script src="game.js"></script>
</body>
</html>
