<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>El Encargado Elige</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">

    <!-- INTRO -->
    <div id="intro" class="screen active">
      <div class="intro-content">
        <h1 class="game-title">El Encargado Elige</h1>
        <img id="intro-avatar" class="avatar" src="" alt="Paco">
        <div class="bubble">
          <p>Necesito a alguien para una obra el lunes. Me han llegado candidatos pero no tengo tiempo de revisarlo todo. Échame un cable: mira sus respuestas y dime si los llamo o paso.</p>
        </div>
        <button id="btn-start" class="cta">Vamos!</button>
      </div>
    </div>

    <!-- GAMEPLAY -->
    <div id="play" class="screen">
      <div id="hud">
        <span id="hud-counter">1/12</span>
        <span id="hud-lives">❤️❤️❤️</span>
      </div>

      <div id="question-bar">
        <p id="fixed-question"></p>
      </div>

      <div id="card-zone">
        <div id="card" class="card">
          <div id="hint-left" class="hint hint-left">PASO</div>
          <div id="hint-right" class="hint hint-right">LO LLAMO</div>
          <p class="card-answer"></p>
        </div>

        <div id="feedback" class="card feedback hidden">
          <img id="fb-avatar" class="fb-avatar" src="" alt="Paco">
          <p class="fb-title"></p>
          <p class="fb-text"></p>
        </div>

        <p id="swipe-hint" class="swipe-hint">← Desliza o pulsa →</p>
      </div>

      <div id="buttons">
        <button id="btn-pass" class="btn-action btn-no">✕ PASO</button>
        <button id="btn-call" class="btn-action btn-yes">✓ LO LLAMO</button>
        <button id="btn-next" class="btn-action btn-next hidden">Siguiente →</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="screen">
      <div class="results-content">
        <div class="results-score">
          <span id="res-score">0 de 12</span>
        </div>
        <span id="res-record" class="res-record">Record: 0 de 12</span>
        <img id="res-avatar" class="avatar" src="" alt="Paco">
        <p id="res-message" class="res-message"></p>
        <button id="btn-errors" class="btn-errors hidden">Ver errores críticos</button>
        <button id="btn-retry" class="cta">¡Otra ronda!</button>
      </div>
    </div>

    <!-- MODAL: errores criticos -->
    <div id="modal-errors" class="modal hidden">
      <div class="modal-card">
        <h3>Errores críticos</h3>
        <div id="modal-errors-list"></div>
        <button id="btn-close-modal" class="cta cta-sm">Cerrar</button>
      </div>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
