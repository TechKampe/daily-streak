<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>La Obra de Mis Sueños</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="rotate-overlay">↩ Gira el móvil</div>
<div id="W">

  <!-- TV static canvas (intro only) -->
  <canvas id="tv-static" class="hidden"></canvas>

  <!-- ===== INTRO ===== -->
  <div class="scr" id="intro">
    <div id="intro-logo-wrap">
      <div id="intro-logo">LA OBRA DE MIS SUEÑOS</div>
      <div id="intro-episode">Episodio: Ruta Perfecta</div>
    </div>

    <div id="intro-twins">
      <img class="intro-twin" id="intro-andres" src="assets/andres_happy.png" alt="Andrés">
      <img class="intro-twin" id="intro-johnny" src="assets/johnny_happy.png" alt="Johnny">
    </div>

    <div class="lower-third hidden" id="lt-intro">
      <span class="lt-name" id="lt-intro-name"></span>
      <span class="lt-role" id="lt-intro-role"></span>
    </div>

    <div class="speech-bubble" id="intro-bubble"></div>
    <button class="btn" id="intro-btn">¡Vamos!</button>
  </div>

  <!-- ===== PLAY ===== -->
  <div class="scr off" id="play">

    <!-- Level background -->
    <img class="level-bg" id="level-bg" alt="">

    <!-- HUD -->
    <div class="hud">
      <div class="hud-level" id="hud-level">Nivel 1/6</div>
    </div>

    <!-- Ghost route + snapped segments SVG -->
    <div id="route-area">
      <svg id="route-svg" width="100%" height="100%"></svg>
    </div>

    <!-- Floating piece (accelerometer-controlled) -->
    <div id="piece-wrap">
      <svg id="piece-ring" viewBox="0 0 80 80" width="80" height="80">
        <circle class="ring-bg" cx="40" cy="40" r="34"/>
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"/>
      </svg>
      <div id="piece-body"></div>
    </div>

    <!-- Johnny avatar (bottom-right) -->
    <div class="char-wrap" id="johnny-wrap">
      <div class="speech-bubble small hidden" id="johnny-bubble"></div>
      <img id="johnny-img" src="assets/johnny_happy.png" alt="Johnny">
    </div>

    <!-- Lower third (gameplay) -->
    <div class="lower-third hidden" id="lt-play">
      <span class="lt-name" id="lt-play-name"></span>
      <span class="lt-role" id="lt-play-role"></span>
    </div>

    <!-- ¡¡OOOOOOH!! overlay -->
    <div class="ooooh hidden" id="ooooh">¡¡OOOOOOH!!</div>

    <!-- Breaking news banner -->
    <div class="news-banner hidden" id="news-banner">
      <span class="news-label">🔴 ÚLTIMA HORA</span>
      <div class="news-ticker-wrap">
        <div class="news-ticker" id="news-ticker"></div>
      </div>
    </div>

    <!-- Curtains -->
    <div class="curtain" id="curtain-left"></div>
    <div class="curtain" id="curtain-right"></div>

    <!-- Reveal overlay (over closed curtains) -->
    <div class="reveal-overlay hidden" id="reveal-overlay">
      <div class="reveal-label">✨ MOMENTO DEL REVEAL ✨</div>
      <img class="reveal-andres" id="reveal-andres" src="assets/andres_celebrating.png" alt="Andrés">
      <div class="speech-bubble reveal-bubble" id="reveal-bubble"></div>
      <button class="btn btn-next hidden" id="reveal-next-btn">Siguiente habitación →</button>
    </div>

  </div>

  <!-- ===== CREDITS / RESULTS ===== -->
  <div class="scr off" id="credits">
    <div id="credits-twins">
      <img class="credits-twin" src="assets/andres_celebrating.png" alt="Andrés">
      <img class="credits-twin" src="assets/johnny_celebrating.png" alt="Johnny">
    </div>
    <div id="credits-scroll-wrap">
      <div id="credits-text"><!-- filled by JS --></div>
    </div>
    <button class="btn btn-rewind hidden" id="rewind-btn">⏮ REBOBINAR</button>
  </div>

</div><!-- #W -->
<script src="game.js"></script>
</body>
</html>
