<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60">
  <!-- Main conduit body — metallic grey, fills entire viewBox -->
  <rect x="4" y="2" width="312" height="56" rx="6" ry="6" fill="#B0B8C4" stroke="#6B7280" stroke-width="3"/>
  <!-- Top highlight — light reflection -->
  <rect x="10" y="6" width="300" height="8" rx="4" fill="#D4DAE2" opacity=".7"/>
  <!-- Bottom shadow -->
  <rect x="10" y="46" width="300" height="6" rx="3" fill="#7A8290" opacity=".5"/>
  <!-- Center channel groove -->
  <line x1="16" y1="30" x2="304" y2="30" stroke="#8B929E" stroke-width="2" opacity=".4"/>
  <!-- Left end cap -->
  <rect x="0" y="0" width="10" height="60" rx="3" fill="#8B929E"/>
  <!-- Right end cap -->
  <rect x="310" y="0" width="10" height="60" rx="3" fill="#8B929E"/>
</svg>
