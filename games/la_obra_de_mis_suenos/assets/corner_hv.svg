<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Mitered L-corner: horizontal (left) to vertical (down), rounded outer edge -->
  <!-- Conduit thickness = 50% of viewBox -->

  <!-- Main conduit body -->
  <path d="M 0 0 L 50 0 Q 100 0 100 50 L 100 100 L 50 100 L 50 50 L 0 50 Z"
        fill="#B0B8C4" stroke="#6B7280" stroke-width="3" stroke-linejoin="round"/>

  <!-- Top highlight — horizontal arm -->
  <rect x="4" y="4" width="42" height="7" rx="3" fill="#D4DAE2" opacity=".6"/>

  <!-- Right highlight — vertical arm -->
  <rect x="89" y="54" width="7" height="42" rx="3" fill="#D4DAE2" opacity=".6"/>

  <!-- Curved highlight -->
  <path d="M 52 4 Q 94 4 94 48" fill="none" stroke="#D4DAE2" stroke-width="5" opacity=".45" stroke-linecap="round"/>

  <!-- Bottom shadow — horizontal arm -->
  <rect x="4" y="42" width="42" height="5" rx="2" fill="#7A8290" opacity=".45"/>

  <!-- Left shadow — vertical arm -->
  <rect x="53" y="54" width="5" height="42" rx="2" fill="#7A8290" opacity=".45"/>

  <!-- Center groove — horizontal -->
  <line x1="4" y1="25" x2="46" y2="25" stroke="#8B929E" stroke-width="1.5" opacity=".3"/>

  <!-- Center groove — vertical -->
  <line x1="75" y1="54" x2="75" y2="96" stroke="#8B929E" stroke-width="1.5" opacity=".3"/>

  <!-- Center groove — curved -->
  <path d="M 50 25 Q 75 25 75 50" fill="none" stroke="#8B929E" stroke-width="1.5" opacity=".3"/>

  <!-- End cap — left -->
  <rect x="0" y="0" width="5" height="50" rx="2" fill="#8B929E"/>

  <!-- End cap — bottom -->
  <rect x="50" y="95" width="50" height="5" rx="2" fill="#8B929E"/>
</svg>
