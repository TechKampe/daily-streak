<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>El SAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">

    <!-- INTRO SCREEN -->
    <div id="intro" class="screen active">
      <div class="intro-content">
        <h1 class="game-title">EL SAT</h1>
        <p class="game-subtitle">Servicio de Asistencia Técnica</p>
        <p class="game-description">Hoy acompañas al equipo del SAT en una mañana de visitas. Cinco clientes, cinco averías. Escucha, investiga y diagnostica qué componente del split ha fallado.</p>
        <button class="btn-primary" id="btn-start">Empezar turno</button>
      </div>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="play" class="screen">
      <!-- HUD -->
      <div id="hud">
        <span id="hud-case">Caso 1/5</span>
        <span id="hud-action" class="hud-action hidden"></span>
      </div>

      <!-- Visual Novel Zone -->
      <div id="vn-zone">
        <div id="client-area">
          <img id="client-portrait" src="" alt="" class="client-portrait">
          <div id="dialogue-area">
            <div id="speech-bubble" class="speech-bubble"></div>
          </div>
        </div>
      </div>

      <!-- Separator -->
      <div class="separator"></div>

      <!-- Split Schematic Zone -->
      <div id="schema-zone">
        <div id="schema-frame">
          <img src="https://res.cloudinary.com/kampe/image/upload/v1773838689/esquema_frame_j9vxv1.png" alt="Esquema split" class="schema-frame-img">
          <span class="unit-label unit-label-int">Interior</span>
          <span class="unit-label unit-label-ext">Exterior</span>
          <!-- Interior unit components -->
          <div class="comp-slot" data-comp="evaporador" data-label="Evaporador" id="slot-evaporador">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838685/comp_evaporador_qz92cj.png" alt="Evaporador">
          </div>
          <div class="comp-slot" data-comp="vent_int" data-label="Vent. Interior" id="slot-vent-int">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838687/comp_vent_int_opu1ij.png" alt="Vent. Interior">
          </div>
          <div class="comp-slot" data-comp="sensor" data-label="Sensor" id="slot-sensor">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838685/comp_sensor_mfwcsr.png" alt="Sensor">
          </div>
          <!-- Exterior unit components -->
          <div class="comp-slot" data-comp="compresor" data-label="Compresor" id="slot-compresor">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838686/comp_compresor_k8n4jt.png" alt="Compresor">
          </div>
          <div class="comp-slot" data-comp="condensador" data-label="Condensador" id="slot-condensador">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838684/comp_condensador_d0onf0.png" alt="Condensador">
          </div>
          <div class="comp-slot" data-comp="vent_ext" data-label="Vent. Exterior" id="slot-vent-ext">
            <img src="https://res.cloudinary.com/kampe/image/upload/v1773838686/comp_vent_ext_murotl.png" alt="Vent. Exterior">
          </div>
        </div>
      </div>

    </div>

    <!-- Overlays + modals (outside #play to avoid stacking context) -->

    <!-- Senior hint bubble -->
    <div id="senior-hint" class="senior-hint hidden">
      <div class="senior-hint-inner">
        <span class="senior-icon">🪖</span>
        <p id="senior-text"></p>
      </div>
    </div>

    <!-- Overlay: consequence -->
    <div id="overlay-result" class="overlay hidden">
      <div class="result-card">
        <p id="result-narrative" class="result-narrative"></p>
        <div id="result-client-bubble" class="result-client-bubble hidden">
          <img id="result-client-img" src="" alt="" class="result-client-img">
          <p id="result-client-text"></p>
        </div>
        <div id="result-edu-card" class="edu-card"></div>
        <button class="btn-primary" id="btn-continue">Entendido</button>
      </div>
    </div>

    <!-- Overlay: van transition -->
    <div id="overlay-transition" class="overlay hidden">
      <img id="van-img" src="https://res.cloudinary.com/kampe/image/upload/v1773838688/furgoneta_ai3svz.png" alt="Furgoneta SAT" class="van-transition">
      <p class="transition-text">Siguiente visita...</p>
    </div>

    <!-- Options/diagnosis modal -->
    <div id="options-modal" class="options-modal hidden">
      <div class="options-modal-card">
        <p id="options-modal-title" class="options-modal-title"></p>
        <p id="options-modal-subtitle" class="options-modal-subtitle hidden"></p>
        <div id="options-area"></div>
      </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results" class="screen">
      <h2 class="results-title">Fin del turno</h2>
      <div id="results-summary"></div>
      <p id="results-total" class="results-total"></p>
      <p id="results-record" class="results-record"></p>
      <p id="results-message" class="results-message"></p>
      <button class="btn-primary" id="btn-retry">Repetir turno</button>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
