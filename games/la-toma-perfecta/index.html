<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>La Toma Perfecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="intro-content">
      <div class="notification-card">
        <span class="notification-icon">K</span>
        <p class="notification-text">Hay una empresa que nos solicita candidatos. ¿Tienes tu vídeo currículum listo?</p>
      </div>
      <div class="intro-character">
        <img id="intro-avatar" src="https://res.cloudinary.com/kampe/image/upload/game_assets/s6d1/luca_worried_oyx2eg.png" alt="Luca">
      </div>
      <div class="speech-bubble intro-bubble">
        <p>Uy. No estoy preparado para esto...</p>
      </div>
      <button id="btn-start" class="btn-primary">Ayúdale a prepararse →</button>
    </div>
  </div>

  <!-- GAMEPLAY — FASE 1 -->
  <div id="play" class="screen" hidden>
    <div id="hud">
      <div id="hud-checks">
        <span class="check-dot" data-index="0">○</span>
        <span class="check-dot" data-index="1">○</span>
        <span class="check-dot" data-index="2">○</span>
        <span class="check-dot" data-index="3">○</span>
        <span class="check-dot" data-index="4">○</span>
        <span class="check-dot" data-index="5">○</span>
        <span class="check-dot" data-index="6">○</span>
        <span class="check-dot" data-index="7">○</span>
        <span class="check-dot" data-index="8">○</span>
      </div>
      <div id="hud-score">0 pts</div>
    </div>

    <div id="panorama-container">
      <div id="panorama"></div>
    </div>

    <div id="speech-bubble" hidden>
      <p id="speech-text"></p>
    </div>
  </div>

  <!-- OUTFIT MODAL -->
  <div id="outfit-modal" class="screen" hidden>
    <div class="modal-content">
      <h2>¿Qué me pongo?</h2>
      <div class="outfit-options">
        <div class="outfit-card" data-outfit="a">
          <img src="assets/outfit_a.png" alt="Camiseta y vaqueros">
          <p>Limpio y apropiado</p>
        </div>
        <div class="outfit-card" data-outfit="b">
          <img src="assets/outfit_b.png" alt="Pijama">
          <p>Lo que llevo puesto</p>
        </div>
        <div class="outfit-card" data-outfit="c">
          <img src="assets/outfit_c.png" alt="Traje">
          <p>Muy formal</p>
        </div>
      </div>
      <div id="outfit-feedback" hidden>
        <p id="outfit-feedback-text"></p>
        <button id="btn-outfit-understood" class="btn-secondary">Entendido</button>
      </div>
    </div>
  </div>

  <!-- GAMEPLAY — FASE 2 (GRABACIÓN) -->
  <div id="recording" class="screen" hidden>
    <div id="rec-hud">
      <span id="rec-indicator">● REC</span>
      <span id="rec-timer">00:30</span>
    </div>
    <div id="camera-frame">
      <div id="rec-luca">
        <img id="rec-luca-img" src="https://res.cloudinary.com/kampe/image/upload/game_assets/s6d1/luca_celebrating_s4ytpx.png" alt="Luca grabando">
      </div>
    </div>
    <div id="rec-content"></div>
    <div id="error-sidebar"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen" hidden>
    <div class="results-content">
      <div class="results-character">
        <img id="results-avatar" src="assets/luca_happy.png" alt="Luca">
      </div>
      <h1 id="results-title"></h1>
      <p id="results-score" class="score-display"></p>
      <p id="results-record" class="record-display" hidden></p>
      <div id="results-speech" class="speech-bubble">
        <p id="results-speech-text"></p>
      </div>
      <div id="results-errors-panel"></div>
      <button id="btn-retry" class="btn-primary">Repetir toma</button>
    </div>
  </div>

  <!-- LUCA (global, always on top) -->
  <div id="luca" hidden>
    <img id="luca-img" src="https://res.cloudinary.com/kampe/image/upload/game_assets/s6d1/luca_worried_oyx2eg.png" alt="Luca">
  </div>

  <!-- COLOR FLUSH OVERLAY -->
  <div id="color-flush"></div>

  <script src="game.js?v=7"></script>
</body>
</html>
