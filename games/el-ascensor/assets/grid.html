<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid — El Ascensor (390×844)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 390px;
  height: 844px;
  overflow: hidden;
  position: relative;
  font-family: monospace;
}
.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0; left: 0;
}
.grid {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}
.h-line {
  position: absolute;
  left: 0;
  width: 100%;
  height: 1px;
  background: rgba(255, 0, 0, 0.5);
}
.h-label {
  position: absolute;
  left: 3px;
  color: #ff0;
  font-size: 11px;
  background: rgba(0,0,0,0.7);
  padding: 0 4px;
  line-height: 14px;
}
.v-line {
  position: absolute;
  top: 0;
  width: 1px;
  height: 100%;
  background: rgba(0, 150, 255, 0.35);
}
.v-label {
  position: absolute;
  top: 3px;
  color: cyan;
  font-size: 9px;
  background: rgba(0,0,0,0.7);
  padding: 0 3px;
}
.zone-label {
  position: absolute;
  right: 4px;
  color: #0f0;
  font-size: 10px;
  background: rgba(0,0,0,0.8);
  padding: 1px 5px;
  border: 1px solid #0f0;
}
</style>
</head>
<body>
<img class="bg" src="https://res.cloudinary.com/kampe/image/upload/v1774964980/bg_ascensor_lccrb7.jpg" alt="">
<div class="grid">
  <!-- Horizontal lines every 50px -->
  <script>
    const grid = document.querySelector('.grid');
    for (let y = 0; y <= 844; y += 50) {
      grid.innerHTML += `<div class="h-line" style="top:${y}px"></div>`;
      grid.innerHTML += `<div class="h-label" style="top:${y+1}px">${y}px</div>`;
    }
    for (let x = 0; x <= 390; x += 50) {
      grid.innerHTML += `<div class="v-line" style="left:${x}px"></div>`;
      grid.innerHTML += `<div class="v-label" style="left:${x+2}px">${x}</div>`;
    }

    // Zone labels (current approximate positions)
    const zones = [
      { y: 0, label: 'HUD (vidas + pts)' },
      { y: 50, label: 'Display piso' },
      { y: 100, label: 'Luces' },
      { y: 150, label: 'Slots start' },
      { y: 300, label: 'Cards start' },
      { y: 500, label: 'Pista btn' },
      { y: 550, label: 'Burbuja Paco' },
      { y: 650, label: 'Personajes start' },
      { y: 844, label: 'Bottom' },
    ];
    zones.forEach(z => {
      grid.innerHTML += `<div class="zone-label" style="top:${z.y}px">${z.label}</div>`;
    });
  </script>
</div>
</body>
</html>
