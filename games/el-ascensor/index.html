<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>El Ascensor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">

    <!-- INTRO -->
    <div id="intro" class="screen active">
      <div class="intro-top">
        <h1 class="game-title">El Ascensor</h1>
        <p class="game-subtitle">Atrapado entre pisos con el encargado</p>
      </div>
      <div class="intro-characters">
        <img id="silhouette-intro" class="silhouette" src="" alt="">
        <img id="paco-intro" class="paco-avatar" src="" alt="Paco">
      </div>
      <div class="intro-bottom">
        <div class="speech-bubble" id="intro-bubble">
          Venga, esto está parado. Mientras viene el técnico... ¿tú ibas a la entrevista, no? A ver qué sabes.
        </div>
        <button class="btn-primary" id="btn-start">Empezar</button>
      </div>
    </div>

    <!-- PLAY -->
    <div id="play" class="screen">
      <div class="hud">
        <div class="hud-lives" id="hud-lives">
          <span class="heart">♥</span>
          <span class="heart">♥</span>
          <span class="heart">♥</span>
        </div>
        <button class="btn-hint" id="btn-hint">Pista</button>
      </div>
      <div class="elevator-display">
        <span class="floor-number" id="floor-display">5</span>
      </div>
      <div class="elevator-lights">
        <span class="light" id="light-left"></span>
        <span class="light" id="light-right"></span>
      </div>
      <div class="slots-area" id="slots-area"></div>
      <div class="cards-area" id="cards-area"></div>
      <div class="speech-bubble speech-bubble-play" id="play-bubble"></div>
      <div class="play-characters">
        <img class="silhouette silhouette-play" src="" alt="">
        <img class="paco-avatar paco-play" id="paco-play" src="" alt="Paco">
      </div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="screen">
      <div class="results-content">
        <div class="results-floor" id="results-floor"></div>
        <div class="results-characters">
          <img class="silhouette silhouette-results" src="" alt="">
          <img class="paco-avatar paco-results" id="paco-results" src="" alt="Paco">
        </div>
        <div class="speech-bubble speech-bubble-results" id="results-bubble"></div>
        <button class="btn-primary" id="btn-retry">Volver a intentar</button>
      </div>
    </div>

    <!-- OVERLAY EDUCATIVO -->
    <div id="overlay" class="overlay hidden">
      <div class="overlay-content">
        <p class="overlay-line1" id="overlay-line1"></p>
        <p class="overlay-line2" id="overlay-line2"></p>
        <p class="overlay-line3" id="overlay-line3"></p>
        <button class="btn-primary btn-understood" id="btn-understood">Entendido</button>
      </div>
    </div>

    <!-- FLOOR TRANSITION -->
    <div id="floor-transition" class="floor-transition hidden">
      <div class="transition-floor" id="transition-floor">PISO 5</div>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
