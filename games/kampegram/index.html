<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kämpegram</title>
<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HOME SCREEN (Instagram Feed) ===== -->
<div id="home">
  <!-- Top Bar -->
  <div class="home-topbar">
    <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
    <div class="topbar-logo">Kämpegram</div>
    <div class="topbar-right">
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <svg class="topbar-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
  </div>

  <!-- Story Bubbles Row -->
  <div class="home-stories">
    <div class="story-bubble-wrap" data-type="self">
      <div class="story-bubble self-bubble">
        <div class="self-plus">+</div>
      </div>
      <span class="story-name">Tu story</span>
    </div>
    <!-- Story bubbles injected by JS -->
    <div id="story-bubbles-container"></div>
  </div>
  <div class="stories-divider"></div>

  <!-- Feed -->
  <div class="home-feed" id="home-feed"></div>

  <!-- Bottom Tab Bar -->
  <div class="home-tabbar">
    <svg class="tab-icon active" viewBox="0 0 24 24" fill="#262626"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M12 8v8M8 12h8"/></svg>
    <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
</div>

<!-- ===== STORIES VIEWER (fullscreen overlay) ===== -->
<div id="stories-viewer" class="hidden">
  <!-- Progress bars -->
  <div class="sv-progress" id="sv-progress"></div>

  <!-- Header -->
  <div class="sv-header">
    <img class="sv-avatar" id="sv-avatar" src="" alt="">
    <span class="sv-avatar-fallback" id="sv-avatar-fallback" style="display:none"></span>
    <div class="sv-user-info">
      <span class="sv-username" id="sv-username"></span>
      <span class="sv-time" id="sv-time"></span>
    </div>
    <span class="sv-sponsored hidden" id="sv-sponsored">Publicidad</span>
  </div>

  <!-- Story Content -->
  <div class="sv-content" id="sv-content"></div>

  <!-- Bottom Bar -->
  <div class="sv-bottom" id="sv-bottom">
    <div class="sv-message-input">Enviar mensaje</div>
    <svg class="sv-bottom-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    <svg class="sv-bottom-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </div>

  <!-- Tap Zones (invisible, on top) -->
  <div class="sv-tap-left" id="sv-tap-left"></div>
  <div class="sv-tap-right" id="sv-tap-right"></div>

  <!-- Toast -->
  <div class="sv-toast hidden" id="sv-toast"></div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div id="results-screen" class="hidden">
  <div class="results-inner">
    <div class="results-badge" id="results-badge"></div>
    <div class="results-score" id="results-score">0 / 135</div>
    <div class="results-label">Tu resultado en Kämpegram</div>
    <div class="results-record-wrap">
      <span class="results-record-label">Récord:</span>
      <span class="results-record" id="results-record">0</span>
    </div>
    <div class="results-new hidden" id="results-new">¡NUEVO RÉCORD!</div>
    <div class="results-msg" id="results-msg"></div>
    <div class="results-buttons">
      <button class="results-btn share-btn" id="results-share">Compartir</button>
      <button class="results-btn replay-btn" id="results-replay">Repetir</button>
    </div>
  </div>
</div>

<!-- Global toast (visible from results screen too) -->
<div class="global-toast hidden" id="global-toast"></div>

<script src="game.js"></script>
</body>
</html>
