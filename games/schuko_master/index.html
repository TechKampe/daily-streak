<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Schuko Master</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="W">

<!-- ===== INTRO ===== -->
<div class="scr" id="intro">
  <div class="intro-card">
    <div class="intro-badge">🔌</div>
    <h1 class="intro-title">Schuko Master</h1>
    <img class="intro-av" id="intro-av" alt="Salva">
    <div class="intro-bub" id="intro-msg">¡El cliente quiere enchufes nuevos! Monta la base schuko como un profesional.</div>
    <button class="btn" id="intro-btn">¡Vamos!</button>
  </div>
</div>

<!-- ===== PLAY ===== -->
<div class="scr off" id="play">
  <div class="hud">
    <div class="hud-left">
      <div class="hud-phase" id="hud-level">Nivel 1</div>
      <div class="hud-lives" id="hud-lives"></div>
    </div>
    <div class="hud-score" id="hud-score">0 pts</div>
  </div>

  <div class="play-body">
    <!-- Mission bar -->
    <div class="mission-bar" id="mission-bar">
      <div class="mission-text" id="mission-text"></div>
      <button class="mission-hint" id="mission-hint">💡</button>
    </div>

    <!-- Character row -->
    <div class="char-row">
      <img class="char-av" id="char-av" alt="Salva">
      <div class="char-bubble" id="char-bubble"></div>
    </div>

    <!-- Schuko SVG area -->
    <div class="circuit-area" id="circuit-area"></div>

    <!-- Cable tray (N1) -->
    <div class="cable-tray" id="cable-tray"></div>

    <!-- Error tray (N2) — tap zones info -->
    <div class="error-tray" id="error-tray"></div>

    <!-- Timer bar (N3) — shown during check + verdict -->
    <div class="timer-wrap" id="timer-wrap">
      <div class="timer-bar" id="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <!-- Check tray (N3) — sortable steps -->
    <div class="check-tray" id="check-tray"></div>

    <!-- Verdict area (N3) -->
    <div class="verdict-area" id="verdict-area">
      <div class="verdict-btns">
        <button class="verdict-btn verdict-ok" id="btn-pasa">✅ Pasa</button>
        <button class="verdict-btn verdict-no" id="btn-no-pasa">❌ No pasa</button>
      </div>
    </div>

    <!-- Spacer -->
    <div style="flex:1 1 0;min-height:0"></div>
  </div>

  <!-- Feedback overlay -->
  <div class="feedback-overlay" id="feedback-overlay">
    <img class="fb-av" id="fb-av" alt="">
    <div class="fb-text" id="fb-text"></div>
    <div class="fb-sub" id="fb-sub"></div>
    <button class="btn fb-btn" id="fb-btn">Entendido</button>
  </div>
</div>

<!-- ===== RESULTS ===== -->
<div class="scr off" id="results">
  <div class="res-inner">
    <div class="res-badge" id="res-badge"></div>
    <div class="res-scores">
      <div class="res-col">
        <div class="res-val" id="res-score">0</div>
        <div class="res-label">Puntos</div>
      </div>
      <div class="res-col">
        <div class="res-val res-record-val" id="res-record">0</div>
        <div class="res-label">Record</div>
      </div>
    </div>
    <div class="res-new" id="res-new">¡NUEVO RECORD!</div>
    <img class="res-av" id="res-av" alt="Salva">
    <div class="res-msg" id="res-msg"></div>
    <button class="btn" id="res-btn">¡Otra ronda!</button>
  </div>
</div>

<!-- Flash overlay -->
<div class="flash-overlay" id="flash-overlay"></div>

<!-- Drag ghost -->
<div class="drag-ghost" id="drag-ghost"></div>

</div>
<script src="game.js"></script>
</body>
</html>
