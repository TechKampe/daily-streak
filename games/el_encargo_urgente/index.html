<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>El Encargo Urgente</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- INTRO -->
  <div id="intro" class="screen active">
    <div class="wrapper intro-content" id="intro-inner"></div>
  </div>

  <!-- PLAY -->
  <div id="play" class="screen">
    <div class="wrapper play-wrap">
      <div class="hud">
        <div class="hud-left">
          <span id="hud-level">Nivel 1/4</span>
          <span id="hud-score">0 pts</span>
        </div>
        <button id="help-btn" class="help-btn" aria-label="Ayuda">?</button>
        <div id="hud-lives" class="hud-right"></div>
      </div>
      <div id="cuadro-wrap">
        <div id="cuadro" class="cuadro"></div>
        <canvas id="cable-canvas"></canvas>
      </div>
      <div id="phase-bar"><span id="phase-text"></span></div>
      <div id="bottom-area">
        <div id="label-panel" class="hidden"></div>
        <div id="slider-panel" class="hidden"></div>
        <div id="fer-row">
          <img id="fer-img" src="" alt="Fer" class="fer-sm">
          <div id="fer-bubble" class="fer-bub hidden"><p id="fer-msg"></p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div id="edu-overlay" class="overlay hidden">
    <div class="ov-card">
      <img id="edu-av" class="ov-av" src="" alt="Fer">
      <p id="edu-txt"></p>
      <button class="cta cta-sm" id="edu-btn">Entendido</button>
    </div>
  </div>

  <div id="wa-overlay" class="overlay hidden">
    <div class="wa-box">
      <div class="wa-bub">
        <img id="wa-av" class="wa-av" src="" alt="Fer">
        <div class="wa-body">
          <p id="wa-txt"></p>
          <span class="bub-time"><span id="wa-time"></span> <span class="bub-check">✓✓</span></span>
        </div>
      </div>
      <button class="cta" id="wa-btn">Siguiente cuadro</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="wrapper res-content" id="res-inner"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
