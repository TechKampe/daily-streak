<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El Cuadro Erroneo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- INTRO SCREEN -->
    <div id="intro" class="screen active">
        <div class="wrapper">
            <div class="intro-content" id="intro-content">
                <!-- Injected by game.js (multi-step dialogue) -->
            </div>
        </div>
    </div>

    <!-- GAMEPLAY SCREEN -->
    <div id="play" class="screen">
        <div class="wrapper">
            <div class="hud">
                <span id="hud-phase">Fase 1</span>
                <span id="hud-lives">❤️❤️❤️❤️❤️</span>
            </div>
            <div id="game-area">
                <!-- Game content injected by game.js -->
            </div>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results" class="screen">
        <div class="wrapper">
            <div class="results-content" id="results-content">
                <!-- Injected by game.js -->
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
